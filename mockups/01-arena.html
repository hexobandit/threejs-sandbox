<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>01 — Isometric Arena</title>
    <style>
        *{margin:0;padding:0}body{overflow:hidden;background:#000;touch-action:none}canvas{display:block}
        #ui{position:fixed;top:0;left:0;padding:12px;font-family:'Courier New',monospace;color:#fff;pointer-events:none;z-index:10}
        #ui h1{font-size:14px;color:#00ff88;margin-bottom:4px}
        #ui p{font-size:11px;color:#888;line-height:1.4;max-width:280px}
        #stats{font-size:11px;color:#ffcc00;margin-top:8px}
        #back{position:fixed;top:12px;right:12px;font-family:'Courier New',monospace;font-size:12px;color:#00ff88;text-decoration:none;z-index:10}
    </style>
</head>
<body>
<div id="ui">
    <h1>01 / Isometric Arena</h1>
    <p>Orthographic 45° camera · blocky track · retro environment. Drag to orbit, pinch to zoom.</p>
    <div id="stats">-- FPS</div>
</div>
<a id="back" href="../index.html">← back</a>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Renderer (WebGL) ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x87ceeb);
document.body.appendChild(renderer.domElement);

// --- Scene ---
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87ceeb, 80, 140);

// --- Orthographic Camera (isometric 45°) ---
const frustum = 38;
let aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.OrthographicCamera(
    frustum * aspect / -2, frustum * aspect / 2,
    frustum / 2, frustum / -2, 0.1, 200
);
camera.position.set(25, 25, 25);
camera.lookAt(0, 0, 0);

// --- Controls ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.4;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minZoom = 0.5;
controls.maxZoom = 3;
controls.addEventListener('start', () => controls.autoRotate = false);

// --- Lights ---
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x4a7c3f, 0.7));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(15, 30, 10);
scene.add(sun);

// --- Helpers ---
function roundedRectShape(w, h, r) {
    const s = new THREE.Shape();
    const x = -w / 2, y = -h / 2;
    s.moveTo(x + r, y);
    s.lineTo(x + w - r, y);
    s.quadraticCurveTo(x + w, y, x + w, y + r);
    s.lineTo(x + w, y + h - r);
    s.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    s.lineTo(x + r, y + h);
    s.quadraticCurveTo(x, y + h, x, y + h - r);
    s.lineTo(x, y + r);
    s.quadraticCurveTo(x, y, x + r, y);
    return s;
}

// --- Ground ---
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(100, 100),
    new THREE.MeshLambertMaterial({ color: 0x4a7c3f })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// --- Curbs (red/white layer under the track) ---
const curbOuter = roundedRectShape(34, 24, 6.5);
curbOuter.holes.push(new THREE.Path(roundedRectShape(24, 14, 3.5).getPoints(40)));
const curb = new THREE.Mesh(
    new THREE.ShapeGeometry(curbOuter),
    new THREE.MeshLambertMaterial({ color: 0xcc3333 })
);
curb.rotation.x = -Math.PI / 2;
curb.position.y = 0.02;
scene.add(curb);

// White curb stripes (alternating blocks along outer edge)
for (let i = 0; i < 40; i++) {
    const angle = (i / 40) * Math.PI * 2;
    const rx = 17.5, rz = 12.5;
    const x = Math.cos(angle) * rx;
    const z = Math.sin(angle) * rz;
    if (i % 2 === 0) {
        const stripe = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 0.06, 0.5),
            new THREE.MeshLambertMaterial({ color: 0xffffff })
        );
        stripe.position.set(x, 0.04, z);
        stripe.rotation.y = -angle;
        scene.add(stripe);
    }
}

// --- Track surface ---
const trackOuter = roundedRectShape(32, 22, 6);
trackOuter.holes.push(new THREE.Path(roundedRectShape(22, 12, 3).getPoints(40)));
const track = new THREE.Mesh(
    new THREE.ShapeGeometry(trackOuter),
    new THREE.MeshLambertMaterial({ color: 0x444444 })
);
track.rotation.x = -Math.PI / 2;
track.position.y = 0.04;
scene.add(track);

// --- Center island ---
const island = new THREE.Mesh(
    new THREE.ShapeGeometry(roundedRectShape(20, 10, 2.5)),
    new THREE.MeshLambertMaterial({ color: 0x5a9c4f })
);
island.rotation.x = -Math.PI / 2;
island.position.y = 0.03;
scene.add(island);

// --- Road dashes (center line) ---
for (let i = 0; i < 50; i++) {
    const angle = (i / 50) * Math.PI * 2;
    const rx = 13.5, rz = 8.5;
    if (i % 3 === 0) {
        const dash = new THREE.Mesh(
            new THREE.BoxGeometry(0.8, 0.01, 0.15),
            new THREE.MeshLambertMaterial({ color: 0xffffff })
        );
        dash.position.set(Math.cos(angle) * rx, 0.06, Math.sin(angle) * rz);
        dash.rotation.y = -angle;
        scene.add(dash);
    }
}

// --- Starting grid ---
for (let i = 0; i < 6; i++) {
    const line = new THREE.Mesh(
        new THREE.BoxGeometry(0.15, 0.02, 4.5),
        new THREE.MeshLambertMaterial({ color: 0xffffff })
    );
    line.position.set(14.5 - i * 1.8, 0.06, -10);
    scene.add(line);
}

// --- Buildings ---
const bldgs = [
    { p: [-20, -15], s: [5, 6, 4], c: 0x556677 },
    { p: [-22, -8], s: [3, 4.5, 6], c: 0x445566 },
    { p: [20, 14], s: [4, 8, 3], c: 0x556677 },
    { p: [22, 8], s: [3, 5, 4], c: 0x667788 },
    { p: [-19, 14], s: [6, 3, 3], c: 0x445566 },
    { p: [19, -14], s: [3, 7, 5], c: 0x556677 },
    { p: [0, -16], s: [8, 3, 3], c: 0x667788 },
    { p: [0, 16], s: [12, 2.5, 3], c: 0x556677 },
    { p: [-22, 3], s: [3, 5, 3], c: 0x778899 },
    { p: [23, 0], s: [2.5, 6, 4], c: 0x445566 },
];
bldgs.forEach(b => {
    const m = new THREE.Mesh(
        new THREE.BoxGeometry(b.s[0], b.s[1], b.s[2]),
        new THREE.MeshLambertMaterial({ color: b.c })
    );
    m.position.set(b.p[0], b.s[1] / 2, b.p[1]);
    scene.add(m);
});

// --- Trees ---
function addTree(x, z, scale = 1) {
    const g = new THREE.Group();
    const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.12 * scale, 0.18 * scale, 1 * scale, 6),
        new THREE.MeshLambertMaterial({ color: 0x8B5513 })
    );
    trunk.position.y = 0.5 * scale;
    g.add(trunk);
    const crown = new THREE.Mesh(
        new THREE.ConeGeometry(0.8 * scale, 1.8 * scale, 6),
        new THREE.MeshLambertMaterial({ color: 0x2d6a1e })
    );
    crown.position.y = 1.6 * scale;
    g.add(crown);
    g.position.set(x, 0, z);
    scene.add(g);
}
[[-5,3],[3,-2],[-2,4],[6,1],[0,-3],[-4,-4],[5,3],[-7,0],[4,-5],[-3,6],[7,-2]].forEach(([x,z]) => addTree(x, z, 0.8 + Math.random() * 0.5));

// --- Barriers ---
const barrierGeo = new THREE.BoxGeometry(1.8, 0.7, 0.5);
const barrierMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
[[-13,12.5],[13,12.5],[-13,-12.5],[13,-12.5],[-17.5,5],[-17.5,-5],[17.5,5],[17.5,-5]].forEach(([x,z]) => {
    const b = new THREE.Mesh(barrierGeo, barrierMat);
    b.position.set(x, 0.35, z);
    if (Math.abs(z) > 10) b.rotation.y = Math.PI / 2;
    scene.add(b);
});

// --- Tire walls (stacked at corners) ---
const tireGeo = new THREE.TorusGeometry(0.35, 0.15, 6, 8);
const tireMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
[[-14, 12], [14, -12], [-14, -12], [14, 12]].forEach(([x, z]) => {
    for (let i = 0; i < 3; i++) {
        const t = new THREE.Mesh(tireGeo, tireMat);
        t.position.set(x + (Math.random() - 0.5) * 0.5, 0.2 + i * 0.3, z + (Math.random() - 0.5) * 0.5);
        t.rotation.x = Math.PI / 2;
        scene.add(t);
    }
});

// --- Flag pole ---
const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06, 0.06, 5, 8),
    new THREE.MeshLambertMaterial({ color: 0xcccccc })
);
pole.position.y = 2.5;
scene.add(pole);

const flag = new THREE.Mesh(
    new THREE.BoxGeometry(1.4, 0.8, 0.04),
    new THREE.MeshLambertMaterial({ color: 0xffcc00, side: THREE.DoubleSide })
);
flag.position.set(0.7, 4.5, 0);
scene.add(flag);

// --- Flag zone ring ---
const zone = new THREE.Mesh(
    new THREE.RingGeometry(2.8, 3.2, 32),
    new THREE.MeshBasicMaterial({ color: 0xffcc00, transparent: true, opacity: 0.25, side: THREE.DoubleSide })
);
zone.rotation.x = -Math.PI / 2;
zone.position.y = 0.06;
scene.add(zone);

// --- Resize ---
window.addEventListener('resize', () => {
    aspect = window.innerWidth / window.innerHeight;
    camera.left = frustum * aspect / -2;
    camera.right = frustum * aspect / 2;
    camera.top = frustum / 2;
    camera.bottom = frustum / -2;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- FPS ---
let fc = 0, lt = performance.now();
const statsEl = document.getElementById('stats');

// --- Animate ---
(function animate() {
    requestAnimationFrame(animate);
    controls.update();

    // Flag wave
    flag.rotation.y = Math.sin(performance.now() * 0.003) * 0.2;
    // Zone pulse
    zone.material.opacity = 0.15 + Math.sin(performance.now() * 0.002) * 0.1;

    fc++;
    const now = performance.now();
    if (now - lt >= 1000) { statsEl.textContent = fc + ' FPS'; fc = 0; lt = now; }

    renderer.render(scene, camera);
})();
</script>
</body>
</html>
