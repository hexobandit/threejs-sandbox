<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>08 / Classic 2D Strategy Terminal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block}
#ui{position:fixed;top:0;left:0;padding:12px;font-family:'Courier New',monospace;color:#fff;pointer-events:none;z-index:10}
#ui h1{font-size:14px;color:#00ff88;margin-bottom:4px;text-shadow:0 0 8px #00ff8866}
#ui p{font-size:11px;color:#888;line-height:1.4;max-width:280px}
#stats{font-size:11px;color:#ffcc00;margin-top:8px;text-shadow:0 0 6px #ffcc0044}
#back{position:fixed;top:12px;right:12px;font-family:'Courier New',monospace;font-size:12px;color:#00ff88;text-decoration:none;z-index:10;text-shadow:0 0 8px #00ff8866}
#back:hover{color:#44ffaa}
#terminal{position:fixed;bottom:0;left:0;right:0;padding:8px 12px;font-family:'Courier New',monospace;font-size:11px;color:#00ff88;background:rgba(0,20,0,0.85);border-top:1px solid #00ff8844;z-index:10;pointer-events:none;text-shadow:0 0 6px #00ff8844;min-height:28px}
#roster{position:fixed;top:50%;right:12px;transform:translateY(-50%);font-family:'Courier New',monospace;font-size:10px;color:#00ff88;z-index:10;pointer-events:none;white-space:pre;line-height:1.4;background:rgba(0,20,0,0.7);padding:8px;border:1px solid #00ff8844;border-radius:4px;text-shadow:0 0 6px #00ff8844}
#minimap-container{position:fixed;bottom:40px;left:12px;border:1px solid #00ff8844;background:rgba(0,10,0,0.8);z-index:10;pointer-events:none;border-radius:4px;overflow:hidden}
#minimap-label{position:absolute;top:2px;left:4px;font-family:'Courier New',monospace;font-size:8px;color:#00ff8888;z-index:11}
</style>
</head>
<body>

<div id="ui">
  <h1>08 / CLASSIC 2D</h1>
  <p>Hex Strategy Command Post</p>
  <div id="stats">FPS: --</div>
</div>

<a id="back" href="../index.html">&larr; back</a>

<div id="terminal">&gt; INITIALIZING COMMAND POST...</div>

<div id="roster"></div>

<div id="minimap-container">
  <span id="minimap-label">TACTICAL</span>
  <canvas id="minimap"></canvas>
</div>

<canvas id="main"></canvas>

<script>
// ── CANVAS SETUP ──────────────────────────────────────────────────
const canvas = document.getElementById('main');
const ctx = canvas.getContext('2d');
const minimapCanvas = document.getElementById('minimap');
const minimapCtx = minimapCanvas.getContext('2d');

const dpr = Math.min(window.devicePixelRatio, 2);
let W, H;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const mmSize = Math.min(160, W * 0.2);
  minimapCanvas.width = mmSize * dpr;
  minimapCanvas.height = mmSize * dpr;
  minimapCanvas.style.width = mmSize + 'px';
  minimapCanvas.style.height = mmSize + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── HEX GRID SETUP ───────────────────────────────────────────────
const HEX_RADIUS = 18;
const GRID_RADIUS = 10;
const HEX_H = HEX_RADIUS * 2;
const HEX_W = Math.sqrt(3) * HEX_RADIUS;

// Axial coordinates for hex grid
function hexToPixel(q, r) {
  const x = HEX_W * (q + r * 0.5);
  const y = HEX_RADIUS * 1.5 * r;
  return { x, y };
}

function hexDistance(q1, r1, q2, r2) {
  return (Math.abs(q1 - q2) + Math.abs(q1 + r1 - q2 - r2) + Math.abs(r1 - r2)) / 2;
}

// Generate all hexes within radius
const hexes = [];
const hexMap = {};

for (let q = -GRID_RADIUS; q <= GRID_RADIUS; q++) {
  for (let r = -GRID_RADIUS; r <= GRID_RADIUS; r++) {
    const s = -q - r;
    if (Math.abs(s) <= GRID_RADIUS) {
      const dist = hexDistance(q, r, 0, 0);
      if (dist <= GRID_RADIUS) {
        const pos = hexToPixel(q, r);
        let territory = 'neutral';
        let isHQ = false;
        let units = null;
        let unitType = null;
        let contested = false;

        // Territory assignment based on position
        if (r > 2 && dist < GRID_RADIUS - 1) {
          territory = 'player';
        } else if (r < -2 && dist < GRID_RADIUS - 1) {
          territory = 'enemy';
        } else if (r >= -1 && r <= 1 && Math.abs(q) < 7) {
          contested = true;
        }

        // HQ positions
        if (q === 0 && r === 6) { territory = 'player'; isHQ = true; }
        if (q === 0 && r === -6) { territory = 'enemy'; isHQ = true; }

        // Scatter units
        const rng = Math.sin(q * 137.5 + r * 73.1) * 0.5 + 0.5;
        if (territory === 'player' && rng > 0.65) {
          const types = ['INF', 'ARM', 'ART', 'AIR'];
          unitType = types[Math.floor(rng * 17) % 4];
          units = Math.floor(rng * 5) + 1;
        } else if (territory === 'enemy' && rng > 0.65) {
          const types = ['INF', 'ARM', 'ART'];
          unitType = types[Math.floor(rng * 13) % 3];
          units = Math.floor(rng * 4) + 1;
        } else if (contested && rng > 0.75) {
          if (rng > 0.85) {
            territory = 'player';
            unitType = 'INF';
            units = Math.floor(rng * 3) + 1;
          } else {
            territory = 'enemy';
            unitType = 'INF';
            units = Math.floor(rng * 3) + 1;
          }
        }

        const hex = { q, r, x: pos.x, y: pos.y, territory, isHQ, units, unitType, contested, dist };
        hexes.push(hex);
        hexMap[q + ',' + r] = hex;
      }
    }
  }
}

// ── ATTACK VECTORS (predefined arrow paths) ──────────────────────
const attackVectors = [
  { from: { q: -2, r: -3 }, to: { q: -1, r: 1 }, color: '#ff4444' },
  { from: { q: 3, r: -4 }, to: { q: 2, r: 0 }, color: '#ff4444' },
  { from: { q: 0, r: -5 }, to: { q: 0, r: -1 }, color: '#ff4444' },
  { from: { q: -1, r: 4 }, to: { q: -1, r: 0 }, color: '#00ff88' },
  { from: { q: 2, r: 3 }, to: { q: 3, r: -1 }, color: '#00ff88' },
];

// ── DEFENSE PERIMETER (edge hexes of player territory) ───────────
const perimeterHexes = hexes.filter(h => {
  if (h.territory !== 'player') return false;
  const neighbors = [
    [h.q+1,h.r], [h.q-1,h.r], [h.q,h.r+1], [h.q,h.r-1], [h.q+1,h.r-1], [h.q-1,h.r+1]
  ];
  return neighbors.some(([nq, nr]) => {
    const key = nq + ',' + nr;
    return !hexMap[key] || hexMap[key].territory !== 'player';
  });
});
// Sort perimeter hexes by angle for connecting line
perimeterHexes.sort((a, b) => Math.atan2(a.y, a.x) - Math.atan2(b.y, b.x));

// ── PAN / ZOOM STATE ─────────────────────────────────────────────
let camera = { x: 0, y: 0, zoom: 2.2 };
let isDragging = false;
let lastMouse = { x: 0, y: 0 };
let touches = {};

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  lastMouse = { x: e.clientX, y: e.clientY };
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  camera.x -= (e.clientX - lastMouse.x) / camera.zoom;
  camera.y -= (e.clientY - lastMouse.y) / camera.zoom;
  lastMouse = { x: e.clientX, y: e.clientY };
});
window.addEventListener('mouseup', () => isDragging = false);

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.92 : 1.08;
  camera.zoom = Math.max(0.4, Math.min(5, camera.zoom * factor));
}, { passive: false });

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    touches[t.identifier] = { x: t.clientX, y: t.clientY };
  }
  if (e.touches.length === 1) {
    isDragging = true;
    lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const tArr = Array.from(e.touches);

  if (tArr.length === 1 && isDragging) {
    const t = tArr[0];
    camera.x -= (t.clientX - lastMouse.x) / camera.zoom;
    camera.y -= (t.clientY - lastMouse.y) / camera.zoom;
    lastMouse = { x: t.clientX, y: t.clientY };
  } else if (tArr.length === 2) {
    isDragging = false;
    const prev0 = touches[tArr[0].identifier];
    const prev1 = touches[tArr[1].identifier];
    if (prev0 && prev1) {
      const prevDist = Math.hypot(prev0.x - prev1.x, prev0.y - prev1.y);
      const curDist = Math.hypot(tArr[0].clientX - tArr[1].clientX, tArr[0].clientY - tArr[1].clientY);
      if (prevDist > 0) {
        const factor = curDist / prevDist;
        camera.zoom = Math.max(0.4, Math.min(5, camera.zoom * factor));
      }
      // Pan with two fingers
      const prevMid = { x: (prev0.x + prev1.x) / 2, y: (prev0.y + prev1.y) / 2 };
      const curMid = { x: (tArr[0].clientX + tArr[1].clientX) / 2, y: (tArr[0].clientY + tArr[1].clientY) / 2 };
      camera.x -= (curMid.x - prevMid.x) / camera.zoom;
      camera.y -= (curMid.y - prevMid.y) / camera.zoom;
    }
  }
  for (const t of e.changedTouches) {
    touches[t.identifier] = { x: t.clientX, y: t.clientY };
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    delete touches[t.identifier];
  }
  if (e.touches.length === 0) isDragging = false;
});

// ── DRAWING HELPERS ──────────────────────────────────────────────
function hexPath(cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i - 30);
    const hx = cx + r * Math.cos(angle);
    const hy = cy + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(hx, hy);
    else ctx.lineTo(hx, hy);
  }
  ctx.closePath();
}

function hexPathMini(mctx, cx, cy, r) {
  mctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i - 30);
    const hx = cx + r * Math.cos(angle);
    const hy = cy + r * Math.sin(angle);
    if (i === 0) mctx.moveTo(hx, hy);
    else mctx.lineTo(hx, hy);
  }
  mctx.closePath();
}

function drawArrow(x1, y1, x2, y2, color, t, lineWidth) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const len = Math.hypot(dx, dy);
  const nx = dx / len;
  const ny = dy / len;
  const headLen = 8;

  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth || 2;
  ctx.setLineDash([6, 4]);
  ctx.lineDashOffset = -t * 30;
  ctx.globalAlpha = 0.7;
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;

  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  // Arrowhead
  ctx.setLineDash([]);
  ctx.globalAlpha = 0.9;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen * nx - headLen * 0.5 * ny, y2 - headLen * ny + headLen * 0.5 * nx);
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen * nx + headLen * 0.5 * ny, y2 - headLen * ny - headLen * 0.5 * nx);
  ctx.stroke();
  ctx.restore();
}

function drawTankIcon(cx, cy, color) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  // Tank body
  ctx.fillRect(cx - 4, cy - 2, 8, 5);
  // Turret
  ctx.fillRect(cx - 1, cy - 5, 2, 4);
  ctx.restore();
}

// ── TERMINAL MESSAGES ────────────────────────────────────────────
const terminalMessages = [
  'COMMAND POST ONLINE // AWAITING ORDERS',
  'SECTOR 7 BREACH DETECTED // REINFORCEMENTS EN ROUTE',
  'ARTILLERY STRIKE AUTHORIZED // GRID REF 4,7',
  'PERIMETER HOLDING // ALL UNITS REPORT GREEN',
  'SIGINT INTERCEPT // ENEMY MOVEMENT DETECTED NORTH SECTOR',
  'AIR SUPPORT ON STANDBY // CALLSIGN EAGLE-6',
  'SUPPLY LINE SECURED // LOGISTICS GREEN',
  'RECON CONFIRMS ARMOR BUILDUP // GRID REF -3,8',
];
let currentMsgIndex = 0;
let currentCharIndex = 0;
let terminalText = '';
let lastTypeTime = 0;
let typeDelay = 35;
let pauseAfterMsg = 2500;
let msgCompleteTime = 0;
let isTyping = true;
const terminalEl = document.getElementById('terminal');

function updateTerminal(now) {
  if (isTyping) {
    if (now - lastTypeTime > typeDelay) {
      lastTypeTime = now;
      const msg = terminalMessages[currentMsgIndex];
      if (currentCharIndex < msg.length) {
        terminalText += msg[currentCharIndex];
        currentCharIndex++;
      } else {
        isTyping = false;
        msgCompleteTime = now;
      }
    }
  } else {
    if (now - msgCompleteTime > pauseAfterMsg) {
      currentMsgIndex = (currentMsgIndex + 1) % terminalMessages.length;
      currentCharIndex = 0;
      terminalText = '';
      isTyping = true;
    }
  }

  const cursor = Math.floor(now / 500) % 2 === 0 ? '█' : ' ';
  terminalEl.textContent = '> ' + terminalText + cursor;
}

// ── ROSTER ───────────────────────────────────────────────────────
const rosterEl = document.getElementById('roster');
function buildRoster() {
  let infCount = 0, armCount = 0, artCount = 0, airCount = 0;
  hexes.forEach(h => {
    if (h.territory === 'player' && h.units) {
      if (h.unitType === 'INF') infCount += h.units;
      if (h.unitType === 'ARM') armCount += h.units;
      if (h.unitType === 'ART') artCount += h.units;
      if (h.unitType === 'AIR') airCount += h.units;
    }
  });

  function bar(val, max) {
    const filled = Math.round((val / max) * 5);
    return '█'.repeat(filled) + '░'.repeat(5 - filled);
  }

  const maxU = Math.max(infCount, armCount, artCount, airCount, 1);
  rosterEl.textContent =
    '┌─ FORCES ─────────┐\n' +
    '│ INF  ' + bar(infCount, maxU) + ' ' + String(infCount).padStart(2) + '  │\n' +
    '│ ARM  ' + bar(armCount, maxU) + ' ' + String(armCount).padStart(2) + '  │\n' +
    '│ ART  ' + bar(artCount, maxU) + ' ' + String(artCount).padStart(2) + '  │\n' +
    '│ AIR  ' + bar(airCount, maxU) + ' ' + String(airCount).padStart(2) + '  │\n' +
    '├──────────────────┤\n' +
    '│ TOTAL        ' + String(infCount + armCount + artCount + airCount).padStart(3) + ' │\n' +
    '└──────────────────┘';
}
buildRoster();

// ── FPS COUNTER ──────────────────────────────────────────────────
let frameCount = 0;
let fpsTime = 0;
let fps = 0;
const statsEl = document.getElementById('stats');

// ── MAIN RENDER LOOP ─────────────────────────────────────────────
let startTime = performance.now();

function render(now) {
  requestAnimationFrame(render);

  const t = (now - startTime) / 1000;

  // FPS
  frameCount++;
  if (now - fpsTime > 1000) {
    fps = frameCount;
    frameCount = 0;
    fpsTime = now;
    statsEl.textContent = 'FPS: ' + fps + ' | ZOOM: ' + camera.zoom.toFixed(1) + 'x';
  }

  // Terminal
  updateTerminal(now);

  // CRT flicker
  const flicker = (Math.random() > 0.97) ? 0.92 + Math.random() * 0.08 : 1.0;

  // ── CLEAR ──
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // ── CAMERA TRANSFORM ──
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-camera.x, -camera.y);

  // Global flicker
  ctx.globalAlpha = flicker;

  // ── DRAW HEXES (with viewport culling) ──
  const viewL = camera.x - W / 2 / camera.zoom - HEX_RADIUS * 2;
  const viewR = camera.x + W / 2 / camera.zoom + HEX_RADIUS * 2;
  const viewT = camera.y - H / 2 / camera.zoom - HEX_RADIUS * 2;
  const viewB = camera.y + H / 2 / camera.zoom + HEX_RADIUS * 2;

  for (const hex of hexes) {
    if (hex.x < viewL || hex.x > viewR || hex.y < viewT || hex.y > viewB) continue;
    const { x, y, territory, isHQ, units, unitType, contested, dist } = hex;

    let fillColor, strokeColor;
    let lineW = 1;

    if (territory === 'player') {
      fillColor = '#0a2a0a';
      strokeColor = '#00ff88';
    } else if (territory === 'enemy') {
      fillColor = '#2a0a0a';
      strokeColor = '#ff4444';
    } else {
      fillColor = '#1a1a1a';
      strokeColor = '#444444';
    }

    if (isHQ) {
      lineW = 3;
      strokeColor = territory === 'player' ? '#00ffaa' : '#ff6666';
      fillColor = territory === 'player' ? '#0f3f0f' : '#3f0f0f';
    }

    // Contested pulse
    let alpha = 1;
    if (contested) {
      alpha = 0.5 + 0.3 * Math.sin(t * 3 + hex.q * 0.5 + hex.r * 0.5);
      fillColor = '#1a1a0a';
      strokeColor = '#888844';
    }

    ctx.save();
    ctx.globalAlpha *= alpha;

    // Phosphor glow (only on key hexes — shadowBlur is expensive)
    if (isHQ || units) {
      ctx.shadowColor = strokeColor;
      ctx.shadowBlur = 4;
    }

    hexPath(x, y, HEX_RADIUS - 1);
    ctx.fillStyle = fillColor;
    ctx.fill();
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = lineW;
    ctx.stroke();

    ctx.shadowBlur = 0;

    // HQ icon
    if (isHQ) {
      ctx.font = 'bold 8px Courier New';
      ctx.fillStyle = strokeColor;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('HQ', x, y);
    }

    // Unit symbols
    if (units && !isHQ) {
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (territory === 'player') {
        if (unitType === 'ARM') {
          drawTankIcon(x, y - 1, '#00ff88');
        } else {
          ctx.font = '9px sans-serif';
          ctx.fillStyle = '#00ff88';
          ctx.fillText('▲', x, y - 2);
        }
        ctx.font = 'bold 6px Courier New';
        ctx.fillStyle = '#00ff88';
        ctx.fillText(units, x, y + 7);
      } else if (territory === 'enemy') {
        ctx.font = '9px sans-serif';
        ctx.fillStyle = '#ff4444';
        ctx.fillText('▼', x, y - 2);
        ctx.font = 'bold 6px Courier New';
        ctx.fillStyle = '#ff4444';
        ctx.fillText(units, x, y + 7);
      }
    }

    ctx.restore();
  }

  // ── DEFENSE PERIMETER ──
  if (perimeterHexes.length > 2) {
    ctx.save();
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([8, 5]);
    ctx.lineDashOffset = -t * 15;
    ctx.globalAlpha = 0.5 * flicker;
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = 8;

    ctx.beginPath();
    // Use convex-hull-ish approach: connect perimeter by angle
    const sorted = [...perimeterHexes].sort((a, b) => {
      const aAngle = Math.atan2(a.y - 120, a.x);
      const bAngle = Math.atan2(b.y - 120, b.x);
      return aAngle - bAngle;
    });
    sorted.forEach((h, i) => {
      if (i === 0) ctx.moveTo(h.x, h.y);
      else ctx.lineTo(h.x, h.y);
    });
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  // ── ATTACK VECTORS ──
  for (const av of attackVectors) {
    const from = hexMap[av.from.q + ',' + av.from.r];
    const to = hexMap[av.to.q + ',' + av.to.r];
    if (from && to) {
      drawArrow(from.x, from.y, to.x, to.y, av.color, t, 2);
    }
  }

  // ── RADAR SWEEP ──
  const radarAngle = t * 0.8;
  const radarLen = GRID_RADIUS * HEX_RADIUS * 2;
  const radarCX = 0;
  const radarCY = 0;

  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 15;

  // Sweep line
  ctx.beginPath();
  ctx.moveTo(radarCX, radarCY);
  ctx.lineTo(
    radarCX + Math.cos(radarAngle) * radarLen,
    radarCY + Math.sin(radarAngle) * radarLen
  );
  ctx.stroke();

  // Sweep trail (fading arc)
  for (let i = 0; i < 8; i++) {
    const a = radarAngle - i * 0.025;
    ctx.globalAlpha = 0.08 * (1 - i / 8);
    ctx.beginPath();
    ctx.moveTo(radarCX, radarCY);
    ctx.lineTo(
      radarCX + Math.cos(a) * radarLen,
      radarCY + Math.sin(a) * radarLen
    );
    ctx.stroke();
  }
  ctx.restore();

  // ── GRID CENTER CROSSHAIR ──
  ctx.save();
  ctx.strokeStyle = '#00ff8833';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([3, 6]);
  ctx.beginPath();
  ctx.moveTo(-radarLen, 0);
  ctx.lineTo(radarLen, 0);
  ctx.moveTo(0, -radarLen);
  ctx.lineTo(0, radarLen);
  ctx.stroke();
  ctx.restore();

  // ── COORDINATE LABELS (sparse) ──
  ctx.save();
  ctx.font = '5px Courier New';
  ctx.fillStyle = '#00ff8833';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (const hex of hexes) {
    if (hex.q % 5 === 0 && hex.r % 5 === 0) {
      ctx.fillText(hex.q + ',' + hex.r, hex.x, hex.y + HEX_RADIUS + 1);
    }
  }
  ctx.restore();

  ctx.restore(); // End camera transform

  // ── SCANLINES ──
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  for (let y = 0; y < H; y += 4) {
    ctx.fillRect(0, y, W, 1);
  }

  // ── VIGNETTE (screen curvature) ──
  const vigGrad = ctx.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.85);
  vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vigGrad.addColorStop(0.7, 'rgba(0,0,0,0)');
  vigGrad.addColorStop(1, 'rgba(0,0,0,0.65)');
  ctx.fillStyle = vigGrad;
  ctx.fillRect(0, 0, W, H);

  // ── PHOSPHOR BLOOM ──
  // Very subtle green overlay in center
  const bloomGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.5);
  bloomGrad.addColorStop(0, 'rgba(0,255,136,0.015)');
  bloomGrad.addColorStop(1, 'rgba(0,255,136,0)');
  ctx.fillStyle = bloomGrad;
  ctx.fillRect(0, 0, W, H);

  ctx.restore();

  // ── MINIMAP ──
  drawMinimap(t);
}

// ── MINIMAP DRAWING ──────────────────────────────────────────────
function drawMinimap(t) {
  const mc = minimapCtx;
  const mw = minimapCanvas.width / dpr;
  const mh = minimapCanvas.height / dpr;

  mc.save();
  mc.setTransform(dpr, 0, 0, dpr, 0, 0);
  mc.fillStyle = 'rgba(0,10,0,0.95)';
  mc.fillRect(0, 0, mw, mh);

  // Scale hex grid to fit minimap
  const gridSpan = GRID_RADIUS * HEX_W * 2.2;
  const gridSpanY = GRID_RADIUS * HEX_RADIUS * 3.2;
  const scale = Math.min(mw / gridSpan, mh / gridSpanY) * 0.85;

  mc.translate(mw / 2, mh / 2);
  mc.scale(scale, scale);

  // Draw hex dots
  for (const hex of hexes) {
    let color;
    if (hex.territory === 'player') color = '#00ff88';
    else if (hex.territory === 'enemy') color = '#ff4444';
    else color = '#333333';

    if (hex.contested) color = '#888844';

    mc.fillStyle = color;
    mc.globalAlpha = hex.isHQ ? 1 : 0.6;
    mc.beginPath();
    mc.arc(hex.x, hex.y, hex.isHQ ? 3 : 1.5, 0, Math.PI * 2);
    mc.fill();
  }

  // Viewport rectangle
  mc.globalAlpha = 0.8;
  mc.strokeStyle = '#ffcc00';
  mc.lineWidth = 1.5 / scale;

  const viewW = W / camera.zoom;
  const viewH = H / camera.zoom;
  const viewX = camera.x - viewW / 2;
  const viewY = camera.y - viewH / 2;

  mc.strokeRect(viewX, viewY, viewW, viewH);

  // Radar sweep on minimap too
  const radarAngle = t * 0.8;
  mc.globalAlpha = 0.25;
  mc.strokeStyle = '#00ff88';
  mc.lineWidth = 1 / scale;
  mc.beginPath();
  mc.moveTo(0, 0);
  const rLen = GRID_RADIUS * HEX_RADIUS * 2;
  mc.lineTo(Math.cos(radarAngle) * rLen, Math.sin(radarAngle) * rLen);
  mc.stroke();

  mc.restore();
}

// ── START ────────────────────────────────────────────────────────
requestAnimationFrame(render);
</script>
