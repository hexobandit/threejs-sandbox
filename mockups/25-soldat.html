// Interpolate terrain height at any x using cubic Catmull-Rom
function terrainY(x) {
  if (x <= 0) return terrainPts[0].y;
  if (x >= WORLD_W) return terrainPts[terrainPts.length - 1].y;
  // Find segment
  for (let i = 0; i < terrainPts.length - 1; i++) {
    const p0 = terrainPts[Math.max(0, i - 1)];
    const p1 = terrainPts[i];
    const p2 = terrainPts[i + 1];
    const p3 = terrainPts[Math.min(terrainPts.length - 1, i + 2)];
    if (x >= p1.x && x <= p2.x) {
      const t = (x - p1.x) / (p2.x - p1.x);
      const t2 = t * t;
      const t3 = t2 * t;
      const y = 0.5 * (
        (2 * p1.y) +
        (-p0.y + p2.y) * t +
        (2*p0.y - 5*p1.y + 4*p2.y - p3.y) * t2 +
        (-p0.y + 3*p1.y - 3*p2.y + p3.y) * t3
      );
      return y;
    }
  }
  return terrainPts[terrainPts.length - 1].y;
}

// Terrain normal (approximate)
function terrainNormal(x) {
  const dx = 2;
  const dy = terrainY(x + dx) - terrainY(x - dx);
  const len = Math.sqrt(dx * dx * 4 + dy * dy);
  return { x: -dy / len, y: (2 * dx) / len };
}

// Terrain slope steepness
function terrainSlope(x) {
  const dx = 3;
  return Math.abs(terrainY(x + dx) - terrainY(x - dx)) / (2 * dx);
}

// ===== MOUNTAIN SILHOUETTES (3 parallax layers) =====
function generateMountains(count, yBase, maxH, color) {
  const pts = [];
  const step = WORLD_W * 2 / count;
  for (let i = 0; i <= count + 1; i++) {
    pts.push({
      x: -WORLD_W * 0.3 + i * step + (Math.random() - 0.5) * step * 0.5,
      y: yBase - Math.random() * maxH
    });
  }
  return { pts, color, yBase };
}

function drawTree(x, baseY) {
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.lineTo(x, baseY - 35);
  ctx.stroke();
  // branches
  ctx.lineWidth = 1.5;
  const branches = [
    [x, baseY - 25, x - 12, baseY - 42],
    [x, baseY - 30, x + 10, baseY - 48],
    [x, baseY - 20, x + 14, baseY - 34],
    [x - 12, baseY - 42, x - 18, baseY - 50],
    [x + 10, baseY - 48, x + 6, baseY - 56],
    [x + 10, baseY - 48, x + 18, baseY - 55],
  ];
  branches.forEach(b => {
    ctx.beginPath();
    ctx.moveTo(b[0], b[1]);
    ctx.lineTo(b[2], b[3]);
    ctx.stroke();
  });
}

// ===== PARTICLE POOLS =====
const MAX_TRACERS = 100;
const MAX_PARTICLES = 80;
const MAX_CASINGS = 40;
const MAX_SMOKE = 30;
const MAX_EXPLOSIONS = 6;

const tracers = [];
const particles = [];
const casings = [];
const smokePuffs = [];
const explosions = [];
const sniperTrails = [];

function spawnTracer(x, y, vx, vy, color, len, life) {
  if (tracers.length >= MAX_TRACERS) tracers.shift();
  tracers.push({ x, y, vx, vy, color, len: len || 5, life: life || 0.8, maxLife: life || 0.8 });
}
function spawnParticle(x, y, vx, vy, color, life, size) {
  if (particles.length >= MAX_PARTICLES) particles.shift();
  particles.push({ x, y, vx, vy, color, life, maxLife: life, size: size || 2 });
}
function spawnCasing(x, y, vx, vy) {
  if (casings.length >= MAX_CASINGS) casings.shift();
  casings.push({ x, y, vx, vy, rot: Math.random() * 6.28, rotV: (Math.random() - 0.5) * 15, life: 1.2 });
}
function spawnSmoke(x, y, vx, vy, size) {
  if (smokePuffs.length >= MAX_SMOKE) smokePuffs.shift();
  smokePuffs.push({ x, y, vx: vx || 0, vy: vy || 0, size: size || 4, life: 0.6, maxLife: 0.6, alpha: 0.4 });
}
function spawnExplosion(x, y) {
  if (explosions.length >= MAX_EXPLOSIONS) explosions.shift();
  explosions.push({ x, y, time: 0, maxTime: 0.5 });
  // Particles
  for (let i = 0; i < 18; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 60 + Math.random() * 180;
    spawnParticle(x, y, Math.cos(a) * spd, Math.sin(a) * spd - 40,
      ['#ff8800', '#ffcc00', '#ff4400', '#ffaa22'][Math.floor(Math.random() * 4)], 0.4 + Math.random() * 0.4, 2 + Math.random() * 3);
  }
  // Debris
  for (let i = 0; i < 6; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 40 + Math.random() * 120;
    spawnParticle(x, y, Math.cos(a) * spd, Math.sin(a) * spd - 80,
      '#3a2a18', 0.6 + Math.random() * 0.5, 3 + Math.random() * 2);
  }
  // Camera shake
  cameraShake = 6;
}
function spawnSniperTrail(x1, y1, x2, y2) {
  sniperTrails.push({ x1, y1, x2, y2, life: 0.35, maxLife: 0.35 });
}

function spawnBlood(x, y, count) {

}
function spawnSparks(x, y, count) {

    const a = -Math.PI * 0.2 - Math.random() * Math.PI * 0.6;
    const spd = 50 + Math.random() * 150;

      ['#ffee88', '#ffcc44', '#ffffff'][Math.floor(Math.random() * 3)],
      0.15 + Math.random() * 0.2, 1 + Math.random() * 1.5);
  }
}
function spawnDirt(x, y, count) {
  for (let i = 0; i < count; i++) {
    const a = -Math.PI * 0.3 - Math.random() * Math.PI * 0.4;
    const spd = 20 + Math.random() * 60;

}

const flagCarrier = soldiers.find(s => s.id === 'R2');

// ===== RAGDOLL PRE-COMPUTED =====
function initRagdoll(s) {
  const parts = [];
  const cx = s.x, cy = s.y;
  // head, torso_upper, torso_lower, L_upper_arm, L_forearm, R_upper_arm, R_forearm, L_upper_leg, L_lower_leg, R_upper_leg, R_lower_leg
  const offsets = [
    {dx:0,dy:-14,len:5},   // head
    {dx:0,dy:-9,len:7},    // torso upper
    {dx:0,dy:-3,len:6},    // torso lower
    {dx:-5,dy:-10,len:5},  // L upper arm
    {dx:-9,dy:-8,len:5},   // L forearm
    {dx:5,dy:-10,len:5},   // R upper arm
    {dx:9,dy:-8,len:5},    // R forearm
    {dx:-3,dy:1,len:6},    // L upper leg
    {dx:-4,dy:7,len:6},    // L lower leg
    {dx:3,dy:1,len:6},     // R upper leg
    {dx:4,dy:7,len:6},     // R lower leg
  ];
  offsets.forEach((o, i) => {
    parts.push({
      x: cx + o.dx, y: cy + o.dy,
      vx: (Math.random() - 0.5) * 80 + (s.vx || 0) * 0.5,
      vy: -60 - Math.random() * 80,
      rot: Math.random() * 6.28,
      rotV: (Math.random() - 0.5) * 10,
      len: o.len,
      grounded: false
    });
  });
  s.ragdollParts = parts;
}

soldiers.filter(s => s.state === 'ragdoll' || s.state === 'ragdoll_air').forEach(s => {
  initRagdoll(s);
  if (s.state === 'ragdoll_air') {
    s.ragdollParts.forEach(p => { p.vy = -20 + Math.random() * 20; p.vx = (Math.random() - 0.5) * 30; });
  }
});

// ===== GRENADE PROJECTILES =====
const grenades = [];

// ===== TURRET =====
const turret = { x: platforms[2].x + platforms[2].w / 2, y: platforms[2].y - 8, angle: 0, fireTimer: 0 };

// ===== CRATE BEING SHOT =====
const destructCrate = { x: 680, y: terrainY(680) - 4, hp: 1, splinterTimer: 0 };

// ===== UPDATE FUNCTIONS =====
function updateParticles(dt) {
  for (let i = tracers.length - 1; i >= 0; i--) {
    const t = tracers[i];
    t.x += t.vx * dt;
    t.y += t.vy * dt;
    t.life -= dt;
    // Check terrain collision
    if (t.y >= terrainY(t.x) - 1) {
      spawnSparks(t.x, t.y, 3);
      spawnDirt(t.x, t.y, 2);
      tracers.splice(i, 1);
      continue;
    }
    if (t.life <= 0 || t.x < -50 || t.x > WORLD_W + 50 || t.y < -50) {
      tracers.splice(i, 1);
    }
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += GRAVITY * dt * 0.5;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = casings.length - 1; i >= 0; i--) {
    const c = casings[i];
    c.x += c.vx * dt;
    c.y += c.vy * dt;
    c.vy += GRAVITY * dt;
    c.rot += c.rotV * dt;
    c.life -= dt;
    if (c.y >= terrainY(c.x)) { c.vy *= -0.3; c.y = terrainY(c.x); c.vx *= 0.5; }
    if (c.life <= 0) casings.splice(i, 1);
  }
  for (let i = smokePuffs.length - 1; i >= 0; i--) {
    const s = smokePuffs[i];
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.size += 3 * dt;
    s.life -= dt;
    s.alpha = 0.35 * (s.life / s.maxLife);
    if (s.life <= 0) smokePuffs.splice(i, 1);
  }
  for (let i = explosions.length - 1; i >= 0; i--) {
    explosions[i].time += dt;
    if (explosions[i].time >= explosions[i].maxTime) explosions.splice(i, 1);
  }
  for (let i = sniperTrails.length - 1; i >= 0; i--) {
    sniperTrails[i].life -= dt;
    if (sniperTrails[i].life <= 0) sniperTrails.splice(i, 1);
  }
  // Grenades
  for (let i = grenades.length - 1; i >= 0; i--) {
    const g = grenades[i];
    g.x += g.vx * dt;
    g.y += g.vy * dt;
    g.vy += GRAVITY * dt;
    g.rot += 8 * dt;
    g.life -= dt;
    if (g.y >= terrainY(g.x) || g.life <= 0) {
      spawnExplosion(g.x, g.y >= terrainY(g.x) ? terrainY(g.x) : g.y);
      grenades.splice(i, 1);
    }
  }
}

function updateSoldier(s, dt, time) {
  s.fireTimer += dt;
  s.muzzleFlashTimer -= dt;
  s.dustTimer += dt;

  switch (s.id) {
    case 'B1': { // Runner with M16 going right
      s.x += s.vx * dt;
      s.y = terrainY(s.x) - 12;
      s.facingRight = true;
      s.aimAngle = -0.1 + Math.sin(time * 0.5) * 0.15;
      if (s.x > 1050) s.x = 250;
      // Dust from feet
      if (s.dustTimer > 0.08) {
        s.dustTimer = 0;
        spawnParticle(s.x, s.y + 12, (Math.random() - 0.5) * 15, -10 - Math.random() * 10, '#5a4a38', 0.3, 1.5);
      }
      // 3-round burst
      if (s.fireTimer > s.fireInterval) {
        const burstPhase = (time * 4) % 3;
        if (burstPhase < 1.5) {
          s.fireTimer = 0;
          s.muzzleFlashTimer = 0.05;
          const wx = s.x + (s.facingRight ? 14 : -14);
          const wy = s.y - 6;
          const spread = (Math.random() - 0.5) * 0.06;
          spawnTracer(wx, wy, 700, spread * 700 + s.aimAngle * 100, '#ffee66', 5, 0.6);
          spawnCasing(wx - 4, wy - 2, (s.facingRight ? -1 : 1) * (20 + Math.random() * 30), -40 - Math.random() * 20);
        }
      }
      break;
    }
    case 'B2': { // Jetpack shotgunner
      s.x = 700 + Math.sin(time * 0.4) * 80;
      s.y = 170 + Math.sin(time * 0.6) * 30;
      s.jetpacking = true;
      s.jetpackFuel = 0.5 + Math.sin(time * 0.3) * 0.3;
      // Aim down-left
      s.facingRight = false;
      s.aimAngle = Math.PI * 0.15 + Math.sin(time * 0.8) * 0.2;
      // Shotgun every 0.8s
      if (s.fireTimer > 0.8) {
        s.fireTimer = 0;
        s.muzzleFlashTimer = 0.08;
        const wx = s.x - 12;
        const wy = s.y - 4;
        for (let i = 0; i < 8; i++) {
          const spread = (Math.random() - 0.5) * 0.5;
          const baseAngle = Math.PI + s.aimAngle;
          spawnTracer(wx, wy,
            Math.cos(baseAngle + spread) * 500,
            Math.sin(baseAngle + spread) * 500,
            '#ffdd44', 3, 0.35);
        }
      }
      break;
    }
    case 'B3': { // Sniper on platform
      s.x = platforms[2].x + 25;
      s.y = platforms[2].y - 8;
      s.prone = true;
      s.facingRight = true;
      s.scopeGlint = Math.sin(time * 1.5) > 0.95 ? 1 : s.scopeGlint * 0.9;
      if (s.fireTimer > s.fireInterval) {
        s.fireTimer = 0;
        s.muzzleFlashTimer = 0.12;
        // Sniper trail to R3 area
        const tx = 1420;
        const ty = terrainY(1420) - 14;
        spawnSniperTrail(s.x + 20, s.y - 3, tx, ty);
        spawnDirt(tx + (Math.random() - 0.5) * 10, ty + 5, 4);
      }
      break;
    }
    case 'B4': { // Dead ragdoll tumbling off hill
      s.ragdollTime += dt;
      if (s.ragdollParts) {
        s.ragdollParts.forEach(p => {
          if (!p.grounded) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += GRAVITY * dt;
            p.rot += p.rotV * dt;
            if (p.y >= terrainY(p.x) - 2) {
              p.y = terrainY(p.x) - 2;
              p.vy *= -0.2;
              p.vx *= 0.6;
              p.rotV *= 0.5;
              if (Math.abs(p.vy) < 5) p.grounded = true;
            }
          }
        });
        // Blood trail
        if (s.ragdollTime < 2 && Math.random() < 0.3) {
          const head = s.ragdollParts[0];
          spawnParticle(head.x, head.y, (Math.random()-0.5)*20, -10-Math.random()*15, '#aa0000', 0.4, 1.5);
        }
      }
      break;
    }
    case 'B5': { // Grenadier on platform
      s.x = platforms[1].x + 25;
      s.y = platforms[1].y - 12;
      s.facingRight = true;
      s.aimAngle = -0.6 + Math.sin(time * 0.3) * 0.15;
      if (s.fireTimer > s.fireInterval) {
        s.fireTimer = 0;
        // Launch grenade
        if (grenades.length < 5) {
          grenades.push({
            x: s.x + 8, y: s.y - 6,
            vx: 180 + Math.random() * 40,
            vy: -250 - Math.random() * 40,
            rot: 0, life: 1.8 + Math.random() * 0.5
          });
        }
      }
      break;
    }
    case 'R1': { // Minigun heavy jetpacking
      s.x = 520 + Math.sin(time * 0.25) * 60;
      s.y = 210 + Math.sin(time * 0.35) * 20;
      s.jetpacking = true;
      s.jetpackFuel = 0.3 + Math.sin(time * 0.5) * 0.2;
      s.facingRight = false;
      s.minigunSpin += dt * 20;
      // Aim toward B1
      const b1 = soldiers.find(ss => ss.id === 'B1');
      s.aimAngle = Math.atan2(b1.y - s.y, b1.x - s.x);
      // Continuous fire
      if (s.fireTimer > 0.04) {
        s.fireTimer = 0;
        s.muzzleFlashTimer = 0.03;
        const spread = (Math.random() - 0.5) * 0.15;
        const angle = s.aimAngle + spread;
        spawnTracer(s.x + Math.cos(angle) * 10, s.y + Math.sin(angle) * 10,
          Math.cos(angle) * 650, Math.sin(angle) * 650, '#ff8844', 3, 0.5);
      }
      break;
    }
    case 'R2': { // Flag carrier running left
      s.x += s.vx * dt;
      s.y = terrainY(s.x) - 12;
      s.facingRight = false;
      if (s.x < 100) { s.x = 1100; s.y = terrainY(1100) - 12; }
      // Dust
      if (s.dustTimer > 0.06) {
        s.dustTimer = 0;
        spawnParticle(s.x, s.y + 12, (Math.random() - 0.5) * 12, -8 - Math.random() * 8, '#4a3a28', 0.25, 1.2);
      }
      // Fire dual deagles occasionally
      if (s.fireTimer > 0.35) {
        s.fireTimer = 0;
        s.muzzleFlashTimer = 0.06;
        for (let side = -1; side <= 1; side += 2) {
          const angle = Math.PI + (Math.random() - 0.5) * 0.3;
          spawnTracer(s.x + side * 5, s.y - 5, Math.cos(angle) * 600, Math.sin(angle) * 600 - 30, '#ffee88', 4, 0.4);
        }
      }
      // Flag physics
      if (s.flagSegments) {
        const targetX = s.x + 8;
        const targetY = s.y - 10;
        s.flagSegments[0].x += (targetX - s.flagSegments[0].x) * 0.3;
        s.flagSegments[0].y += (targetY - s.flagSegments[0].y) * 0.3;
        for (let i = 1; i < s.flagSegments.length; i++) {
          const prev = s.flagSegments[i - 1];
          const wave = Math.sin(time * 8 + i * 0.8) * (2 + i * 0.5);
          const targetSegX = prev.x + 6;
          const targetSegY = prev.y + wave;
          s.flagSegments[i].x += (targetSegX - s.flagSegments[i].x) * 0.15;
          s.flagSegments[i].y += (targetSegY - s.flagSegments[i].y) * 0.15;
        }
      }
      break;
    }
    case 'R3': { // Barrett sniper crouching on right hill
      s.x = 1420;
      s.y = terrainY(1420) - 12;
      s.facingRight = false;
      s.scopeGlint = Math.sin(time * 1.2 + 1) > 0.93 ? 1 : s.scopeGlint * 0.92;
      if (s.fireTimer > s.fireInterval) {
        s.fireTimer = 0;
        s.muzzleFlashTimer = 0.15;
        const b3 = soldiers.find(ss => ss.id === 'B3');
        spawnSniperTrail(s.x - 20, s.y - 5, b3.x, b3.y);
        spawnDirt(b3.x + (Math.random() - 0.5) * 15, b3.y + 3, 3);
      }
      break;
    }
    case 'R4': { // Dead ragdoll in mid-air
      s.ragdollTime += dt;
      if (s.ragdollParts) {
        s.ragdollParts.forEach(p => {
          if (!p.grounded) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += GRAVITY * dt * 0.7;
            p.rot += p.rotV * dt;
            if (p.y >= terrainY(p.x) - 2) {
              p.y = terrainY(p.x) - 2;
              p.vy *= -0.15;
              p.vx *= 0.5;
              p.rotV *= 0.3;
              if (Math.abs(p.vy) < 3) p.grounded = true;
            }
          }
        });
        if (s.ragdollTime < 3 && Math.random() < 0.4) {
          const torso = s.ragdollParts[1];
          spawnParticle(torso.x, torso.y, (Math.random()-0.5)*25, -15-Math.random()*20, '#cc0000', 0.5, 1.8);
        }
      }
      break;
    }
    case 'R5': { // Dual pistols acrobatic runner
      s.x += s.vx * dt;
      // Jump periodically
      const jumpPhase = Math.sin(time * 2.5);
      const onGround = terrainY(s.x) - 12;
      s.y = onGround - Math.max(0, jumpPhase) * 35;
      s.facingRight = false;
      if (s.x < 300) s.x = 950;
      if (s.dustTimer > 0.07 && s.y >= onGround - 2) {
        s.dustTimer = 0;
        spawnParticle(s.x, onGround + 12, (Math.random()-0.5)*10, -6-Math.random()*6, '#4a3a28', 0.2, 1);
      }
      if (s.fireTimer > s.fireInterval) {
        s.fireTimer = 0;
        s.muzzleFlashTimer = 0.05;
        for (let side = -1; side <= 1; side += 2) {
          const angle = Math.PI + (Math.random() - 0.5) * 0.25 + Math.sin(time * 3) * 0.1;
          spawnTracer(s.x + side * 6, s.y - 4,
            Math.cos(angle) * 650, Math.sin(angle) * 650, '#ffee88', 4, 0.45);
        }
        spawnCasing(s.x + 3, s.y - 6, 25 + Math.random() * 20, -30 - Math.random() * 20);
        spawnCasing(s.x - 3, s.y - 6, -25 - Math.random() * 20, -30 - Math.random() * 20);
      }
      break;
    }
  }
}

// Turret update
function updateTurret(dt, time) {
  turret.angle = Math.sin(time * 0.8) * 0.4 - Math.PI * 0.5;
  turret.fireTimer += dt;
  if (turret.fireTimer > 0.15) {
    turret.fireTimer = 0;
    const angle = turret.angle + (Math.random() - 0.5) * 0.1;
    spawnTracer(turret.x + Math.cos(angle) * 8, turret.y + Math.sin(angle) * 8,
      Math.cos(angle) * 550, Math.sin(angle) * 550, '#ffcc44', 3, 0.4);
  }
}

// ===== DRAWING FUNCTIONS =====
function drawSky(time) {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0c0820');
  grad.addColorStop(0.35, '#18082a');
  grad.addColorStop(0.7, '#1a1028');
  grad.addColorStop(1, '#1a1028');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawMoon(time) {
  // Moon in upper right (world-relative with slight parallax)
  const mx = W * 0.78 + camX * 0.03;
  const my = H * 0.12;
  // Outer glow
  const glow = ctx.createRadialGradient(mx, my, 15, mx, my, 80);
  glow.addColorStop(0, 'rgba(200, 200, 220, 0.12)');
  glow.addColorStop(0.5, 'rgba(150, 150, 180, 0.04)');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(mx - 80, my - 80, 160, 160);
  // Moon body
  ctx.fillStyle = '#d8d8e8';
  ctx.beginPath();
  ctx.arc(mx, my, 22, 0, Math.PI * 2);
  ctx.fill();
  // Craters
  ctx.fillStyle = 'rgba(100, 100, 120, 0.25)';
  [[mx-6, my-5, 4], [mx+8, my+3, 3], [mx-2, my+8, 5], [mx+5, my-8, 2.5]].forEach(c => {
    ctx.beginPath(); ctx.arc(c[0], c[1], c[2], 0, Math.PI * 2); ctx.fill();
  });
}

function drawStars(time) {
  stars.forEach(s => {
    const sx = (s.x - camX * 0.05) % (W + 100);
    const sy = s.y;
    const brightness = s.brightness * (0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.twinklePhase));
    ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
    ctx.beginPath();
    ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawMountains(time) {
  mountains.forEach((layer, li) => {
    const parallax = 0.1 + li * 0.08;
    ctx.fillStyle = layer.color;
    ctx.beginPath();
    ctx.moveTo(0, H);
    layer.pts.forEach((p, i) => {
      const sx = p.x - camX * parallax;
      const sy = p.y + (H - WORLD_H) * 0.5;
      if (i === 0) ctx.moveTo(sx, sy);
      else ctx.lineTo(sx, sy);
    });
    ctx.lineTo(W + 100, H);
    ctx.lineTo(-100, H);
    ctx.closePath();
    ctx.fill();
  });
}

function worldToScreen(wx, wy) {
  const shakeX = cameraShake > 0 ? (Math.random() - 0.5) * cameraShake : 0;
  const shakeY = cameraShake > 0 ? (Math.random() - 0.5) * cameraShake : 0;
  return {
    x: wx - camX + W * 0.4 + shakeX,
    y: wy + (H - WORLD_H) * 0.6 + shakeY
  };
}

function drawTerrain(time) {
  // Main terrain fill
  ctx.beginPath();
  for (let x = 0; x <= WORLD_W; x += 2) {
    const p = worldToScreen(x, terrainY(x));
    if (x === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
  const bl = worldToScreen(WORLD_W, WORLD_H + 100);
  const br = worldToScreen(0, WORLD_H + 100);
  ctx.lineTo(bl.x, bl.y);
  ctx.lineTo(br.x, br.y);
  ctx.closePath();

  // Gradient fill
  const topP = worldToScreen(0, 300);
  const botP = worldToScreen(0, WORLD_H);
  const terrGrad = ctx.createLinearGradient(0, topP.y, 0, botP.y);
  terrGrad.addColorStop(0, '#2a2018');
  terrGrad.addColorStop(0.4, '#221a12');
  terrGrad.addColorStop(1, '#15100a');
  ctx.fillStyle = terrGrad;
  ctx.fill();

  // Soil layer lines
  ctx.strokeStyle = 'rgba(60, 45, 30, 0.15)';
  ctx.lineWidth = 0.5;
  for (let depth = 15; depth < 200; depth += 18) {
    ctx.beginPath();
    for (let x = 0; x <= WORLD_W; x += 4) {
      const ty = terrainY(x) + depth;
      const p = worldToScreen(x, ty);
      if (x === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }

  // Grass blades / rocky patches along top edge
  for (let x = 0; x <= WORLD_W; x += 3) {
    const ty = terrainY(x);
    const slope = terrainSlope(x);
    const p = worldToScreen(x, ty);

    if (slope > 0.5) {
      // Rocky patches at steep slopes
      if (Math.random() < 0.3) {
        ctx.fillStyle = `rgba(100, 90, 80, ${0.3 + Math.random() * 0.3})`;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - 1.5, p.y + 3);
        ctx.lineTo(p.x + 1.5, p.y + 2);
        ctx.closePath();
        ctx.fill();
      }
    } else {
      // Grass blades
      const h = 2 + Math.random() * 3.5;
      const lean = (Math.random() - 0.5) * 1.5 + Math.sin(time * 1.5 + x * 0.1) * 0.3;
      const green = `rgb(${50 + Math.floor(Math.random() * 30)}, ${140 + Math.floor(Math.random() * 40)}, ${40 + Math.floor(Math.random() * 20)})`;
      ctx.strokeStyle = green;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + lean, p.y - h);
      ctx.stroke();
    }
  }

  // Cave openings
  const caveOpenings = [
    { x: 620, w: 30 },
    { x: 920, w: 30 },
  ];
  caveOpenings.forEach(cave => {
    const cy = terrainY(cave.x);
    const p = worldToScreen(cave.x, cy);
    ctx.fillStyle = '#0a0808';
    ctx.beginPath();
    ctx.ellipse(p.x + cave.w/2, p.y + 4, cave.w/2, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // Dark gradient fading in
    const caveGrad = ctx.createRadialGradient(p.x + cave.w/2, p.y + 4, 2, p.x + cave.w/2, p.y + 4, cave.w/2 + 5);
    caveGrad.addColorStop(0, 'rgba(0,0,0,0.9)');
    caveGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = caveGrad;
    ctx.fillRect(p.x - 5, p.y - 12, cave.w + 10, 30);
  });

  // Underground tunnel hint (dark band below terrain between caves)
  ctx.fillStyle = 'rgba(5, 3, 3, 0.5)';
  ctx.beginPath();
  const tl = worldToScreen(620, terrainY(620) + 25);
  const tr = worldToScreen(920, terrainY(920) + 25);
  ctx.ellipse((tl.x + tr.x) / 2, (tl.y + tr.y) / 2, (tr.x - tl.x) / 2, 8, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawPlatforms(time) {
  platforms.forEach(plat => {
    const p = worldToScreen(plat.x, plat.y);
    // Metal brackets
    ctx.strokeStyle = '#555555';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(p.x + 5, p.y + 6);
    ctx.lineTo(p.x + 12, p.y + 16);
    ctx.moveTo(p.x + plat.w - 5, p.y + 6);
    ctx.lineTo(p.x + plat.w - 12, p.y + 16);
    ctx.stroke();
    // Platform body
    ctx.fillStyle = '#3a2a18';
    ctx.fillRect(p.x, p.y, plat.w, 6);
    // Lighter top edge
    ctx.fillStyle = '#5a4a30';
    ctx.fillRect(p.x, p.y, plat.w, 1.5);
    // Wood grain lines
    ctx.strokeStyle = 'rgba(80, 60, 35, 0.3)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 3; i++) {
      const ly = p.y + 2 + i * 1.5;
      ctx.beginPath();
      ctx.moveTo(p.x + 2, ly);
      ctx.lineTo(p.x + plat.w - 2, ly);
      ctx.stroke();
    }
    // Bush on some platforms
    if (plat === platforms[0] || plat === platforms[4]) {
      const bx = p.x + plat.w * 0.7;
      const by = p.y - 3;
      ctx.fillStyle = '#1a4a18';
      ctx.beginPath();
      ctx.arc(bx, by, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#225522';
      ctx.beginPath();
      ctx.arc(bx - 3, by + 1, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

function drawTurret(time) {
  const p = worldToScreen(turret.x, turret.y);
  // Base
  ctx.fillStyle = '#444';
  ctx.fillRect(p.x - 4, p.y - 2, 8, 5);
  // Barrel
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x + Math.cos(turret.angle) * 10, p.y + Math.sin(turret.angle) * 10);
  ctx.stroke();
}

function drawBases(time) {
  // Blue base (left hill)
  const blueBaseX = 80;
  const blueBaseY = terrainY(blueBaseX);
  {
    const p = worldToScreen(blueBaseX, blueBaseY);
    // Building
    ctx.fillStyle = '#2a2a35';
    ctx.fillRect(p.x - 15, p.y - 25, 30, 25);
    ctx.fillStyle = '#3366cc';
    // Roof
    ctx.beginPath();
    ctx.moveTo(p.x - 18, p.y - 25);
    ctx.lineTo(p.x, p.y - 35);
    ctx.lineTo(p.x + 18, p.y - 25);
    ctx.closePath();
    ctx.fill();
    // Flag pole
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(p.x + 25, p.y);
    ctx.lineTo(p.x + 25, p.y - 35);
    ctx.stroke();
    // Blue flag (should be stolen by R2, so show empty pole)
    // Sandbags
    ctx.fillStyle = '#4a4030';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(p.x + 32 + i * 7, p.y - 6, 6, 5);
    }
    ctx.fillRect(p.x + 35, p.y - 11, 6, 5);
    // Ammo crate
    ctx.fillStyle = '#3a3a20';
    ctx.fillRect(p.x - 28, p.y - 8, 8, 6);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(p.x - 28, p.y - 8, 8, 6);
  }

  // Red base (right hill)
  const redBaseX = 1500;
  const redBaseY = terrainY(redBaseX);
  {
    const p = worldToScreen(redBaseX, redBaseY);
    ctx.fillStyle = '#352a2a';
    ctx.fillRect(p.x - 15, p.y - 25, 30, 25);
    ctx.fillStyle = '#cc3333';
    ctx.beginPath();
    ctx.moveTo(p.x - 18, p.y - 25);
    ctx.lineTo(p.x, p.y - 35);
    ctx.lineTo(p.x + 18, p.y - 25);
    ctx.closePath();
    ctx.fill();
    // Flag pole with red flag
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(p.x - 25, p.y);
    ctx.lineTo(p.x - 25, p.y - 35);
    ctx.stroke();
    // Red flag
    ctx.fillStyle = '#cc3333';
    ctx.beginPath();
    ctx.moveTo(p.x - 25, p.y - 35);
    ctx.lineTo(p.x - 15, p.y - 31 + Math.sin(time * 4) * 1.5);
    ctx.lineTo(p.x - 25, p.y - 27);
    ctx.closePath();
    ctx.fill();
    // Sandbags
    ctx.fillStyle = '#4a4030';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(p.x - 38 - i * 7, p.y - 6, 6, 5);
    }
    ctx.fillRect(p.x - 42, p.y - 11, 6, 5);
    // Ammo crate
    ctx.fillStyle = '#3a3a20';
    ctx.fillRect(p.x + 20, p.y - 8, 8, 6);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(p.x + 20, p.y - 8, 8, 6);
  }
}

function drawCrates(time) {
  // Scattered crates
  const cratePositions = [
    { x: 450, s: 8 },
    { x: 750, s: 7 },
    { x: 1100, s: 8 },
  ];
  cratePositions.forEach(c => {
    const cy = terrainY(c.x);
    const p = worldToScreen(c.x, cy);
    ctx.fillStyle = '#3a2a15';
    ctx.fillRect(p.x - c.s/2, p.y - c.s, c.s, c.s);
    ctx.strokeStyle = '#554430';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(p.x - c.s/2, p.y - c.s, c.s, c.s);
    // Cross brace
    ctx.beginPath();
    ctx.moveTo(p.x - c.s/2, p.y - c.s);
    ctx.lineTo(p.x + c.s/2, p.y);
    ctx.moveTo(p.x + c.s/2, p.y - c.s);
    ctx.lineTo(p.x - c.s/2, p.y);
    ctx.stroke();
  });

  // Destructible crate being shot
  const dc = destructCrate;
  const dcy = terrainY(dc.x);
  const dp = worldToScreen(dc.x, dcy);
  ctx.fillStyle = '#3a2a15';
  ctx.fillRect(dp.x - 4, dp.y - 8, 8, 8);
  ctx.strokeStyle = '#554430';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(dp.x - 4, dp.y - 8, 8, 8);
  // Splinters flying off periodically
  dc.splinterTimer += 0.016;
  if (dc.splinterTimer > 0.3) {
    dc.splinterTimer = 0;
    for (let i = 0; i < 3; i++) {
      spawnParticle(dc.x, dcy - 4,
        (Math.random() - 0.5) * 80, -30 - Math.random() * 50,
        '#6a5a38', 0.3, 1.5);
    }
  }
}

// ===== SOLDIER DRAWING =====
function drawSoldier(s, time) {
  if (s.state === 'ragdoll' || s.state === 'ragdoll_air') {
    drawRagdoll(s, time);
    return;
  }

  const p = worldToScreen(s.x, s.y);
  const dir = s.facingRight ? 1 : -1;
  const teamColor = s.team === 'blue' ? '#3388ff' : '#ff3333';
  const teamColorDark = s.team === 'blue' ? '#2266cc' : '#cc2222';

  // Shadow on ground (for airborne soldiers)
  if (s.jetpacking || s.y < terrainY(s.x) - 20) {
    const groundY = terrainY(s.x);
    const gp = worldToScreen(s.x, groundY);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(gp.x, gp.y, 6, 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Jetpack effects
  if (s.jetpacking) {
    drawJetpackFlame(s, p, time);
  }

  const phase = time * 10 + s.phaseOffset;
  const isRunning = s.state === 'running' || s.state === 'flagcarrier' || s.state === 'running_acrobatic';
  const isCrouching = s.state === 'sniping' && !s.prone;
  const isProne = s.prone;

  ctx.save();
  ctx.translate(p.x, p.y);

  if (isProne) {
    // Prone soldier
    // Body horizontal
    ctx.fillStyle = teamColorDark;
    ctx.fillRect(-8 * dir, -5, 16 * dir, 4);
    // Head
    ctx.fillStyle = '#d4a574';
    ctx.beginPath();
    ctx.arc(10 * dir, -6, 4, 0, Math.PI * 2);
    ctx.fill();
    // Beret
    ctx.fillStyle = teamColor;
    ctx.beginPath();
    ctx.arc(10 * dir, -9, 3.5, Math.PI, 0);
    ctx.fill();
    // Weapon
    drawWeapon(s, 12 * dir, -5, dir, time);
    // Scope glint
    if (s.scopeGlint > 0.1) {
      ctx.fillStyle = `rgba(255, 255, 255, ${s.scopeGlint * 0.8})`;
      ctx.beginPath();
      ctx.arc(18 * dir, -6, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    // Legs (running animation)
    ctx.strokeStyle = teamColorDark;
    ctx.lineWidth = 2.5;

    if (isRunning) {
      // Smooth running legs
      const hipAngle1 = Math.sin(phase) * 0.6;
      const hipAngle2 = Math.sin(phase + Math.PI) * 0.6;
      const kneeAngle1 = Math.max(0, Math.sin(phase + 0.5)) * 0.8;
      const kneeAngle2 = Math.max(0, Math.sin(phase + Math.PI + 0.5)) * 0.8;

      // Leg 1
      const hip1X = 0;
      const hip1Y = 0;
      const knee1X = hip1X + Math.sin(hipAngle1) * 7;
      const knee1Y = hip1Y + Math.cos(hipAngle1) * 7;
      const foot1X = knee1X + Math.sin(hipAngle1 + kneeAngle1) * 7;
      const foot1Y = knee1Y + Math.cos(hipAngle1 + kneeAngle1) * 7;

      ctx.beginPath();
      ctx.moveTo(hip1X, hip1Y);
      ctx.lineTo(knee1X, knee1Y);
      ctx.lineTo(foot1X, foot1Y);
      ctx.stroke();

      // Foot 1
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(foot1X, foot1Y);
      ctx.lineTo(foot1X + dir * 3, foot1Y);
      ctx.stroke();

      // Leg 2
      ctx.lineWidth = 2.5;
      const knee2X = hip1X + Math.sin(hipAngle2) * 7;
      const knee2Y = hip1Y + Math.cos(hipAngle2) * 7;
      const foot2X = knee2X + Math.sin(hipAngle2 + kneeAngle2) * 7;
      const foot2Y = knee2Y + Math.cos(hipAngle2 + kneeAngle2) * 7;

      ctx.beginPath();
      ctx.moveTo(hip1X, hip1Y);
      ctx.lineTo(knee2X, knee2Y);
      ctx.lineTo(foot2X, foot2Y);
      ctx.stroke();

      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(foot2X, foot2Y);
      ctx.lineTo(foot2X + dir * 3, foot2Y);
      ctx.stroke();
    } else {
      // Standing/jetpacking legs
      const spread = s.jetpacking ? 0.15 : 0;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(-3 - spread * 10, 7);
      ctx.lineTo(-2, 13);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(3 + spread * 10, 7);
      ctx.lineTo(2, 13);
      ctx.stroke();
      // Feet
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-2, 13); ctx.lineTo(-2 + dir * 3, 13);
      ctx.moveTo(2, 13); ctx.lineTo(2 + dir * 3, 13);
      ctx.stroke();
    }

    // Torso
    ctx.strokeStyle = teamColorDark;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -10);
    ctx.stroke();

    // Arms
    const armBaseY = -8;
    ctx.lineWidth = 2;

    // Back arm (behind body)
    if (!s.jetpacking) {
      const backArmSwing = isRunning ? Math.sin(phase + Math.PI) * 0.4 : 0;
      ctx.strokeStyle = teamColorDark;
      ctx.beginPath();
      ctx.moveTo(0, armBaseY);
      ctx.lineTo(-dir * 4 + Math.sin(backArmSwing) * 3, armBaseY + 5);
      ctx.stroke();
    }

    // Weapon arm (front) — aims toward aimAngle
    const weaponArmAngle = s.facingRight ? s.aimAngle : Math.PI - s.aimAngle;
    const elbowDist = 5;
    const elbowX = Math.cos(weaponArmAngle) * elbowDist * dir;
    const elbowY = armBaseY + Math.sin(weaponArmAngle) * elbowDist;
    const handX = elbowX + Math.cos(weaponArmAngle) * 4 * dir;
    const handY = elbowY + Math.sin(weaponArmAngle) * 4;

    ctx.strokeStyle = '#d4a574';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, armBaseY);
    ctx.lineTo(elbowX, elbowY);
    ctx.lineTo(handX, handY);
    ctx.stroke();

    // Weapon
    drawWeapon(s, handX, handY, dir, time);

    // Head
    ctx.fillStyle = '#d4a574';
    ctx.beginPath();
    ctx.arc(0, -14, 4.5, 0, Math.PI * 2);
    ctx.fill();

    // Beret/hat
    ctx.fillStyle = teamColor;
    ctx.beginPath();
    ctx.arc(dir * 1, -17, 4, Math.PI * 0.9, Math.PI * 0.1, true);
    ctx.fill();
    // Beret flop
    ctx.beginPath();
    ctx.arc(dir * 3, -18, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Muzzle flash
  if (s.muzzleFlashTimer > 0) {
    const flashDir = s.facingRight ? 1 : -1;
    const fx = isProne ? 22 * flashDir : (s.facingRight ? 18 : -18);
    const fy = isProne ? -5 : -8 + Math.sin(s.aimAngle || 0) * 5;
    ctx.fillStyle = `rgba(255, 220, 100, ${s.muzzleFlashTimer * 10})`;
    ctx.beginPath();
    ctx.arc(fx, fy, 4 + Math.random() * 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(255, 255, 200, ${s.muzzleFlashTimer * 8})`;
    ctx.beginPath();
    ctx.arc(fx, fy, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();

  // Fuel bar for jetpacking soldiers
  if (s.jetpacking) {
    const barW = 20;
    const barH = 2;
    const barX = p.x - barW / 2;
    const barY = p.y - 22;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
    const fuel = Math.max(0, Math.min(1, s.jetpackFuel));
    const fuelColor = fuel > 0.5 ? '#44cc44' : fuel > 0.25 ? '#cccc44' : '#cc4444';
    ctx.fillStyle = fuelColor;
    ctx.fillRect(barX, barY, barW * fuel, barH);
  }

  // Draw flag for flag carrier
  if (s.id === 'R2' && s.flagSegments) {
    drawFlag(s, time);
  }
}

function drawWeapon(s, hx, hy, dir, time) {
  ctx.save();
  ctx.translate(hx, hy);

  const angle = s.facingRight ? (s.aimAngle || 0) : (Math.PI - (s.aimAngle || 0));
  if (!s.prone) ctx.rotate(angle);

  ctx.fillStyle = '#444';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 0.5;

  switch (s.weapon) {
    case 'M16':
      // Body
      ctx.fillRect(0, -1.5, 14 * dir, 3);
      // Stock
      ctx.fillStyle = '#3a2a18';
      ctx.fillRect(-4 * dir, -2, 4 * dir, 4);
      // Sight bump
      ctx.fillStyle = '#555';
      ctx.fillRect(8 * dir, -3, 2 * dir, 1.5);
      break;
    case 'Shotgun':
      ctx.fillRect(0, -2, 10 * dir, 4);
      ctx.fillStyle = '#3a2a18';
      ctx.fillRect(-3 * dir, -2.5, 3 * dir, 5);
      break;
    case 'Barrett':
      // Long barrel
      ctx.fillRect(0, -1.5, 22 * dir, 3);
      ctx.fillStyle = '#555';
      // Scope
      ctx.fillRect(8 * dir, -4, 5 * dir, 2.5);
      ctx.beginPath();
      ctx.arc(10 * dir, -3, 1.5, 0, Math.PI * 2);
      ctx.fill();
      // Stock
      ctx.fillStyle = '#3a2a18';
      ctx.fillRect(-5 * dir, -2.5, 5 * dir, 5);
      // Muzzle brake
      ctx.fillStyle = '#666';
      ctx.fillRect(22 * dir, -2.5, 3 * dir, 5);
      break;
    case 'Minigun':
      // Multi-barrel
      ctx.fillStyle = '#555';
      ctx.fillRect(0, -3, 12 * dir, 6);
      // Spinning barrels
      for (let i = 0; i < 3; i++) {
        const bAngle = s.minigunSpin + i * (Math.PI * 2 / 3);
        const by = Math.sin(bAngle) * 2;
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(12 * dir, by);
        ctx.lineTo(18 * dir, by);
        ctx.stroke();
      }
      // Body
      ctx.fillStyle = '#444';
      ctx.fillRect(-2 * dir, -4, 4 * dir, 8);
      break;
    case 'Deagles':
      // Two small pistols
      ctx.fillStyle = '#555';
      ctx.fillRect(0, -1, 6 * dir, 2.5);
      break;
    case 'Grenade':
      // Just a hand
      break;
  }
  ctx.restore();
}

function drawJetpackFlame(s, p, time) {
  // Main flame: overlapping circles
  for (let i = 0; i < 6; i++) {
    const t = i / 5;
    const r = 8 * (1 - t * 0.6) + (Math.random() - 0.5) * 2;
    const fy = p.y + 14 + i * 4 + (Math.random() - 0.5) * 2;
    const fx = p.x + (Math.random() - 0.5) * 3;
    const colors = ['rgba(255,100,20,0.6)', 'rgba(255,150,30,0.5)', 'rgba(255,200,50,0.5)', 'rgba(255,220,100,0.4)', 'rgba(255,240,180,0.6)', 'rgba(255,255,220,0.8)'];
    ctx.fillStyle = colors[i];
    ctx.beginPath();
    ctx.arc(fx, fy, r * (1 - t * 0.5), 0, Math.PI * 2);
    ctx.fill();
  }

  // Smoke trail
  if (Math.random() < 0.6) {
    spawnSmoke(s.x + (Math.random() - 0.5) * 4, s.y + 20,
      (Math.random() - 0.5) * 15, 10 + Math.random() * 15, 3 + Math.random() * 2);
  }

  // Sound wave rings
  const ringPhase = (time * 3.3) % 1;
  if (ringPhase < 0.5) {
    const ringR = ringPhase * 30;
    const ringAlpha = 0.15 * (1 - ringPhase * 2);
    ctx.strokeStyle = `rgba(255, 200, 100, ${ringAlpha})`;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(p.x, p.y + 16, ringR, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawFlag(s, time) {
  if (!s.flagSegments || s.flagSegments.length < 2) return;
  const segW = 5;
  const segH = 8;
  for (let i = 0; i < s.flagSegments.length; i++) {
    const seg = s.flagSegments[i];
    const sp = worldToScreen(seg.x, seg.y);
    const alpha = 1 - i * 0.08;
    ctx.fillStyle = `rgba(0, 170, 255, ${alpha})`;
    ctx.fillRect(sp.x, sp.y, segW, segH);
    // Star on first segment
    if (i === 0) {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.font = '6px sans-serif';
      ctx.fillText('*', sp.x + 1, sp.y + 6);
    }
    // Connecting line
    if (i > 0) {
      const prevSeg = s.flagSegments[i - 1];
      const pp = worldToScreen(prevSeg.x, prevSeg.y);
      ctx.strokeStyle = `rgba(0, 140, 220, ${alpha * 0.5})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(pp.x + segW, pp.y + segH / 2);
      ctx.lineTo(sp.x, sp.y + segH / 2);
      ctx.stroke();
    }
  }
}

function drawRagdoll(s, time) {
  if (!s.ragdollParts) return;
  const teamColor = s.team === 'blue' ? '#3388ff' : '#ff3333';
  const skinColor = '#d4a574';

  s.ragdollParts.forEach((part, i) => {
    const pp = worldToScreen(part.x, part.y);
    ctx.save();
    ctx.translate(pp.x, pp.y);
    ctx.rotate(part.rot);

    if (i === 0) {
      // Head
      ctx.fillStyle = skinColor;
      ctx.beginPath();
      ctx.arc(0, 0, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = teamColor;
      ctx.beginPath();
      ctx.arc(0, -2, 3, Math.PI, 0);
      ctx.fill();
    } else if (i <= 2) {
      // Torso segments
      ctx.strokeStyle = teamColor;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, -part.len / 2);
      ctx.lineTo(0, part.len / 2);
      ctx.stroke();
    } else {
      // Limbs
      ctx.strokeStyle = (i <= 6) ? skinColor : teamColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -part.len / 2);
      ctx.lineTo(0, part.len / 2);
      ctx.stroke();
    }
    ctx.restore();
  });
}

function drawTracers() {
  tracers.forEach(t => {
    const p = worldToScreen(t.x, t.y);
    const alpha = t.life / t.maxLife;
    // Trail line
    const dx = -t.vx * 0.012;
    const dy = -t.vy * 0.012;
    ctx.strokeStyle = `rgba(${hexToRgb(t.color)}, ${alpha * 0.3})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(p.x + dx * 2, p.y + dy * 2);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    // Main tracer
    ctx.strokeStyle = `rgba(${hexToRgb(t.color)}, ${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    const len = t.len;
    const nx = t.vx / Math.sqrt(t.vx * t.vx + t.vy * t.vy) * len;
    const ny = t.vy / Math.sqrt(t.vx * t.vx + t.vy * t.vy) * len;
    ctx.lineTo(p.x + nx, p.y + ny);
    ctx.stroke();
    // Bright tip
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.7})`;
    ctx.beginPath();
    ctx.arc(p.x + nx, p.y + ny, 1, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawSniperTrails() {
  sniperTrails.forEach(st => {
    const alpha = st.life / st.maxLife;
    const p1 = worldToScreen(st.x1, st.y1);
    const p2 = worldToScreen(st.x2, st.y2);
    // Bright core
    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
    // Glow
    ctx.strokeStyle = `rgba(200, 220, 255, ${alpha * 0.3})`;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  });
}

function drawParticles() {
  particles.forEach(p => {
    const pp = worldToScreen(p.x, p.y);
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = `rgba(${hexToRgb(p.color)}, ${alpha})`;
    ctx.beginPath();
    ctx.arc(pp.x, pp.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawCasings() {
  casings.forEach(c => {
    const pp = worldToScreen(c.x, c.y);
    ctx.save();
    ctx.translate(pp.x, pp.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = '#cc9933';
    ctx.fillRect(-1.5, -0.5, 3, 1);
    ctx.restore();
  });
}

function drawSmoke() {
  smokePuffs.forEach(s => {
    const pp = worldToScreen(s.x, s.y);
    ctx.fillStyle = `rgba(120, 120, 120, ${s.alpha})`;
    ctx.beginPath();
    ctx.arc(pp.x, pp.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawExplosions() {
  explosions.forEach(e => {
    const pp = worldToScreen(e.x, e.y);
    const t = e.time / e.maxTime;
    const r = t * 45;
    const alpha = 1 - t;

    // White flash
    if (t < 0.15) {
      ctx.fillStyle = `rgba(255, 255, 255, ${0.08 * (1 - t / 0.15)})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Outer orange glow
    const grad = ctx.createRadialGradient(pp.x, pp.y, 0, pp.x, pp.y, r);
    grad.addColorStop(0, `rgba(255, 200, 50, ${alpha * 0.8})`);
    grad.addColorStop(0.4, `rgba(255, 100, 20, ${alpha * 0.5})`);
    grad.addColorStop(1, `rgba(255, 50, 0, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(pp.x, pp.y, r, 0, Math.PI * 2);
    ctx.fill();

    // Inner white core
    if (t < 0.3) {
      ctx.fillStyle = `rgba(255, 255, 220, ${(1 - t / 0.3) * 0.8})`;
      ctx.beginPath();
      ctx.arc(pp.x, pp.y, r * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

function drawGrenades(time) {
  grenades.forEach(g => {
    const gp = worldToScreen(g.x, g.y);
    // Dotted arc trail
    ctx.strokeStyle = 'rgba(255, 100, 100, 0.15)';
    ctx.lineWidth = 0.5;
    ctx.setLineDash([2, 3]);
    // Simple trail based on velocity
    ctx.beginPath();
    ctx.moveTo(gp.x - g.vx * 0.03, gp.y - g.vy * 0.03);
    ctx.lineTo(gp.x, gp.y);
    ctx.stroke();
    ctx.setLineDash([]);

    // Grenade body
    ctx.save();
    ctx.translate(gp.x, gp.y);
    ctx.rotate(g.rot);
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(0, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    // Blinking red dot
    if (Math.sin(time * 20) > 0) {
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(1.5, -1, 1, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  });
}

function drawAtmosphere(time) {
  // Fog near ground
  const fogY = worldToScreen(0, 430).y;
  const fogGrad = ctx.createLinearGradient(0, fogY - 30, 0, fogY + 40);
  fogGrad.addColorStop(0, 'rgba(20, 15, 30, 0)');
  fogGrad.addColorStop(0.5, 'rgba(20, 15, 30, 0.15)');
  fogGrad.addColorStop(1, 'rgba(20, 15, 30, 0.08)');
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, fogY - 30, W, 80);

  // Dust motes
  dustMotes.forEach(d => {
    d.x += d.vx * 0.016;
    d.y += d.vy * 0.016;
    d.phase += 0.02;
    if (d.x < 0) d.x = WORLD_W;
    if (d.x > WORLD_W) d.x = 0;
    const dp = worldToScreen(d.x, d.y);
    const alpha = 0.1 + Math.sin(d.phase) * 0.05;
    ctx.fillStyle = `rgba(200, 200, 200, ${alpha})`;
    ctx.beginPath();
    ctx.arc(dp.x, dp.y, d.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // Fireflies
  fireflies.forEach(f => {
    f.phase += f.speed * 0.016;
    f.x = f.baseX + Math.sin(f.phase * 0.7) * 15;
    f.y = f.baseY + Math.cos(f.phase * 0.5) * 8;
    const fp = worldToScreen(f.x, f.y);
    const brightness = 0.3 + 0.7 * Math.max(0, Math.sin(f.phase * 2));
    ctx.fillStyle = `rgba(180, 255, 80, ${brightness * 0.6})`;
    ctx.beginPath();
    ctx.arc(fp.x, fp.y, 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Glow
    ctx.fillStyle = `rgba(180, 255, 80, ${brightness * 0.15})`;
    ctx.beginPath();
    ctx.arc(fp.x, fp.y, 5, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawTrees(time) {
  trees.forEach(t => {
    const tp = worldToScreen(t.x, t.baseY);
    ctx.save();
    ctx.translate(tp.x, tp.y);
    // Trunk
    ctx.strokeStyle = '#1a1a18';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -38);
    ctx.stroke();
    // Branches
    ctx.lineWidth = 1.5;
    const branches = [
      [0, -25, -14, -44], [0, -30, 12, -50],
      [0, -20, 16, -36], [-14, -44, -20, -52],
      [12, -50, 8, -58], [12, -50, 20, -57],
    ];
    ctx.strokeStyle = '#161614';
    branches.forEach(b => {
      ctx.beginPath();
      ctx.moveTo(b[0], b[1]);
      ctx.lineTo(b[2], b[3]);
      ctx.stroke();
    });
    ctx.restore();
  });
}

// ===== UI DRAWING =====
function drawUI(time) {
  // Top scoreboard bar
  ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
  ctx.fillRect(0, 0, W, 30);
  const barGrad = ctx.createLinearGradient(0, 0, 0, 30);
  barGrad.addColorStop(0, 'rgba(30, 30, 40, 0.5)');
  barGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = barGrad;
  ctx.fillRect(0, 0, W, 30);
  ctx.strokeStyle = 'rgba(60, 60, 80, 0.5)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(0, 30);
  ctx.lineTo(W, 30);
  ctx.stroke();

  ctx.font = `bold 13px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Blue score
  ctx.fillStyle = '#3388ff';
  ctx.fillText(`BLUE  ${blueScore}`, W / 2 - 100, 15);

  // Map name
  ctx.fillStyle = '#888';
  ctx.font = `11px ${FONT}`;
  ctx.fillText('ctf_Arena', W / 2, 15);

  // Red score
  ctx.fillStyle = '#ff3333';
  ctx.font = `bold 13px ${FONT}`;
  ctx.fillText(`${redScore}  RED`, W / 2 + 100, 15);

  // Timer
  const mins = Math.floor(matchTime / 60);
  const secs = Math.floor(matchTime % 60);
  ctx.fillStyle = '#aaa';
  ctx.font = `11px ${FONT}`;
  ctx.fillText(`${mins}:${secs < 10 ? '0' : ''}${secs}`, W / 2 + 220, 15);

  // Kill feed (top-right)
  ctx.textAlign = 'right';
  ctx.font = `10px ${FONT}`;
  killFeed.forEach((kf, i) => {
    const alpha = Math.min(1, kf.life / 1);
    const y = 50 + i * 16;
    ctx.fillStyle = `rgba(${kf.kTeam === 'blue' ? '80, 140, 255' : '255, 80, 80'}, ${alpha})`;
    ctx.fillText(kf.killer, W - 115, y);
    ctx.fillStyle = `rgba(180, 180, 180, ${alpha})`;
    ctx.fillText(`[${kf.weapon}]`, W - 65, y);
    ctx.fillStyle = `rgba(${kf.vTeam === 'blue' ? '80, 140, 255' : '255, 80, 80'}, ${alpha})`;
    ctx.fillText(kf.victim, W - 15, y);
  });

  // Weapon info (bottom-center) — spectating R2 flag carrier
  ctx.textAlign = 'center';
  ctx.font = `10px ${FONT}`;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(W / 2 - 80, H - 45, 160, 35);
  ctx.fillStyle = '#ccc';
  ctx.fillText('SPECTATING: FlagRunner', W / 2, H - 35);
  // Health bar
  ctx.fillStyle = '#333';
  ctx.fillRect(W / 2 - 50, H - 25, 100, 5);
  ctx.fillStyle = '#44cc44';
  ctx.fillRect(W / 2 - 50, H - 25, 72, 5);
  // Armor bar
  ctx.fillStyle = '#333';
  ctx.fillRect(W / 2 - 50, H - 18, 100, 4);
  ctx.fillStyle = '#4488cc';
  ctx.fillRect(W / 2 - 50, H - 18, 45, 4);

  ctx.fillStyle = '#888';
  ctx.font = `9px ${FONT}`;
  ctx.fillText('HP 72  |  AR 45  |  DEAGLES 12/14', W / 2, H - 10);

  // Minimap (bottom-left)
  const mmX = 12;
  const mmY = H - 60;
  const mmW = 100;
  const mmH = 35;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(mmX, mmY, mmW, mmH);
  ctx.strokeStyle = 'rgba(80, 80, 80, 0.5)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(mmX, mmY, mmW, mmH);

  // Terrain outline on minimap
  ctx.strokeStyle = 'rgba(60, 80, 40, 0.6)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  for (let x = 0; x <= WORLD_W; x += 20) {
    const mx = mmX + (x / WORLD_W) * mmW;
    const my = mmY + (terrainY(x) / WORLD_H) * mmH;
    if (x === 0) ctx.moveTo(mx, my);
    else ctx.lineTo(mx, my);
  }
  ctx.stroke();

  // Soldier dots
  soldiers.forEach(s => {
    if (s.state === 'ragdoll' || s.state === 'ragdoll_air') return;
    const mx = mmX + (s.x / WORLD_W) * mmW;
    const my = mmY + (s.y / WORLD_H) * mmH;
    ctx.fillStyle = s.team === 'blue' ? '#3388ff' : '#ff3333';
    ctx.beginPath();
    ctx.arc(mx, my, 1.5, 0, Math.PI * 2);
    ctx.fill();
  });

  // Camera viewport rectangle
  const vpLeft = mmX + (camX / WORLD_W) * mmW;
  const vpW = (W / WORLD_W) * mmW * 0.8;
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(vpLeft, mmY + 2, vpW, mmH - 4);
}

// ===== UTILITY =====
function hexToRgb(hex) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return `${r}, ${g}, ${b}`;
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

// ===== MAIN LOOP =====
let lastTime = 0;
let gameTime = 0;

function frame(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  gameTime += dt;
  matchTime += dt;

  // Update camera — follow flag carrier
  const fc = soldiers.find(s => s.id === 'R2');
  if (fc) {
    camTargetX = fc.x - W * 0.35;
  }
  // Camera smoothing
  camX = lerp(camX, camTargetX, 0.025);
  // Clamp
  camX = Math.max(0, Math.min(WORLD_W - W * 0.6, camX));

  // Camera shake decay
  if (cameraShake > 0) {
    cameraShake *= 0.9;
    if (cameraShake < 0.1) cameraShake = 0;
    // Snap toward explosions
    if (explosions.length > 0) {
      const e = explosions[explosions.length - 1];
      camTargetX = lerp(camTargetX, e.x - W * 0.4, 0.08);
    }
  }

  // Update soldiers
  soldiers.forEach(s => updateSoldier(s, dt, gameTime));

  // Update turret
  updateTurret(dt, gameTime);

  // Update particles
  updateParticles(dt);

  // Kill feed management
  killFeedTimer += dt;
  if (killFeedTimer > 3.5) {
    killFeedTimer = 0;
    const msg = killMessages[killFeedIdx % killMessages.length];
    killFeed.unshift({ ...msg, life: 5 });
    if (killFeed.length > 4) killFeed.pop();
    killFeedIdx++;
  }
  killFeed.forEach(kf => { kf.life -= dt; });
  for (let i = killFeed.length - 1; i >= 0; i--) {
    if (killFeed[i].life <= 0) killFeed.splice(i, 1);
  }

  // ===== DRAW =====
  ctx.clearRect(0, 0, W, H);

  // Sky
  drawSky(gameTime);
  drawMoon(gameTime);
  drawStars(gameTime);
  drawMountains(gameTime);

  // Trees (background)
  drawTrees(gameTime);

  // Terrain
  drawTerrain(gameTime);

  // Bases
  drawBases(gameTime);

  // Crates
  drawCrates(gameTime);

  // Platforms
  drawPlatforms(gameTime);
  drawTurret(gameTime);

  // Smoke (behind soldiers)
  drawSmoke();

  // Soldiers (sorted by y for depth)
  const sortedSoldiers = [...soldiers].sort((a, b) => {
    // Ragdolls first (behind), then by y
    const aR = (a.state === 'ragdoll' || a.state === 'ragdoll_air') ? 0 : 1;
    const bR = (b.state === 'ragdoll' || b.state === 'ragdoll_air') ? 0 : 1;
    if (aR !== bR) return aR - bR;
    return a.y - b.y;
  });
  sortedSoldiers.forEach(s => drawSoldier(s, gameTime));

  // Projectiles
  drawGrenades(gameTime);
  drawTracers();
  drawSniperTrails();
  drawCasings();
  drawParticles();
  drawExplosions();

  // Atmosphere
  drawAtmosphere(gameTime);

  // UI
  drawUI(gameTime);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
