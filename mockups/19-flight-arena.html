<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x88aadd);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ── Scene ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x88aadd, 0.006);

// ── Camera ──
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);

// ── Lights ──
const hemi = new THREE.HemisphereLight(0x88aadd, 0x557755, 0.6);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
sun.position.set(30, 45, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -60;
sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60;
sun.shadow.camera.bottom = -60;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 120;
sun.shadow.bias = -0.001;
scene.add(sun);

const ambient = new THREE.AmbientLight(0x334466, 0.3);
scene.add(ambient);

// ── Ground ──
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x557755 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid overlay
const gridHelper = new THREE.GridHelper(100, 10, 0x445544, 0x445544);
gridHelper.position.y = 0.05;
gridHelper.material.opacity = 0.35;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// ── Arena boundary walls ──
function createWall(px, pz, sx, sz) {
    const geo = new THREE.BoxGeometry(sx, 30, sz);
    const mat = new THREE.MeshBasicMaterial({ color: 0xff2222, transparent: true, opacity: 0.06, side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(px, 15, pz);
    scene.add(mesh);
    // wireframe edge
    const edges = new THREE.EdgesGeometry(geo);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xff4444, transparent: true, opacity: 0.25 }));
    line.position.copy(mesh.position);
    scene.add(line);
}
createWall(50, 0, 0.2, 100);
createWall(-50, 0, 0.2, 100);
createWall(0, 50, 100, 0.2);
createWall(0, -50, 100, 0.2);

// ── Hills ──
function createHill(x, z, r, h) {
    const geo = new THREE.SphereGeometry(r, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2);
    const mat = new THREE.MeshLambertMaterial({ color: 0x668855 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.scale.y = h / r;
    mesh.position.set(x, 0, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
}
createHill(-20, -15, 8, 3);
createHill(25, 10, 6, 2.5);
createHill(10, -30, 10, 4);
createHill(-30, 25, 7, 2);

// ── Lake ──
const lakeGeo = new THREE.CircleGeometry(7, 24);
const lakeMat = new THREE.MeshLambertMaterial({ color: 0x3388bb, transparent: true, opacity: 0.7 });
const lake = new THREE.Mesh(lakeGeo, lakeMat);
lake.rotation.x = -Math.PI / 2;
lake.position.set(15, 0.08, 20);
scene.add(lake);

// ── Trees ──
function createTree(x, z, scale) {
    const s = scale || 1;
    const group = new THREE.Group();
    // trunk
    const trunkGeo = new THREE.CylinderGeometry(0.15 * s, 0.2 * s, 1.5 * s, 6);
    const trunkMat = new THREE.MeshLambertMaterial({ color: 0x664422 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.y = 0.75 * s;
    trunk.castShadow = true;
    group.add(trunk);
    // foliage
    const leafGeo = new THREE.ConeGeometry(0.8 * s, 2.0 * s, 6);
    const leafMat = new THREE.MeshLambertMaterial({ color: 0x338833 });
    const leaf = new THREE.Mesh(leafGeo, leafMat);
    leaf.position.y = 2.2 * s;
    leaf.castShadow = true;
    group.add(leaf);
    group.position.set(x, 0, z);
    scene.add(group);
}
const treePositions = [
    [-10, -8], [-12, -6], [5, -25], [8, -23], [-35, 5], [-33, 8],
    [30, -10], [28, -8], [-5, 35], [-8, 33]
];
treePositions.forEach(([x, z]) => createTree(x, z, 0.8 + Math.random() * 0.6));

// ── Clouds ──
const clouds = [];
function createCloud(x, y, z, w) {
    const geo = new THREE.PlaneGeometry(w, w * 0.5);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.35, side: THREE.DoubleSide, depthWrite: false });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(x, y, z);
    scene.add(mesh);
    clouds.push(mesh);
    // shadow on ground
    const shadowGeo = new THREE.PlaneGeometry(w * 0.8, w * 0.4);
    const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.08, depthWrite: false });
    const shadow = new THREE.Mesh(shadowGeo, shadowMat);
    shadow.rotation.x = -Math.PI / 2;
    shadow.position.set(x, 0.1, z);
    scene.add(shadow);
    clouds.push(shadow); // pair them
}
createCloud(-15, 28, -10, 18);
createCloud(20, 26, 15, 14);
createCloud(-25, 30, 20, 20);
createCloud(10, 27, -25, 16);
createCloud(35, 29, 5, 12);
createCloud(-5, 25, 30, 15);

// ── Wind particles ──
const windCount = 60;
const windGeo = new THREE.BufferGeometry();
const windPos = new Float32Array(windCount * 3);
const windVel = [];
for (let i = 0; i < windCount; i++) {
    windPos[i * 3] = (Math.random() - 0.5) * 80;
    windPos[i * 3 + 1] = 2 + Math.random() * 25;
    windPos[i * 3 + 2] = (Math.random() - 0.5) * 80;
    windVel.push(0.02 + Math.random() * 0.04);
}
windGeo.setAttribute('position', new THREE.BufferAttribute(windPos, 3));
const windMat = new THREE.PointsMaterial({ color: 0xcccccc, size: 0.15, transparent: true, opacity: 0.3 });
const windParticles = new THREE.Points(windGeo, windMat);
scene.add(windParticles);

// ── Ship builder ──
function createShip(color) {
    const group = new THREE.Group();
    const mat = new THREE.MeshLambertMaterial({ color });
    const darkMat = new THREE.MeshLambertMaterial({ color: 0x222233 });

    // Fuselage
    const fuselage = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 1.4), mat);
    fuselage.castShadow = true;
    group.add(fuselage);

    // Wings
    const wings = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.02, 0.5), mat);
    wings.position.z = 0.1;
    wings.castShadow = true;
    group.add(wings);

    // Vertical tail
    const vTail = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.3, 0.25), mat);
    vTail.position.set(0, 0.18, -0.6);
    group.add(vTail);

    // Horizontal stabilizer
    const hStab = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.02, 0.2), mat);
    hStab.position.set(0, 0.05, -0.6);
    group.add(hStab);

    // Cockpit
    const cockpit = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.1, 0.3), darkMat);
    cockpit.position.set(0, 0.12, 0.25);
    group.add(cockpit);

    // Engine glow
    const glowMat = new THREE.MeshBasicMaterial({ color, emissive: color });
    const glow = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), glowMat);
    glow.position.set(0, 0, -0.75);
    group.add(glow);

    group.castShadow = true;
    return group;
}

// ── Player definitions ──
const players = [
    { color: 0x4488ff, name: 'P1', ship: null, contrail: null, contrailPts: [], health: [1, 1, 1] },
    { color: 0xff4444, name: 'P2', ship: null, contrail: null, contrailPts: [], health: [1, 1, 0] },
    { color: 0x44ff44, name: 'P3', ship: null, contrail: null, contrailPts: [], health: [2, 0, 0] },
    { color: 0xffcc00, name: 'P4', ship: null, contrail: null, contrailPts: [], health: [1, 1, 1] },
];

// Create ships
players.forEach(p => {
    p.ship = createShip(p.color);
    scene.add(p.ship);
});

// ── Flight path functions ──
function getP1Pos(t) {
    // Banking turn circle at y=15
    const r = 18;
    const a = t * 0.6;
    return new THREE.Vector3(Math.cos(a) * r, 15 + Math.sin(t * 1.2) * 0.5, Math.sin(a) * r);
}
function getP2Pos(t) {
    // Dive and pull-up arc
    const x = -10 + t * 3;
    const phase = Math.sin(t * 0.5) * 0.5 + 0.5;
    const y = 8 + Math.sin(t * 0.7) * 5;
    const z = 12 + Math.cos(t * 0.4) * 10;
    return new THREE.Vector3(x > 25 ? -10 + (x - 25) % 35 - 10 : x, y, z);
}
function getP3Pos(t) {
    // Climbing evasive spiral
    const r = 8;
    const a = t * 1.2;
    const y = 20 + Math.sin(t * 2) * 3;
    return new THREE.Vector3(Math.cos(a) * r + 5, y, Math.sin(a) * r - 5);
}
function getP4Pos(t) {
    // Pursuit curve chasing P2
    const p2 = getP2Pos(t - 0.3);
    const offset = new THREE.Vector3(Math.sin(t * 0.8) * 3, 2, Math.cos(t * 0.8) * 3);
    return p2.clone().add(offset);
}

const positionFns = [getP1Pos, getP2Pos, getP3Pos, getP4Pos];

// ── Contrails ──
const CONTRAIL_LEN = 40;
players.forEach((p, i) => {
    const pts = [];
    for (let j = 0; j < CONTRAIL_LEN; j++) {
        const t_offset = -j * 0.06;
        pts.push(positionFns[i](t_offset));
    }
    p.contrailPts = pts;
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    // Vertex colors for fading
    const colors = new Float32Array(CONTRAIL_LEN * 3);
    const c = new THREE.Color(p.color);
    for (let j = 0; j < CONTRAIL_LEN; j++) {
        const fade = 1 - j / CONTRAIL_LEN;
        colors[j * 3] = c.r * fade;
        colors[j * 3 + 1] = c.g * fade;
        colors[j * 3 + 2] = c.b * fade;
    }
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.7, linewidth: 1 });
    p.contrail = new THREE.Line(geo, mat);
    scene.add(p.contrail);
});

// ── Smoke trail for damaged Player 3 ──
const smokeCount = 50;
const smokeParticles = [];
const smokeGroup = new THREE.Group();
scene.add(smokeGroup);
for (let i = 0; i < smokeCount; i++) {
    const size = 0.1 + Math.random() * 0.2;
    const geo = new THREE.SphereGeometry(size, 4, 4);
    const isFireParticle = Math.random() < 0.3;
    const mat = new THREE.MeshBasicMaterial({
        color: isFireParticle ? 0xff6600 : 0x333333,
        transparent: true,
        opacity: 0
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.visible = false;
    smokeGroup.add(mesh);
    smokeParticles.push({
        mesh,
        life: 0,
        maxLife: 0.8 + Math.random() * 0.6,
        vel: new THREE.Vector3((Math.random() - 0.5) * 0.5, 0.3 + Math.random() * 0.3, (Math.random() - 0.5) * 0.5),
        isFire: isFireParticle
    });
}
let smokeSpawnTimer = 0;
let smokeSpawnIndex = 0;

// ── Laser bolts ──
const laserBolts = [];
function createBolt(color) {
    const geo = new THREE.BoxGeometry(0.06, 0.06, 0.5);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
    const mesh = new THREE.Mesh(geo, mat);
    // glow
    const glowGeo = new THREE.BoxGeometry(0.12, 0.12, 0.6);
    const glowMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.3 });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    mesh.add(glow);
    return mesh;
}

// Blue -> Green (P1 -> P3)
for (let i = 0; i < 5; i++) {
    const bolt = createBolt(0x4488ff);
    scene.add(bolt);
    laserBolts.push({ mesh: bolt, from: 0, to: 2, progress: i / 5, speed: 2.5, color: 0x4488ff });
}
// Yellow -> Red (P4 -> P2)
for (let i = 0; i < 4; i++) {
    const bolt = createBolt(0xffcc00);
    scene.add(bolt);
    laserBolts.push({ mesh: bolt, from: 3, to: 1, progress: i / 4, speed: 2.8, color: 0xffcc00 });
}

// ── Hit sparks on Player 3 ──
const sparkCount = 12;
const sparks = [];
const sparkGroup = new THREE.Group();
scene.add(sparkGroup);
for (let i = 0; i < sparkCount; i++) {
    const geo = new THREE.SphereGeometry(0.05, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0 });
    const mesh = new THREE.Mesh(geo, mat);
    sparkGroup.add(mesh);
    sparks.push({
        mesh,
        life: 0,
        maxLife: 0.3 + Math.random() * 0.2,
        vel: new THREE.Vector3((Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4),
        active: false
    });
}
let sparkTimer = 0;

// ── Shield flash spheres ──
const shieldFlashes = [];
players.forEach((p, i) => {
    const geo = new THREE.SphereGeometry(1.0, 12, 12);
    const mat = new THREE.MeshBasicMaterial({ color: p.color, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.visible = false;
    scene.add(mesh);
    shieldFlashes.push({ mesh, timer: 0, active: false });
});

// ── Multiplayer indicators ──
const indicators = [];
players.forEach((p, i) => {
    const group = new THREE.Group();

    // Diamond
    const diaGeo = new THREE.OctahedronGeometry(0.15, 0);
    const diaMat = new THREE.MeshBasicMaterial({ color: p.color });
    const diamond = new THREE.Mesh(diaGeo, diaMat);
    diamond.position.y = 1.0;
    group.add(diamond);

    // Health cubes
    for (let h = 0; h < 3; h++) {
        const hGeo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
        let hColor;
        if (p.health[h] === 1) hColor = 0x44ff44;
        else if (p.health[h] === 2) hColor = 0xff4444;
        else hColor = 0x333333;
        const hMat = new THREE.MeshBasicMaterial({ color: hColor });
        const hMesh = new THREE.Mesh(hGeo, hMat);
        hMesh.position.set((h - 1) * 0.18, 0.7, 0);
        group.add(hMesh);
    }

    // Name tag — colored bar
    const tagGeo = new THREE.BoxGeometry(0.5, 0.08, 0.08);
    const tagMat = new THREE.MeshBasicMaterial({ color: p.color });
    const tag = new THREE.Mesh(tagGeo, tagMat);
    tag.position.y = 1.25;
    group.add(tag);

    scene.add(group);
    indicators.push(group);
});

// ── Timer countdown ──
let matchTime = 167; // 2:47
const statusEl = document.getElementById('status');

// ── FPS counter ──
const statsEl = document.getElementById('stats');
let frameCount = 0, lastFPSTime = 0;

// ── Clock ──
const clock = new THREE.Clock();

// ── Animation ──
function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const t = clock.getElapsedTime();

    // FPS
    frameCount++;
    if (t - lastFPSTime >= 1) {
        statsEl.textContent = Math.round(frameCount / (t - lastFPSTime)) + ' FPS';
        frameCount = 0;
        lastFPSTime = t;
    }

    // Timer
    matchTime -= dt;
    if (matchTime < 0) matchTime = 167;
    const mins = Math.floor(matchTime / 60);
    const secs = Math.floor(matchTime % 60);
    statusEl.textContent = `MATCH IN PROGRESS · ${mins}:${secs.toString().padStart(2, '0')} REMAINING · FIRST TO 5 KILLS`;

    // ── Camera orbit ──
    const camR = 45;
    const camH = 22;
    camera.position.set(Math.cos(t * 0.12) * camR, camH + Math.sin(t * 0.08) * 4, Math.sin(t * 0.12) * camR);
    camera.lookAt(0, 10, 0);

    // ── Update ship positions ──
    const shipPositions = [];
    players.forEach((p, i) => {
        const pos = positionFns[i](t);
        const nextPos = positionFns[i](t + 0.05);
        shipPositions.push(pos);
        p.ship.position.copy(pos);

        // Orient ship toward direction of travel
        const dir = nextPos.clone().sub(pos).normalize();
        p.ship.lookAt(pos.clone().add(dir));

        // Bank on turns
        const nextNext = positionFns[i](t + 0.1);
        const turn = nextNext.clone().sub(nextPos).normalize();
        const cross = new THREE.Vector3().crossVectors(dir, turn);
        if (i === 0) p.ship.rotation.z = -cross.y * 8; // banking
        if (i === 1) {
            // Diving/pulling up pitch
            p.ship.rotation.z = Math.sin(t * 0.7) * 0.3;
        }
        if (i === 2) {
            // Steep climbing
            p.ship.rotation.z = Math.sin(t * 2.5) * 0.5;
        }
        if (i === 3) {
            p.ship.rotation.z = -cross.y * 6;
        }

        // Update contrail
        p.contrailPts.unshift(pos.clone());
        if (p.contrailPts.length > CONTRAIL_LEN) p.contrailPts.pop();
        const posArr = p.contrail.geometry.attributes.position.array;
        for (let j = 0; j < CONTRAIL_LEN; j++) {
            const pt = p.contrailPts[j] || p.contrailPts[p.contrailPts.length - 1];
            posArr[j * 3] = pt.x;
            posArr[j * 3 + 1] = pt.y;
            posArr[j * 3 + 2] = pt.z;
        }
        p.contrail.geometry.attributes.position.needsUpdate = true;

        // Update indicator position
        indicators[i].position.copy(pos).add(new THREE.Vector3(0, 1.5, 0));
        // Billboard: make indicators face camera
        indicators[i].quaternion.copy(camera.quaternion);
    });

    // ── Laser bolts ──
    laserBolts.forEach(bolt => {
        bolt.progress += dt * bolt.speed;
        if (bolt.progress > 1) bolt.progress -= 1;
        const fromPos = shipPositions[bolt.from];
        const toPos = shipPositions[bolt.to];
        if (fromPos && toPos) {
            const p = bolt.progress;
            bolt.mesh.position.lerpVectors(fromPos, toPos, p);
            bolt.mesh.lookAt(toPos);
            // Pulsing brightness
            bolt.mesh.material.opacity = 0.7 + Math.sin(t * 20 + bolt.progress * 10) * 0.3;
        }
    });

    // ── Hit sparks on P3 ──
    sparkTimer += dt;
    if (sparkTimer > 0.15) {
        sparkTimer = 0;
        // Spawn a burst
        for (let i = 0; i < 4; i++) {
            const s = sparks[(sparkTimer * 100 + i | 0) % sparkCount];
            if (s && !s.active) {
                s.active = true;
                s.life = 0;
                s.mesh.position.copy(shipPositions[2] || new THREE.Vector3(5, 20, -5));
                s.mesh.material.opacity = 1;
                s.vel.set((Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5);
            }
        }
    }
    sparks.forEach(s => {
        if (s.active) {
            s.life += dt;
            s.mesh.position.add(s.vel.clone().multiplyScalar(dt));
            s.mesh.material.opacity = Math.max(0, 1 - s.life / s.maxLife);
            if (s.life >= s.maxLife) {
                s.active = false;
                s.mesh.material.opacity = 0;
            }
        }
    });

    // ── Shield flashes ──
    // Trigger near-miss shield flash occasionally
    if (Math.random() < 0.01) {
        const idx = Math.floor(Math.random() * 4);
        shieldFlashes[idx].active = true;
        shieldFlashes[idx].timer = 0;
    }
    shieldFlashes.forEach((sf, i) => {
        if (sf.active) {
            sf.timer += dt;
            sf.mesh.visible = true;
            sf.mesh.position.copy(shipPositions[i] || new THREE.Vector3());
            const fade = 1 - sf.timer / 0.15;
            sf.mesh.material.opacity = Math.max(0, fade * 0.4);
            if (sf.timer > 0.15) {
                sf.active = false;
                sf.mesh.visible = false;
                sf.mesh.material.opacity = 0;
            }
        }
    });

    // ── Smoke trail on P3 ──
    smokeSpawnTimer += dt;
    if (smokeSpawnTimer > 0.04) {
        smokeSpawnTimer = 0;
        const sp = smokeParticles[smokeSpawnIndex % smokeCount];
        sp.life = 0;
        sp.mesh.visible = true;
        const p3Pos = shipPositions[2] || new THREE.Vector3(5, 20, -5);
        sp.mesh.position.copy(p3Pos).add(new THREE.Vector3((Math.random() - 0.5) * 0.3, -0.2, (Math.random() - 0.5) * 0.3));
        sp.mesh.material.opacity = sp.isFire ? 0.8 : 0.6;
        sp.mesh.scale.setScalar(1);
        smokeSpawnIndex++;
    }
    smokeParticles.forEach(sp => {
        if (sp.mesh.visible && sp.life < sp.maxLife) {
            sp.life += dt;
            sp.mesh.position.add(sp.vel.clone().multiplyScalar(dt));
            const frac = sp.life / sp.maxLife;
            sp.mesh.material.opacity = (sp.isFire ? 0.8 : 0.6) * (1 - frac);
            sp.mesh.scale.setScalar(1 + frac * 2);
            if (sp.life >= sp.maxLife) {
                sp.mesh.visible = false;
                sp.mesh.material.opacity = 0;
            }
        }
    });

    // ── Wind particles drift ──
    const wp = windParticles.geometry.attributes.position.array;
    for (let i = 0; i < windCount; i++) {
        wp[i * 3] += windVel[i];
        if (wp[i * 3] > 40) wp[i * 3] = -40;
    }
    windParticles.geometry.attributes.position.needsUpdate = true;

    // ── Cloud drift ──
    clouds.forEach((c, i) => {
        c.position.x += 0.005;
        if (c.position.x > 50) c.position.x = -50;
    });

    renderer.render(scene, camera);
}

animate();

// ── Resize ──
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
