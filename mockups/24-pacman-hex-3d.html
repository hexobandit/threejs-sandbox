<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// =============================================
// RENDERER
// =============================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x05050f);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05050f, 0.012);

// =============================================
// ORTHOGRAPHIC CAMERA (isometric)
// =============================================
const frustum = 22;
let aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.OrthographicCamera(
    frustum * aspect / -2, frustum * aspect / 2,
    frustum / 2, frustum / -2, 0.1, 200
);
camera.position.set(15, 18, 15);
camera.lookAt(0, 0, 0);

// =============================================
// CONTROLS
// =============================================
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minPolarAngle = Math.PI / 6;
controls.minZoom = 0.4;
controls.maxZoom = 3;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.15;

// =============================================
// AMBIENT (very dim)
// =============================================
scene.add(new THREE.AmbientLight(0x111122, 0.1));

// =============================================
// HEX GRID MATH
// =============================================
const S = 0.95;
const HEX_RADIUS = 7;

function hexToWorld(q, r) {
    return { x: S * 1.5 * q, z: S * Math.sqrt(3) * (r + q / 2) };
}

function hexDist(q1, r1, q2, r2) {
    return (Math.abs(q1 - q2) + Math.abs(q1 + r1 - q2 - r2) + Math.abs(r1 - r2)) / 2;
}

function hexKey(q, r) { return `${q},${r}`; }

// =============================================
// MAZE DEFINITION
// =============================================
const ghostHouseSet = new Set();
const ghostHouseCoords = [{q:0,r:0},{q:1,r:0},{q:0,r:1},{q:1,r:-1}];
ghostHouseCoords.forEach(h => ghostHouseSet.add(hexKey(h.q, h.r)));

// Hand-designed wall set for a connected, Pacman-style maze
const wallCoords = new Set();

function isWall(q, r) {
    const s = -q - r;
    const dist = Math.max(Math.abs(q), Math.abs(r), Math.abs(s));

    // Outside boundary
    if (dist > HEX_RADIUS) return true;
    // Outer wall ring
    if (dist === HEX_RADIUS) return true;
    // Second ring: wall with corridor openings along 6 axes
    if (dist === HEX_RADIUS - 1) {
        // Open corridors along the 6 hex directions
        if (q === 0 && Math.abs(r) === HEX_RADIUS - 1) return false;
        if (r === 0 && Math.abs(q) === HEX_RADIUS - 1) return false;
        if (s === 0 && dist === HEX_RADIUS - 1) return false;
        return true;
    }

    // Ghost house boundary (ring around center, but keep center open)
    if (ghostHouseSet.has(hexKey(q, r))) return false;

    // Ring at dist 5 with corridor openings
    if (dist === 5) {
        if (q === 0 || r === 0 || s === 0) return false;
        if (Math.abs(q) === 1 || Math.abs(r) === 1 || Math.abs(s) === 1) return false;
        return true;
    }

    // Inner ring at dist 3 with openings
    if (dist === 3) {
        if (q === 0 || r === 0 || s === 0) return false;
        if (Math.abs(q) === 1 && Math.abs(r) <= 1) return false;
        if (Math.abs(r) === 1 && Math.abs(q) <= 1) return false;
        return true;
    }

    // Radial walls at dist 4 (partial)
    if (dist === 4) {
        if ((q === 4 && r === 0) || (q === -4 && r === 0)) return true;
        if ((q === 0 && r === 4) || (q === 0 && r === -4)) return true;
        if ((q === 4 && r === -4) || (q === -4 && r === 4)) return true;
    }

    // Scattered internal walls for variety
    if (q === 2 && r === -4) return true;
    if (q === -2 && r === 4) return true;
    if (q === 4 && r === -2) return true;
    if (q === -4 && r === 2) return true;
    if (q === -2 && r === -2) return true;
    if (q === 2 && r === 2) return true;

    // Short walls near the corridors
    if (q === 2 && r === 1 && dist < 5) return true;
    if (q === -2 && r === -1 && dist < 5) return true;
    if (q === 1 && r === 2 && dist < 5) return true;
    if (q === -1 && r === -2 && dist < 5) return true;
    if (q === -1 && r === 3 && dist < 5) return true;
    if (q === 1 && r === -3 && dist < 5) return true;

    return false;
}

// Build hex lists
const allHexes = [];
for (let q = -HEX_RADIUS; q <= HEX_RADIUS; q++) {
    for (let r = -HEX_RADIUS; r <= HEX_RADIUS; r++) {
        const s = -q - r;
        if (Math.max(Math.abs(q), Math.abs(r), Math.abs(s)) <= HEX_RADIUS) {
            allHexes.push({ q, r, s });
        }
    }
}

const walls = new Set();
const paths = [];
allHexes.forEach(h => {
    if (isWall(h.q, h.r)) {
        walls.add(hexKey(h.q, h.r));
    } else {
        paths.push({ q: h.q, r: h.r });
    }
});

// =============================================
// PATHFINDING HELPERS
// =============================================
const hexDirs = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];

function getNeighbors(q, r) {
    const result = [];
    hexDirs.forEach(([dq, dr]) => {
        const nq = q + dq, nr = r + dr;
        if (!walls.has(hexKey(nq, nr))) {
            const ns = -nq - nr;
            if (Math.max(Math.abs(nq), Math.abs(nr), Math.abs(ns)) <= HEX_RADIUS) {
                result.push({ q: nq, r: nr });
            }
        }
    });
    return result;
}

function buildPath(startQ, startR, length) {
    const path = [{ q: startQ, r: startR }];
    const visited = new Set();
    visited.add(hexKey(startQ, startR));
    for (let i = 0; i < length; i++) {
        const cur = path[path.length - 1];
        const neighbors = getNeighbors(cur.q, cur.r);
        const unvisited = neighbors.filter(n => !visited.has(hexKey(n.q, n.r)));
        let next;
        if (unvisited.length > 0) {
            next = unvisited[Math.floor(Math.random() * unvisited.length)];
        } else {
            next = neighbors[Math.floor(Math.random() * neighbors.length)];
        }
        if (next) {
            path.push(next);
            visited.add(hexKey(next.q, next.r));
        }
    }
    return path;
}

// Deterministic random for consistent results
let seed = 42;
function sRand() { seed = (seed * 16807 + 0) % 2147483647; return seed / 2147483647; }

function buildPathSeeded(startQ, startR, length) {
    const path = [{ q: startQ, r: startR }];
    const visited = new Set();
    visited.add(hexKey(startQ, startR));
    for (let i = 0; i < length; i++) {
        const cur = path[path.length - 1];
        const neighbors = getNeighbors(cur.q, cur.r);
        const unvisited = neighbors.filter(n => !visited.has(hexKey(n.q, n.r)));
        let next;
        if (unvisited.length > 0) {
            next = unvisited[Math.floor(sRand() * unvisited.length)];
        } else {
            next = neighbors[Math.floor(sRand() * neighbors.length)];
        }
        if (next) {
            path.push(next);
            visited.add(hexKey(next.q, next.r));
        }
    }
    return path;
}

// =============================================
// POWER PELLET LOCATIONS
// =============================================
const powerPelletPositions = [
    { q: -5, r: -1 },
    { q: 5, r: -4 },
    { q: -4, r: 5 },
    { q: 5, r: 1 }
];
// Adjust to valid path hexes
powerPelletPositions.forEach((p, i) => {
    if (walls.has(hexKey(p.q, p.r))) {
        let best = null, bestDist = 999;
        paths.forEach(ph => {
            const d = hexDist(p.q, p.r, ph.q, ph.r);
            if (d < bestDist) { bestDist = d; best = ph; }
        });
        if (best) powerPelletPositions[i] = { q: best.q, r: best.r };
    }
});

// =============================================
// WALL RENDERING
// =============================================
const wallGroup = new THREE.Group();
scene.add(wallGroup);

const wallMat = new THREE.MeshStandardMaterial({
    color: 0x0a0a3a,
    roughness: 0.5,
    metalness: 0.3,
});
const edgeMat = new THREE.LineBasicMaterial({ color: 0x4444ff });
const glowMat = new THREE.MeshBasicMaterial({
    color: 0x2222ff,
    transparent: true,
    opacity: 0.08,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    depthWrite: false,
});

const wallGeo = new THREE.CylinderGeometry(0.85, 0.85, 0.6, 6);
wallGeo.rotateY(Math.PI / 6); // flat-top
const wallEdgeGeo = new THREE.EdgesGeometry(wallGeo);

const glowGeo = new THREE.CylinderGeometry(0.95, 0.95, 0.62, 6);
glowGeo.rotateY(Math.PI / 6);

walls.forEach(key => {
    const [q, r] = key.split(',').map(Number);
    const s = -q - r;
    const dist = Math.max(Math.abs(q), Math.abs(r), Math.abs(s));
    if (dist > HEX_RADIUS) return;

    const pos = hexToWorld(q, r);

    // Solid wall block
    const mesh = new THREE.Mesh(wallGeo, wallMat);
    mesh.position.set(pos.x, 0.3, pos.z);
    wallGroup.add(mesh);

    // Neon edge lines
    const edges = new THREE.LineSegments(wallEdgeGeo, edgeMat);
    edges.position.set(pos.x, 0.3, pos.z);
    wallGroup.add(edges);

    // Glow cylinder
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.position.set(pos.x, 0.3, pos.z);
    wallGroup.add(glow);
});

// =============================================
// FLOOR RENDERING
// =============================================
const floorGroup = new THREE.Group();
scene.add(floorGroup);

const floorGeo = new THREE.CylinderGeometry(0.82, 0.82, 0.02, 6);
floorGeo.rotateY(Math.PI / 6);
const floorMat = new THREE.MeshStandardMaterial({
    color: 0x080810,
    roughness: 0.9,
    metalness: 0.1,
});
const floorEdgeMat = new THREE.LineBasicMaterial({
    color: 0x222244,
    transparent: true,
    opacity: 0.15,
});
const floorEdgeGeo = new THREE.EdgesGeometry(floorGeo);

paths.forEach(h => {
    const pos = hexToWorld(h.q, h.r);
    const floorMesh = new THREE.Mesh(floorGeo, floorMat);
    floorMesh.position.set(pos.x, 0.01, pos.z);
    floorGroup.add(floorMesh);

    const floorEdges = new THREE.LineSegments(floorEdgeGeo, floorEdgeMat);
    floorEdges.position.set(pos.x, 0.01, pos.z);
    floorGroup.add(floorEdges);
});

// =============================================
// PACMAN
// =============================================
const pacGroup = new THREE.Group();
scene.add(pacGroup);

const pacMat = new THREE.MeshStandardMaterial({
    color: 0xffcc00,
    emissive: 0xffaa00,
    emissiveIntensity: 0.3,
    roughness: 0.3,
    metalness: 0.2,
});

// Top jaw
const topJawGeo = new THREE.SphereGeometry(0.35, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
const topJaw = new THREE.Mesh(topJawGeo, pacMat);
pacGroup.add(topJaw);

// Bottom jaw
const botJawGeo = new THREE.SphereGeometry(0.35, 16, 8, 0, Math.PI * 2, Math.PI / 2, Math.PI / 2);
const botJaw = new THREE.Mesh(botJawGeo, pacMat);
pacGroup.add(botJaw);

pacGroup.position.y = 0.35;

// Pacman point light
const pacLight = new THREE.PointLight(0xffcc00, 0.6, 4, 1.5);
pacLight.position.set(0, 0.5, 0);
pacGroup.add(pacLight);

// Pacman trail (afterimage spheres)
const trailSpheres = [];
const trailMat = [];
for (let i = 0; i < 4; i++) {
    const mat = new THREE.MeshBasicMaterial({
        color: 0xffcc00,
        transparent: true,
        opacity: 0.3 - i * 0.07,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
    });
    trailMat.push(mat);
    const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.25 - i * 0.04, 8, 8),
        mat
    );
    sphere.position.y = 0.35;
    scene.add(sphere);
    trailSpheres.push(sphere);
}

// Pacman sparkle particles
const sparkleCount = 12;
const sparkles = [];
const sparkleMat = new THREE.MeshBasicMaterial({
    color: 0xffee44,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
});
for (let i = 0; i < sparkleCount; i++) {
    const sp = new THREE.Mesh(new THREE.SphereGeometry(0.02, 4, 4), sparkleMat);
    sp.userData = {
        angle: (i / sparkleCount) * Math.PI * 2,
        radius: 0.4 + sRand() * 0.3,
        speed: 1.5 + sRand() * 2,
        yOff: sRand() * 0.3,
    };
    scene.add(sp);
    sparkles.push(sp);
}

// Pacman movement path
const pacPath = buildPathSeeded(2, -2, 120);
let pacPathIndex = 0;
let pacLerpT = 0;
const pacSpeed = 3.0; // hexes per second

// Track eaten dot hexes (Pacman's past positions)
const eatenDots = new Set();
// Pre-eat ~40% of dots
const pathCopy = [...paths];
for (let i = 0; i < Math.floor(paths.length * 0.4); i++) {
    const idx = Math.floor(sRand() * pathCopy.length);
    eatenDots.add(hexKey(pathCopy[idx].q, pathCopy[idx].r));
}
// Also eat along Pacman's early path
for (let i = 0; i < 30 && i < pacPath.length; i++) {
    eatenDots.add(hexKey(pacPath[i].q, pacPath[i].r));
}
// Don't eat ghost house
ghostHouseCoords.forEach(h => eatenDots.add(hexKey(h.q, h.r)));
// Don't eat power pellet locations (they have their own visuals)
powerPelletPositions.forEach(p => eatenDots.add(hexKey(p.q, p.r)));

// Trail position history
const trailPositions = [
    new THREE.Vector3(), new THREE.Vector3(),
    new THREE.Vector3(), new THREE.Vector3()
];

// =============================================
// GHOSTS
// =============================================
const ghostDefs = [
    { name: 'Blinky', color: 0xff0000, startQ: -3, startR: 1, frightened: false },
    { name: 'Pinky', color: 0xffbbff, startQ: 3, startR: -1, frightened: false },
    { name: 'Inky', color: 0x00ffff, startQ: -2, startR: -3, frightened: false },
    { name: 'Clyde', color: 0xffaa00, startQ: 4, startR: -3, frightened: true },
];

const ghosts = [];

ghostDefs.forEach(def => {
    const group = new THREE.Group();

    const ghostColor = def.frightened ? 0x4444ff : def.color;

    // Body cylinder
    const bodyMat = new THREE.MeshStandardMaterial({
        color: ghostColor,
        emissive: ghostColor,
        emissiveIntensity: 0.15,
        roughness: 0.4,
        metalness: 0.1,
        transparent: true,
        opacity: 0.95,
    });
    const bodyGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.3, 8);
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0;
    group.add(body);

    // Head hemisphere
    const headGeo = new THREE.SphereGeometry(0.3, 8, 8, 0, Math.PI * 2, 0, Math.PI / 2);
    const head = new THREE.Mesh(headGeo, bodyMat);
    head.position.y = 0.15;
    group.add(head);

    // Scalloped bottom: 6 small spheres
    const scallMat = new THREE.MeshStandardMaterial({
        color: ghostColor,
        emissive: ghostColor,
        emissiveIntensity: 0.1,
        transparent: true,
        opacity: 0.7,
    });
    for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2;
        const sc = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6), scallMat);
        sc.position.set(Math.cos(angle) * 0.24, -0.15, Math.sin(angle) * 0.24);
        group.add(sc);
    }

    // Eyes
    const eyeWhiteMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const eyePupilMat = new THREE.MeshBasicMaterial({ color: 0x111133 });

    const leftEye = new THREE.Group();
    const lWhite = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), eyeWhiteMat);
    const lPupil = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), eyePupilMat);
    lPupil.position.z = 0.06;
    leftEye.add(lWhite);
    leftEye.add(lPupil);
    leftEye.position.set(-0.12, 0.2, 0.22);
    group.add(leftEye);

    const rightEye = new THREE.Group();
    const rWhite = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), eyeWhiteMat);
    const rPupil = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), eyePupilMat);
    rPupil.position.z = 0.06;
    rightEye.add(rWhite);
    rightEye.add(rPupil);
    rightEye.position.set(0.12, 0.2, 0.22);
    group.add(rightEye);

    // Frightened mouth (zigzag for Clyde)
    let zigzagMouth = null;
    if (def.frightened) {
        const mouthShape = new THREE.BufferGeometry();
        const mVerts = new Float32Array([
            -0.15, 0.05, 0.29,
            -0.10, 0.0, 0.30,
            -0.05, 0.05, 0.29,
             0.0, 0.0, 0.30,
             0.05, 0.05, 0.29,
             0.10, 0.0, 0.30,
             0.15, 0.05, 0.29,
        ]);
        mouthShape.setAttribute('position', new THREE.BufferAttribute(mVerts, 3));
        zigzagMouth = new THREE.Line(mouthShape, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 }));
        group.add(zigzagMouth);
    }

    // Ghost point light
    const ghostLight = new THREE.PointLight(ghostColor, 0.3, 3, 1.5);
    ghostLight.position.y = 0.3;
    group.add(ghostLight);

    group.position.y = 0.35;

    scene.add(group);

    // Build movement path
    const ghostPath = buildPathSeeded(def.startQ, def.startR, 150);

    ghosts.push({
        group,
        body,
        head,
        bodyMat,
        scallMat,
        leftEye,
        rightEye,
        ghostLight,
        zigzagMouth,
        path: ghostPath,
        pathIndex: 0,
        lerpT: 0,
        speed: 2.0 + sRand() * 0.8,
        def,
    });
});

// =============================================
// DOTS (collectible orbs)
// =============================================
const dotGroup = new THREE.Group();
scene.add(dotGroup);

const dotMat = new THREE.MeshBasicMaterial({
    color: 0xaaffff,
    transparent: true,
    opacity: 0.85,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
});
const dotGeo = new THREE.SphereGeometry(0.08, 8, 8);

const dots = [];
paths.forEach(h => {
    const key = hexKey(h.q, h.r);
    if (eatenDots.has(key)) return;

    const pos = hexToWorld(h.q, h.r);
    const dot = new THREE.Mesh(dotGeo, dotMat);
    dot.position.set(pos.x, 0.25, pos.z);
    dot.userData = { q: h.q, r: h.r, alive: true, bobOffset: sRand() * Math.PI * 2 };
    dotGroup.add(dot);
    dots.push(dot);
});

// Dot eating particles
const eatParticles = [];
const eatParticleMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 1,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
});

function spawnEatParticles(x, y, z) {
    for (let i = 0; i < 5; i++) {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.03, 4, 4), eatParticleMat.clone());
        p.position.set(x, y, z);
        p.userData = {
            vx: (sRand() - 0.5) * 2,
            vy: sRand() * 2 + 1,
            vz: (sRand() - 0.5) * 2,
            life: 1.0,
        };
        scene.add(p);
        eatParticles.push(p);
    }
}

// =============================================
// POWER PELLETS
// =============================================
const powerPellets = [];
const ppCoreMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.95,
});
const ppGlowMat = new THREE.MeshBasicMaterial({
    color: 0xaaddff,
    transparent: true,
    opacity: 0.15,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
});

powerPelletPositions.forEach((p, idx) => {
    const pos = hexToWorld(p.q, p.r);
    const ppGroup = new THREE.Group();
    ppGroup.position.set(pos.x, 0.3, pos.z);

    // Core sphere
    const core = new THREE.Mesh(new THREE.SphereGeometry(0.2, 12, 12), ppCoreMat.clone());
    ppGroup.add(core);

    // Glow sphere
    const glow = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 12), ppGlowMat.clone());
    ppGroup.add(glow);

    // Point light
    const light = new THREE.PointLight(0xffffff, 0.8, 5, 1.5);
    ppGroup.add(light);

    // Orbiting particle ring
    const orbitParticles = [];
    for (let i = 0; i < 8; i++) {
        const op = new THREE.Mesh(
            new THREE.SphereGeometry(0.03, 4, 4),
            new THREE.MeshBasicMaterial({
                color: 0xaaddff,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            })
        );
        op.userData = { angle: (i / 8) * Math.PI * 2 };
        ppGroup.add(op);
        orbitParticles.push(op);
    }

    scene.add(ppGroup);

    // Mark one as "recently eaten" (burst effect)
    const isEaten = idx === 2;

    powerPellets.push({
        group: ppGroup,
        core,
        glow,
        light,
        orbitParticles,
        eaten: isEaten,
        burstTime: isEaten ? 0 : -1,
    });

    if (isEaten) {
        core.visible = false;
        glow.visible = false;
        light.intensity = 0;
    }
});

// Burst ring for eaten power pellet
const burstRingGeo = new THREE.RingGeometry(0.1, 0.15, 16);
const burstRingMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 1,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide,
});
const burstRing = new THREE.Mesh(burstRingGeo, burstRingMat);
burstRing.rotation.x = -Math.PI / 2;
const eatenPP = powerPellets.find(p => p.eaten);
if (eatenPP) {
    burstRing.position.copy(eatenPP.group.position);
    burstRing.position.y = 0.3;
    scene.add(burstRing);
}

// =============================================
// CHERRY BONUS
// =============================================
const cherryGroup = new THREE.Group();
// Find a path hex for cherry placement
const cherryHex = paths.find(h => h.q === 3 && h.r === 2) || paths[Math.floor(paths.length / 3)];
const cherryPos = hexToWorld(cherryHex.q, cherryHex.r);
cherryGroup.position.set(cherryPos.x, 0.3, cherryPos.z);

const cherryMat = new THREE.MeshStandardMaterial({
    color: 0xff2222,
    emissive: 0xff0000,
    emissiveIntensity: 0.15,
    roughness: 0.3,
});
const stemMat = new THREE.MeshStandardMaterial({
    color: 0x22aa22,
    emissive: 0x118811,
    emissiveIntensity: 0.1,
});

// Two cherries
const cherry1 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), cherryMat);
cherry1.position.set(-0.08, 0, 0.05);
cherryGroup.add(cherry1);

const cherry2 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), cherryMat);
cherry2.position.set(0.08, 0, -0.05);
cherryGroup.add(cherry2);

// Stems
const stem1 = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.15, 4), stemMat);
stem1.position.set(-0.05, 0.12, 0.03);
stem1.rotation.z = 0.3;
cherryGroup.add(stem1);

const stem2 = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.15, 4), stemMat);
stem2.position.set(0.05, 0.12, -0.03);
stem2.rotation.z = -0.3;
cherryGroup.add(stem2);

scene.add(cherryGroup);

// Cherry sparkle particles
const cherrySparkles = [];
for (let i = 0; i < 6; i++) {
    const sp = new THREE.Mesh(
        new THREE.SphereGeometry(0.015, 4, 4),
        new THREE.MeshBasicMaterial({
            color: 0xff4444,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
        })
    );
    sp.userData = { angle: (i / 6) * Math.PI * 2, speed: 1 + sRand() };
    cherryGroup.add(sp);
    cherrySparkles.push(sp);
}

// =============================================
// "READY!" TEXT (3D floating)
// =============================================
const readyEl = document.getElementById('ready');
let readyOpacity = 1.0;
let readyStartTime = -1;

// =============================================
// SCORE
// =============================================
let displayScore = 2450;
let scoreTimer = 0;
const scoreEl = document.getElementById('scoreDisplay');

// =============================================
// FPS COUNTER
// =============================================
const statsEl = document.getElementById('stats');
let frameCount = 0;
let fpsTime = 0;

// =============================================
// RESIZE
// =============================================
window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    aspect = w / h;
    camera.left = frustum * aspect / -2;
    camera.right = frustum * aspect / 2;
    camera.top = frustum / 2;
    camera.bottom = frustum / -2;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

// =============================================
// ANIMATION LOOP
// =============================================
const clock = new THREE.Clock();
let elapsed = 0;

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    elapsed += dt;

    if (readyStartTime < 0) readyStartTime = elapsed;

    // --- FPS ---
    frameCount++;
    fpsTime += dt;
    if (fpsTime >= 0.5) {
        statsEl.textContent = Math.round(frameCount / fpsTime) + ' FPS';
        frameCount = 0;
        fpsTime = 0;
    }

    // --- "READY!" fade ---
    const readyAge = elapsed - readyStartTime;
    if (readyAge > 2.0) {
        readyOpacity = Math.max(0, readyOpacity - dt * 2);
        readyEl.style.opacity = readyOpacity;
        if (readyOpacity <= 0) readyEl.style.display = 'none';
    }

    // --- Score increment ---
    scoreTimer += dt;
    if (scoreTimer > 0.8) {
        scoreTimer = 0;
        displayScore += 10;
        scoreEl.textContent = 'SCORE: ' + displayScore.toLocaleString();
    }

    // --- PACMAN MOVEMENT ---
    pacLerpT += dt * pacSpeed;
    while (pacLerpT >= 1.0 && pacPathIndex < pacPath.length - 2) {
        pacLerpT -= 1.0;
        pacPathIndex++;
        // Eat dot at current position
        const curHex = pacPath[pacPathIndex];
        eatenDots.add(hexKey(curHex.q, curHex.r));
        // Find and hide the dot
        dots.forEach(d => {
            if (d.userData.alive && d.userData.q === curHex.q && d.userData.r === curHex.r) {
                d.userData.alive = false;
                d.visible = false;
                spawnEatParticles(d.position.x, d.position.y, d.position.z);
            }
        });
    }
    if (pacPathIndex >= pacPath.length - 2) {
        pacPathIndex = 0;
        pacLerpT = 0;
    }

    const fromHex = pacPath[pacPathIndex];
    const toHex = pacPath[pacPathIndex + 1];
    const fromPos = hexToWorld(fromHex.q, fromHex.r);
    const toPos = hexToWorld(toHex.q, toHex.r);
    const t = Math.min(pacLerpT, 1.0);

    const px = fromPos.x + (toPos.x - fromPos.x) * t;
    const pz = fromPos.z + (toPos.z - fromPos.z) * t;

    pacGroup.position.x = px;
    pacGroup.position.z = pz;

    // Face direction of movement
    const dx = toPos.x - fromPos.x;
    const dz = toPos.z - fromPos.z;
    if (Math.abs(dx) > 0.01 || Math.abs(dz) > 0.01) {
        pacGroup.rotation.y = Math.atan2(dx, dz);
    }

    // Chomp animation
    const chompAngle = Math.abs(Math.sin(elapsed * 8)) * 0.35;
    topJaw.rotation.x = -chompAngle;
    botJaw.rotation.x = chompAngle;

    // Trail positions (shift)
    for (let i = trailPositions.length - 1; i > 0; i--) {
        trailPositions[i].copy(trailPositions[i - 1]);
    }
    trailPositions[0].set(px, 0.35, pz);

    trailSpheres.forEach((sp, i) => {
        sp.position.copy(trailPositions[i]);
    });

    // Sparkles around Pacman
    sparkles.forEach(sp => {
        const ud = sp.userData;
        ud.angle += dt * ud.speed;
        sp.position.set(
            px + Math.cos(ud.angle) * ud.radius,
            0.35 + Math.sin(ud.angle * 1.5) * 0.15 + ud.yOff,
            pz + Math.sin(ud.angle) * ud.radius
        );
    });

    // --- GHOST MOVEMENT ---
    ghosts.forEach(g => {
        g.lerpT += dt * g.speed;
        while (g.lerpT >= 1.0 && g.pathIndex < g.path.length - 2) {
            g.lerpT -= 1.0;
            g.pathIndex++;
        }
        if (g.pathIndex >= g.path.length - 2) {
            g.pathIndex = 0;
            g.lerpT = 0;
        }

        const gFrom = g.path[g.pathIndex];
        const gTo = g.path[g.pathIndex + 1];
        const gFromPos = hexToWorld(gFrom.q, gFrom.r);
        const gToPos = hexToWorld(gTo.q, gTo.r);
        const gt = Math.min(g.lerpT, 1.0);

        const gx = gFromPos.x + (gToPos.x - gFromPos.x) * gt;
        const gz = gFromPos.z + (gToPos.z - gFromPos.z) * gt;

        g.group.position.x = gx;
        g.group.position.z = gz;

        // Hover bob
        g.group.position.y = 0.35 + Math.sin(elapsed * 3 + g.pathIndex) * 0.04;

        // Eye direction
        const gdx = gToPos.x - gFromPos.x;
        const gdz = gToPos.z - gFromPos.z;
        if (Math.abs(gdx) > 0.01 || Math.abs(gdz) > 0.01) {
            const eyeAngle = Math.atan2(gdx, gdz);
            g.leftEye.rotation.y = eyeAngle;
            g.rightEye.rotation.y = eyeAngle;
        }

        // Frightened Clyde flashing
        if (g.def.frightened) {
            const flash = Math.floor(elapsed * 2) % 2 === 0;
            const col = flash ? 0x4444ff : 0xffffff;
            g.bodyMat.color.setHex(col);
            g.bodyMat.emissive.setHex(flash ? 0x2222aa : 0xaaaaaa);
            g.scallMat.color.setHex(col);
            g.scallMat.emissive.setHex(flash ? 0x2222aa : 0xaaaaaa);
            g.ghostLight.color.setHex(col);
        }
    });

    // --- DOT BOBBING ---
    dots.forEach(d => {
        if (!d.userData.alive) return;
        d.position.y = 0.25 + Math.sin(elapsed * 2 + d.userData.bobOffset) * 0.02;
    });

    // --- EAT PARTICLES ---
    for (let i = eatParticles.length - 1; i >= 0; i--) {
        const p = eatParticles[i];
        p.userData.life -= dt * 2;
        if (p.userData.life <= 0) {
            scene.remove(p);
            p.geometry.dispose();
            p.material.dispose();
            eatParticles.splice(i, 1);
            continue;
        }
        p.position.x += p.userData.vx * dt;
        p.position.y += p.userData.vy * dt;
        p.position.z += p.userData.vz * dt;
        p.userData.vy -= dt * 4;
        p.material.opacity = p.userData.life;
        p.scale.setScalar(p.userData.life);
    }

    // --- POWER PELLET PULSING ---
    powerPellets.forEach((pp, idx) => {
        if (pp.eaten) {
            // Burst effect
            pp.burstTime += dt;
            if (burstRing) {
                const bScale = 1 + pp.burstTime * 4;
                burstRing.scale.setScalar(bScale);
                burstRingMat.opacity = Math.max(0, 1 - pp.burstTime * 1.5);
            }
            // Hide orbit particles
            pp.orbitParticles.forEach(op => op.visible = false);
            return;
        }

        const pulse = 0.8 + Math.sin(elapsed * 4 + idx) * 0.2;
        pp.core.scale.setScalar(pulse);
        pp.glow.scale.setScalar(pulse * 1.1);
        pp.light.intensity = 0.5 + Math.sin(elapsed * 4 + idx) * 0.3;

        // Orbiting particles
        pp.orbitParticles.forEach(op => {
            op.userData.angle += dt * 2;
            op.position.set(
                Math.cos(op.userData.angle) * 0.45,
                Math.sin(op.userData.angle * 1.3) * 0.1,
                Math.sin(op.userData.angle) * 0.45
            );
        });
    });

    // --- CHERRY ROTATION ---
    cherryGroup.rotation.y += dt * 0.8;
    cherrySparkles.forEach(sp => {
        sp.userData.angle += dt * sp.userData.speed;
        sp.position.set(
            Math.cos(sp.userData.angle) * 0.25,
            Math.sin(sp.userData.angle * 2) * 0.1 + 0.05,
            Math.sin(sp.userData.angle) * 0.25
        );
    });

    // --- CONTROLS & RENDER ---
    controls.update();
    renderer.render(scene, camera);
}

animate();

</script>
