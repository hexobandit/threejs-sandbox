<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 / Prince of Persia 2050</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0815; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #ui-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }

  #top-left {
    position: absolute; top: 16px; left: 20px;
    color: #ffaa00; font-size: 14px; font-weight: bold;
    text-shadow: 0 0 8px rgba(255,170,0,0.6);
  }
  #top-left .fps { color: #888; font-size: 11px; margin-top: 4px; text-shadow: none; }

  #top-right {
    position: absolute; top: 16px; right: 20px;
  }
  #top-right a {
    color: #33ff66; font-size: 13px; text-decoration: none;
    pointer-events: auto; text-shadow: 0 0 6px rgba(51,255,102,0.5);
  }
  #top-right a:hover { text-decoration: underline; }

  #timer {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    color: #ffffff; font-size: 20px; font-weight: bold; letter-spacing: 3px;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
  }

  #bottom-bar {
    position: absolute; bottom: 16px; left: 0; width: 100%;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }

  .health-row {
    display: flex; align-items: center; gap: 10px; font-size: 13px;
  }
  .health-row.p1 { color: #00ddff; text-shadow: 0 0 6px rgba(0,221,255,0.5); }
  .health-row.p2 { color: #ffaa00; text-shadow: 0 0 6px rgba(255,170,0,0.5); }

  #level-label {
    color: #8833ff; font-size: 12px; letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(136,51,255,0.5);
  }

  #coop-badge {
    position: absolute; top: 48px; left: 50%; transform: translateX(-50%);
    color: #8833ff; font-size: 10px; letter-spacing: 3px;
    border: 1px solid #8833ff; padding: 2px 10px;
    text-shadow: 0 0 6px rgba(136,51,255,0.4);
    box-shadow: 0 0 8px rgba(136,51,255,0.2);
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui-overlay">
  <div id="top-left">
    12 / PRINCE OF PERSIA 2050
    <div class="fps" id="fps">60 FPS</div>
  </div>
  <div id="top-right"><a href="index.html">[BACK]</a></div>
  <div id="timer">TIME: <span id="timer-val">4:32</span></div>
  <div id="coop-badge">MULTIPLAYER CO-OP</div>
  <div id="bottom-bar">
    <div class="health-row p1">PLAYER 1: <span id="hp1"></span> HP</div>
    <div class="health-row p2">PLAYER 2: <span id="hp2"></span> HP</div>
    <div id="level-label">LEVEL 4 &mdash; THE CYBER DUNGEON</div>
  </div>
</div>

<script>
// ---- Setup ----
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr, gameX, gameY, scale;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Fit 800x500 game area
  const sx = W / 800, sy = H / 500;
  scale = Math.min(sx, sy) * 0.9;
  gameX = (W - 800 * scale) / 2;
  gameY = (H - 500 * scale) / 2;
}
window.addEventListener('resize', resize);
resize();

// ---- Colors ----
const BG = '#0a0815';
const PLAT_FILL = '#2a2a3a';
const CYAN = '#00ddff';
const GOLD = '#ffaa00';
const RED = '#ff3333';
const PURPLE = '#8833ff';
const GREEN = '#33ff88';

// ---- Level data ----
// Platforms: [x, y, w, h]  (in game coords 0-800, 0-500)
// Level 1 bottom ~400, Level 2 ~270, Level 3 ~140

const platforms = [
  // Level 1 (bottom)
  { x: 20, y: 400, w: 520, h: 24, level: 1 },
  { x: 600, y: 400, w: 80, h: 24, level: 1 },
  { x: 720, y: 400, w: 70, h: 24, level: 1 },

  // Level 2 (mid)
  { x: 20, y: 270, w: 120, h: 24, level: 2 },
  { x: 170, y: 270, w: 80, h: 24, level: 2, loose: true },
  { x: 280, y: 270, w: 140, h: 24, level: 2 },
  { x: 500, y: 270, w: 100, h: 24, level: 2 },
  { x: 650, y: 270, w: 130, h: 24, level: 2 },

  // Level 3 (top)
  { x: 20, y: 140, w: 160, h: 24, level: 3 },
  { x: 260, y: 140, w: 120, h: 24, level: 3, spikes: true },
  { x: 440, y: 140, w: 80, h: 24, level: 3 },
  { x: 560, y: 140, w: 100, h: 24, level: 3 },
  { x: 710, y: 140, w: 80, h: 24, level: 3 },
];

// Walls (vertical blocks)
const walls = [
  { x: 0, y: 0, w: 16, h: 500 },
  { x: 784, y: 0, w: 16, h: 500 },
  { x: 0, y: 480, w: 800, h: 20 },
  // Pillars
  { x: 170, y: 400, w: 12, h: 130 },
  { x: 440, y: 270, w: 12, h: 130 },
  { x: 650, y: 140, w: 12, h: 130 },
];

// Spike traps
const spikes = [
  { x: 280, y: 140, w: 100, level: 3 },
  { x: 600, y: 400, w: 60, level: 1 },
];

// Chomper trap
const chomper = { x: 468, y: 270, w: 24 };

// Pressure plates
const plates = [
  { x: 100, y: 270, w: 20 },
  { x: 360, y: 400, w: 20 },
];

// Gate (vertical bars)
const gate = { x: 548, y: 270, bars: 4, openAmount: 0.5 };

// Pickups
const potion = { x: 50, y: 128, r: 6 };
const sword = { x: 720, y: 256, len: 18 };

// Torches
const torches = [
  { x: 8, y: 100 }, { x: 8, y: 250 }, { x: 8, y: 370 },
  { x: 790, y: 160 }, { x: 790, y: 340 },
  { x: 176, y: 360 }, { x: 448, y: 230 },
];

// ---- Background palace silhouettes ----
function drawPalaceSilhouettes(t) {
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#1a1030';

  // Dome 1
  drawDome(150, 60, 60, 40);
  // Dome 2
  drawDome(400, 40, 80, 50);
  // Minaret 1
  drawMinaret(300, 30, 12, 90);
  // Minaret 2
  drawMinaret(550, 50, 10, 70);
  // Dome 3
  drawDome(650, 55, 50, 35);

  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#2a1848';
  // Columns in background
  for (let i = 0; i < 8; i++) {
    const cx = 60 + i * 95;
    ctx.fillRect(cx, 80, 6, 420);
    // Capital
    ctx.fillRect(cx - 4, 76, 14, 6);
  }
  ctx.restore();
}

function drawDome(cx, baseY, rx, ry) {
  ctx.beginPath();
  ctx.ellipse(cx, baseY, rx, ry, 0, Math.PI, 0);
  ctx.fill();
  // Base rectangle
  ctx.fillRect(cx - rx, baseY, rx * 2, 20);
}

function drawMinaret(cx, baseY, r, h) {
  ctx.fillRect(cx - r, baseY, r * 2, h);
  // Top dome
  ctx.beginPath();
  ctx.ellipse(cx, baseY, r + 2, r, 0, Math.PI, 0);
  ctx.fill();
  // Crescent on top
  ctx.beginPath();
  ctx.arc(cx, baseY - r - 3, 3, 0, Math.PI * 2);
  ctx.fill();
}

// ---- Drawing helpers ----
function drawBrickPattern(x, y, w, h) {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  const brickW = 20, brickH = 8;
  for (let row = 0; row < Math.ceil(h / brickH); row++) {
    const by = y + row * brickH;
    if (by > y + h) break;
    const offset = (row % 2) * (brickW / 2);
    for (let col = -1; col < Math.ceil(w / brickW) + 1; col++) {
      const bx = x + col * brickW + offset;
      ctx.strokeRect(bx, by, brickW, brickH);
    }
  }
  ctx.restore();
}

function drawPlatform(p, t) {
  const edgeColors = { 1: '#4466aa', 2: '#6644aa', 3: '#aa4466' };
  const edgeColor = edgeColors[p.level] || '#4466aa';

  ctx.fillStyle = PLAT_FILL;
  if (p.loose) {
    // Shaking animation
    const shake = Math.sin(t * 6) * 1.5;
    ctx.save();
    ctx.translate(shake, 0);
    ctx.fillRect(p.x, p.y, p.w, p.h);
    drawBrickPattern(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#3a3a4a';
    ctx.fillRect(p.x + 2, p.y + 2, p.w - 4, 3);
    // Bright top edge
    ctx.strokeStyle = '#ffaa33';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#ffaa33';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + p.w, p.y);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Crack lines
    ctx.strokeStyle = 'rgba(255,150,50,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(p.x + p.w * 0.3, p.y);
    ctx.lineTo(p.x + p.w * 0.35, p.y + p.h);
    ctx.moveTo(p.x + p.w * 0.7, p.y);
    ctx.lineTo(p.x + p.w * 0.65, p.y + p.h);
    ctx.stroke();
    ctx.restore();
    return;
  }

  ctx.fillRect(p.x, p.y, p.w, p.h);
  drawBrickPattern(p.x, p.y, p.w, p.h);

  // Bright top edge
  ctx.save();
  ctx.strokeStyle = edgeColor;
  ctx.lineWidth = 2;
  ctx.shadowColor = edgeColor;
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x + p.w, p.y);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawWall(w) {
  ctx.fillStyle = '#1a1a28';
  ctx.fillRect(w.x, w.y, w.w, w.h);
  drawBrickPattern(w.x, w.y, w.w, w.h);
  // Edge glow
  ctx.save();
  ctx.strokeStyle = 'rgba(136,51,255,0.15)';
  ctx.lineWidth = 1;
  ctx.strokeRect(w.x, w.y, w.w, w.h);
  ctx.restore();
}

function drawSpikes(s, t) {
  const pulse = 0.5 + 0.5 * Math.sin(t * 4);
  const baseY = s.level === 3 ? 140 : 400;
  const count = Math.floor(s.w / 10);

  ctx.save();
  ctx.shadowColor = RED;
  ctx.shadowBlur = 8 + pulse * 8;
  ctx.fillStyle = RED;
  ctx.globalAlpha = 0.6 + pulse * 0.4;

  for (let i = 0; i < count; i++) {
    const sx = s.x + i * 10 + 5;
    ctx.beginPath();
    ctx.moveTo(sx - 4, baseY);
    ctx.lineTo(sx, baseY - 12);
    ctx.lineTo(sx + 4, baseY);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawChomper(c, t) {
  const cycle = (t % 2) / 2; // 0-1 over 2 seconds
  let openFrac;
  if (cycle < 0.7) openFrac = 1;
  else if (cycle < 0.8) openFrac = 1 - (cycle - 0.7) / 0.1;
  else if (cycle < 0.85) openFrac = 0;
  else openFrac = (cycle - 0.85) / 0.15;

  const gap = openFrac * 20;
  const halfH = (24 - gap) / 2;

  ctx.save();
  ctx.shadowColor = RED;
  ctx.shadowBlur = openFrac < 0.3 ? 12 : 4;

  // Top jaw
  ctx.fillStyle = '#4a2a2a';
  ctx.fillRect(c.x, c.y - halfH + 12 - gap / 2, c.w, halfH);
  // Teeth top
  ctx.fillStyle = RED;
  for (let i = 0; i < 3; i++) {
    const tx = c.x + 4 + i * 8;
    ctx.beginPath();
    ctx.moveTo(tx, c.y + 12 - gap / 2);
    ctx.lineTo(tx + 3, c.y + 12 - gap / 2 + 5);
    ctx.lineTo(tx + 6, c.y + 12 - gap / 2);
    ctx.fill();
  }

  // Bottom jaw
  ctx.fillStyle = '#4a2a2a';
  ctx.fillRect(c.x, c.y + 12 + gap / 2, c.w, halfH);
  // Teeth bottom
  ctx.fillStyle = RED;
  for (let i = 0; i < 3; i++) {
    const tx = c.x + 4 + i * 8;
    ctx.beginPath();
    ctx.moveTo(tx, c.y + 12 + gap / 2);
    ctx.lineTo(tx + 3, c.y + 12 + gap / 2 - 5);
    ctx.lineTo(tx + 6, c.y + 12 + gap / 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawPressurePlate(p) {
  ctx.save();
  ctx.fillStyle = '#555566';
  ctx.shadowColor = PURPLE;
  ctx.shadowBlur = 4;
  ctx.fillRect(p.x, 268, p.w, 3);
  ctx.restore();
}

function drawGate(g, t) {
  const openAmt = g.openAmount + Math.sin(t * 0.3) * 0.02; // slowly raising
  const barH = 130 * (1 - Math.min(openAmt + t * 0.005, 0.65));

  ctx.save();
  ctx.shadowColor = PURPLE;
  ctx.shadowBlur = 4;
  ctx.strokeStyle = '#6644aa';
  ctx.lineWidth = 2;

  for (let i = 0; i < g.bars; i++) {
    const bx = g.x + i * 6;
    ctx.beginPath();
    ctx.moveTo(bx, g.y - 130);
    ctx.lineTo(bx, g.y - 130 + barH);
    ctx.stroke();
  }
  // Top frame
  ctx.fillStyle = '#3a2a5a';
  ctx.fillRect(g.x - 4, g.y - 134, g.bars * 6 + 4, 6);
  ctx.restore();
}

function drawPotion(p, t) {
  const bob = Math.sin(t * 3) * 3;
  ctx.save();
  ctx.shadowColor = GREEN;
  ctx.shadowBlur = 12;
  ctx.fillStyle = GREEN;
  ctx.globalAlpha = 0.7 + Math.sin(t * 4) * 0.3;
  ctx.beginPath();
  ctx.arc(p.x, p.y + bob, p.r, 0, Math.PI * 2);
  ctx.fill();
  // Bottle neck
  ctx.fillRect(p.x - 2, p.y + bob - p.r - 4, 4, 5);
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.arc(p.x, p.y + bob, p.r + 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawSword(s, t) {
  const glow = 0.5 + 0.5 * Math.sin(t * 5);
  ctx.save();
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 6 + glow * 6;
  ctx.strokeStyle = '#eeeeff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(s.x, s.y);
  ctx.lineTo(s.x + s.len, s.y - 4);
  ctx.stroke();
  // Hilt
  ctx.strokeStyle = GOLD;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(s.x - 1, s.y - 3);
  ctx.lineTo(s.x - 1, s.y + 3);
  ctx.stroke();
  ctx.restore();
}

function drawTorch(tx, ty, t) {
  const flicker = Math.random() * 4;
  const r = 4 + Math.sin(t * 12 + tx) * 1.5 + flicker * 0.3;

  ctx.save();
  // Glow
  const grad = ctx.createRadialGradient(tx, ty, 0, tx, ty, 30);
  grad.addColorStop(0, 'rgba(255,160,40,0.25)');
  grad.addColorStop(1, 'rgba(255,100,20,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(tx - 30, ty - 30, 60, 60);

  // Flame core
  ctx.shadowColor = '#ff8800';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#ffaa33';
  ctx.beginPath();
  ctx.ellipse(tx, ty - 2, r * 0.6, r, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffdd88';
  ctx.beginPath();
  ctx.ellipse(tx, ty, r * 0.3, r * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Bracket
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#444';
  ctx.fillRect(tx - 2, ty + 4, 4, 8);
  ctx.restore();
}

// ---- Characters ----
function drawCharacter(x, y, color, frame, jumping, hasSword, facingRight) {
  const dir = facingRight ? 1 : -1;
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = 10;

  // Head
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y - 28, 5, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillRect(x - 3, y - 23, 6, 14);

  // Arms
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  if (hasSword) {
    // Sword arm extended
    ctx.moveTo(x, y - 20);
    ctx.lineTo(x + 12 * dir, y - 22);
    // Sword
    ctx.moveTo(x + 12 * dir, y - 22);
    ctx.lineTo(x + 24 * dir, y - 24);
  } else {
    ctx.moveTo(x, y - 20);
    ctx.lineTo(x + 8 * dir, y - 16);
  }
  // Other arm
  ctx.moveTo(x, y - 18);
  ctx.lineTo(x - 6 * dir, y - 14 + (jumping ? -4 : 0));
  ctx.stroke();

  // Legs
  ctx.lineWidth = 2.5;
  if (jumping) {
    // Tuck legs
    ctx.beginPath();
    ctx.moveTo(x, y - 9);
    ctx.lineTo(x + 5 * dir, y - 4);
    ctx.lineTo(x + 3 * dir, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y - 9);
    ctx.lineTo(x - 3 * dir, y - 4);
    ctx.lineTo(x - 5 * dir, y);
    ctx.stroke();
  } else {
    // Running: 2-frame cycle
    const legA = frame === 0 ? 6 : -4;
    const legB = frame === 0 ? -4 : 6;
    ctx.beginPath();
    ctx.moveTo(x, y - 9);
    ctx.lineTo(x + legA * dir, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y - 9);
    ctx.lineTo(x + legB * dir, y);
    ctx.stroke();
  }

  // Turban / head detail
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.ellipse(x + 2 * dir, y - 32, 3, 2, 0.3 * dir, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();
}

function drawAfterimage(x, y, color, alpha, frame, jumping, hasSword, facingRight) {
  ctx.save();
  ctx.globalAlpha = alpha;
  drawCharacter(x, y, color, frame, jumping, hasSword, facingRight);
  ctx.restore();
}

function drawGuard(x, y, frame, facingRight, fighting, t) {
  const dir = facingRight ? 1 : -1;
  const color = '#cc3333';
  ctx.save();
  ctx.shadowColor = RED;
  ctx.shadowBlur = 8;

  // Head (helmet)
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y - 28, 5, 0, Math.PI * 2);
  ctx.fill();
  // Helmet spike
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x, y - 33);
  ctx.lineTo(x, y - 38);
  ctx.stroke();

  // Body (slightly bulkier)
  ctx.fillRect(x - 4, y - 23, 8, 15);

  // Arms
  ctx.lineWidth = 2;
  if (fighting) {
    const swordAngle = Math.sin(t * 6) * 0.5;
    ctx.beginPath();
    ctx.moveTo(x, y - 20);
    const sx = x + Math.cos(swordAngle) * 14 * dir;
    const sy = y - 22 + Math.sin(swordAngle) * 8;
    ctx.lineTo(sx, sy);
    ctx.stroke();
    // Sword
    ctx.strokeStyle = '#ff6666';
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + Math.cos(swordAngle) * 14 * dir, sy + Math.sin(swordAngle) * 6);
    ctx.stroke();
    ctx.strokeStyle = color;
  } else {
    ctx.beginPath();
    ctx.moveTo(x, y - 20);
    ctx.lineTo(x + 7 * dir, y - 16);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(x, y - 18);
  ctx.lineTo(x - 5 * dir, y - 14);
  ctx.stroke();

  // Legs
  ctx.lineWidth = 2.5;
  const legA = frame === 0 ? 5 : -3;
  const legB = frame === 0 ? -3 : 5;
  ctx.beginPath();
  ctx.moveTo(x, y - 8);
  ctx.lineTo(x + legA * dir, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y - 8);
  ctx.lineTo(x + legB * dir, y);
  ctx.stroke();

  ctx.restore();
}

// ---- Persian arch decoration ----
function drawArch(x, y, w, h) {
  ctx.save();
  ctx.strokeStyle = 'rgba(136,51,255,0.15)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  // Pointed arch
  ctx.moveTo(x, y + h);
  ctx.lineTo(x, y + h * 0.4);
  ctx.quadraticCurveTo(x, y, x + w / 2, y - h * 0.1);
  ctx.quadraticCurveTo(x + w, y, x + w, y + h * 0.4);
  ctx.lineTo(x + w, y + h);
  ctx.stroke();
  ctx.restore();
}

// ---- Particles ----
const dustParticles = [];
for (let i = 0; i < 40; i++) {
  dustParticles.push({
    x: Math.random() * 800,
    y: Math.random() * 500,
    vy: 0.2 + Math.random() * 0.4,
    vx: (Math.random() - 0.5) * 0.2,
    size: 0.5 + Math.random() * 1.5,
    alpha: 0.1 + Math.random() * 0.2,
  });
}

function updateDust(dt) {
  for (const p of dustParticles) {
    p.y += p.vy;
    p.x += p.vx;
    if (p.y > 500) { p.y = -5; p.x = Math.random() * 800; }
    if (p.x < 0) p.x = 800;
    if (p.x > 800) p.x = 0;
  }
}

function drawDust() {
  ctx.save();
  ctx.fillStyle = '#887766';
  for (const p of dustParticles) {
    ctx.globalAlpha = p.alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ---- CRT effects ----
function drawScanlines() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for (let y = 0; y < 500; y += 4) {
    ctx.fillRect(0, y, 800, 2);
  }
  ctx.restore();
}

function drawVignette() {
  ctx.save();
  const grad = ctx.createRadialGradient(400, 250, 150, 400, 250, 450);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 800, 500);
  ctx.restore();
}

// ---- Timer ----
let timerSeconds = 4 * 60 + 32; // 4:32
let lastTimerTick = 0;

function updateTimer(t) {
  if (t - lastTimerTick >= 1) {
    lastTimerTick = t;
    timerSeconds = Math.max(0, timerSeconds - 1);
  }
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('timer-val').textContent =
    m + ':' + (s < 10 ? '0' : '') + s;
}

// ---- Health bars ----
function updateHP() {
  const full = '\u2588';
  const empty = '\u2591';
  const hp1 = 8, max1 = 10;
  const hp2 = 6, max2 = 10;
  document.getElementById('hp1').textContent =
    full.repeat(hp1) + empty.repeat(max1 - hp1);
  document.getElementById('hp2').textContent =
    full.repeat(hp2) + empty.repeat(max2 - hp2);
}
updateHP();

// ---- FPS counter ----
let frameCount = 0, lastFpsTime = 0, displayFps = 60;
function updateFps(t) {
  frameCount++;
  if (t - lastFpsTime >= 1) {
    displayFps = frameCount;
    frameCount = 0;
    lastFpsTime = t;
  }
  document.getElementById('fps').textContent = displayFps + ' FPS';
}

// ---- Main loop ----
let startTime = 0;

function draw(timestamp) {
  if (!startTime) startTime = timestamp;
  const t = (timestamp - startTime) / 1000;

  updateTimer(t);
  updateFps(t);
  updateDust(1 / 60);

  // Clear
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // Transform to game coords
  ctx.translate(gameX, gameY);
  ctx.scale(scale, scale);

  // Background gradient overlay
  const bgGrad = ctx.createLinearGradient(0, 0, 0, 500);
  bgGrad.addColorStop(0, 'rgba(20,10,40,0.4)');
  bgGrad.addColorStop(1, 'rgba(5,5,20,0.6)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, 800, 500);

  // Palace silhouettes (far background)
  drawPalaceSilhouettes(t);

  // Persian arch decorations
  drawArch(60, 160, 40, 100);
  drawArch(350, 160, 50, 100);
  drawArch(600, 290, 40, 100);
  drawArch(200, 290, 35, 100);

  // Walls
  for (const w of walls) drawWall(w);

  // Platforms
  for (const p of platforms) drawPlatform(p, t);

  // Spikes
  for (const s of spikes) drawSpikes(s, t);

  // Chomper
  drawChomper(chomper, t);

  // Pressure plates
  for (const p of plates) drawPressurePlate(p);

  // Gate
  drawGate(gate, t);

  // Pickups
  drawPotion(potion, t);
  drawSword(sword, t);

  // Torches
  for (const tc of torches) drawTorch(tc.x, tc.y, t);

  // Dust particles
  drawDust();

  // ---- Player 1 (cyan) - running on level 2 ----
  const p1Speed = 40; // pixels per second
  const p1X = 60 + ((t * p1Speed) % 560); // loops across level 2
  const p1Y = 270; // on platform surface
  const p1Frame = Math.floor(t * 6) % 2;

  // Afterimages
  for (let i = 3; i >= 1; i--) {
    const trailX = p1X - i * 14;
    const alpha = (4 - i) * 0.08;
    drawAfterimage(trailX, p1Y, CYAN, alpha, p1Frame, false, true, true);
  }
  drawCharacter(p1X, p1Y, CYAN, p1Frame, false, true, true);

  // ---- Player 2 (gold) - jumping on level 1 ----
  const p2BaseX = 520;
  const jumpCycle = (t % 3) / 3; // 3 second jump cycle
  let p2X, p2Y;
  const p2Jumping = jumpCycle > 0.2 && jumpCycle < 0.7;
  if (jumpCycle < 0.2) {
    // Standing before jump
    p2X = p2BaseX;
    p2Y = 400;
  } else if (jumpCycle < 0.7) {
    // In air - parabolic arc across gap
    const jumpT = (jumpCycle - 0.2) / 0.5;
    p2X = p2BaseX + jumpT * 100;
    p2Y = 400 - Math.sin(jumpT * Math.PI) * 60;
  } else {
    // Landing
    const landT = (jumpCycle - 0.7) / 0.3;
    p2X = p2BaseX + 100 - landT * 100;
    p2Y = 400;
  }
  const p2Frame = Math.floor(t * 5) % 2;

  // Afterimages
  if (p2Jumping) {
    for (let i = 3; i >= 1; i--) {
      const prevJumpT = Math.max(0, (jumpCycle - 0.2) / 0.5 - i * 0.08);
      const ax = p2BaseX + prevJumpT * 100;
      const ay = 400 - Math.sin(prevJumpT * Math.PI) * 60;
      const alpha = (4 - i) * 0.07;
      drawAfterimage(ax, ay, GOLD, alpha, p2Frame, true, false, true);
    }
  }
  drawCharacter(p2X, p2Y, GOLD, p2Frame, p2Jumping, false, true);

  // ---- Guard 1 - patrolling level 3 ----
  const g1CenterX = 120;
  const g1Range = 80;
  const g1X = g1CenterX + Math.sin(t * 0.8) * g1Range;
  const g1Facing = Math.cos(t * 0.8) > 0;
  const g1Frame = Math.floor(t * 4) % 2;
  drawGuard(g1X, 140, g1Frame, g1Facing, false, t);

  // ---- Guard 2 - fighting pose on level 1 near trap ----
  const g2X = 560;
  const g2Y = 400;
  drawGuard(g2X, g2Y, 0, false, true, t);

  // Scanlines & vignette
  drawScanlines();
  drawVignette();

  ctx.restore();

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
