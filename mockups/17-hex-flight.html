{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';

/* ================================================================
   RENDERER
   ================================================================ */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0c14);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

/* ================================================================
   SCENE + FOG
   ================================================================ */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0c14, 0.012);

/* ================================================================
   CAMERA — PerspectiveCamera, cinematic orbit
   ================================================================ */
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
const cameraRadius = 25;
const cameraHeight = 15;

function updateCamera(t) {
    const angle = t * 0.1;
    camera.position.set(
        Math.cos(angle) * cameraRadius,
        cameraHeight,
        Math.sin(angle) * cameraRadius
    );
    camera.lookAt(0, 3, 0);
}
updateCamera(0);

/* ================================================================
   LIGHTING
   ================================================================ */
// Strong directional "sun" from the side for long shadows
const sunLight = new THREE.DirectionalLight(0xffe8cc, 2.2);
sunLight.position.set(20, 18, -10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -30;
sunLight.shadow.camera.right = 30;
sunLight.shadow.camera.top = 30;
sunLight.shadow.camera.bottom = -30;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 60;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);

const ambientLight = new THREE.AmbientLight(0x223344, 0.6);
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight(0x445566, 0x111a22, 0.4);
scene.add(hemiLight);

// Lens flare hint — bright sprite near sun direction
const flareGeo = new THREE.SphereGeometry(0.3, 8, 8);
const flareMat = new THREE.MeshBasicMaterial({ color: 0xffffee, transparent: true, opacity: 0.8 });
const flareMesh = new THREE.Mesh(flareGeo, flareMat);
flareMesh.position.copy(sunLight.position).normalize().multiplyScalar(40);
scene.add(flareMesh);

/* ================================================================
   HELPERS
   ================================================================ */
// Flat-top hex math (axial coordinates)
const HEX_SIZE = 1.0;
const HEX_GAP = 0.06;

function hexToWorld(q, r) {
    const x = HEX_SIZE * (3/2 * q);
    const z = HEX_SIZE * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r);
    return new THREE.Vector3(x, 0, z);
}

function createHexShape(size) {
    const shape = new THREE.Shape();
    for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 180 * (60 * i);
        const x = (size - HEX_GAP) * Math.cos(angle);
        const y = (size - HEX_GAP) * Math.sin(angle);
        if (i === 0) shape.moveTo(x, y);
        else shape.lineTo(x, y);
    }
    shape.closePath();
    return shape;
}

function hexEdgeGeometry(size) {
    const pts = [];
    for (let i = 0; i <= 6; i++) {
        const angle = Math.PI / 180 * (60 * (i % 6));
        pts.push(new THREE.Vector3(size * Math.cos(angle), 0, size * Math.sin(angle)));
    }
    return new THREE.BufferGeometry().setFromPoints(pts);
}

/* ================================================================
   HEX GRID BATTLEFIELD (y=0)
   ================================================================ */
const hexGroup = new THREE.Group();
scene.add(hexGroup);

const GRID_RADIUS = 8;
const hexData = []; // store hex info for later reference

// Define territory - friendly side (negative q), enemy side (positive q)
// Landing strip hexes
const landingStrip = [{ q: -4, r: 1 }, { q: -3, r: 1 }, { q: -2, r: 1 }];
// Explosion hexes
const explosionHexes = [{ q: 3, r: -1 }, { q: 4, r: 0 }, { q: 2, r: 1 }];

function isLandingStrip(q, r) {
    return landingStrip.some(h => h.q === q && h.r === r);
}
function isExplosionHex(q, r) {
    return explosionHexes.some(h => h.q === q && h.r === r);
}

const hexShape = createHexShape(HEX_SIZE);
const hexGeoBase = new THREE.ExtrudeGeometry(hexShape, { depth: 0.08, bevelEnabled: false });
hexGeoBase.rotateX(-Math.PI / 2);

const edgeGeo = hexEdgeGeometry(HEX_SIZE);
const edgeMat = new THREE.LineBasicMaterial({ color: 0x334433, transparent: true, opacity: 0.3 });

for (let q = -GRID_RADIUS; q <= GRID_RADIUS; q++) {
    for (let r = -GRID_RADIUS; r <= GRID_RADIUS; r++) {
        if (Math.abs(q + r) > GRID_RADIUS) continue;

        const pos = hexToWorld(q, r);
        let color;

        if (isLandingStrip(q, r)) {
            color = 0x2a3a2a; // lighter strip
        } else if (isExplosionHex(q, r)) {
            color = 0x2a1a1a; // enemy territory
        } else if (q < 0) {
            // Friendly territory variations
            const shade = 0.7 + Math.random() * 0.3;
            const g = Math.floor(0x2a * shade);
            color = (0x1a << 16) | (g << 8) | 0x1a;
        } else if (q > 2) {
            // Enemy territory
            const shade = 0.7 + Math.random() * 0.3;
            const r2 = Math.floor(0x2a * shade);
            color = (r2 << 16) | (0x1a << 8) | 0x1a;
        } else {
            // Neutral / contested
            color = 0x1a1a1a + Math.floor(Math.random() * 0x0a0a0a);
        }

        const mat = new THREE.MeshStandardMaterial({
            color: color,
            roughness: 0.9,
            metalness: 0.1
        });
        const mesh = new THREE.Mesh(hexGeoBase, mat);
        mesh.position.copy(pos);
        mesh.receiveShadow = true;
        hexGroup.add(mesh);

        // Dim edge lines
        const edge = new THREE.Line(edgeGeo, edgeMat);
        edge.position.copy(pos);
        edge.position.y = 0.09;
        hexGroup.add(edge);

        hexData.push({ q, r, pos, mesh });
    }
}

/* ================================================================
   LANDING STRIP MARKINGS
   ================================================================ */
landingStrip.forEach((h, i) => {
    const pos = hexToWorld(h.q, h.r);
    // Runway center line
    const lineGeo = new THREE.BoxGeometry(0.06, 0.01, 0.7);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0x556655 });
    const line = new THREE.Mesh(lineGeo, lineMat);
    line.position.set(pos.x, 0.1, pos.z);
    hexGroup.add(line);

    // Side dashes
    for (let d = -1; d <= 1; d += 2) {
        const dash = new THREE.Mesh(
            new THREE.BoxGeometry(0.3, 0.01, 0.04),
            lineMat
        );
        dash.position.set(pos.x + d * 0.25, 0.1, pos.z);
        hexGroup.add(dash);
    }
});

/* ================================================================
   GROUND STRUCTURES — Buildings & Turrets
   ================================================================ */
const structureMat = new THREE.MeshStandardMaterial({ color: 0x334433, roughness: 0.7 });
const enemyStructureMat = new THREE.MeshStandardMaterial({ color: 0x443333, roughness: 0.7 });

// Friendly buildings
[{ q: -5, r: 0 }, { q: -6, r: 2 }, { q: -3, r: -2 }, { q: -4, r: 3 }].forEach(h => {
    const pos = hexToWorld(h.q, h.r);
    const bldg = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.4), structureMat);
    bldg.position.set(pos.x, 0.23, pos.z);
    bldg.castShadow = true;
    bldg.receiveShadow = true;
    hexGroup.add(bldg);
});

// Enemy buildings
[{ q: 5, r: -2 }, { q: 6, r: -1 }, { q: 4, r: 2 }].forEach(h => {
    const pos = hexToWorld(h.q, h.r);
    const bldg = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.25, 0.35), enemyStructureMat);
    bldg.position.set(pos.x, 0.21, pos.z);
    bldg.castShadow = true;
    hexGroup.add(bldg);
});

// Turrets (cylinder + cone) — these are the AA turrets
const turretPositions = [
    { q: 5, r: -3, enemy: true },
    { q: 6, r: 0, enemy: true },
    { q: -5, r: 2, enemy: false },
    { q: -3, r: -3, enemy: false }
];

const turretMeshes = [];
turretPositions.forEach(t => {
    const pos = hexToWorld(t.q, t.r);
    const grp = new THREE.Group();
    grp.position.set(pos.x, 0.09, pos.z);

    // Base cylinder
    const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.25, 0.3, 8),
        new THREE.MeshStandardMaterial({ color: t.enemy ? 0x553333 : 0x335533, roughness: 0.6 })
    );
    base.position.y = 0.15;
    base.castShadow = true;
    grp.add(base);

    // Cone top / barrel
    const cone = new THREE.Mesh(
        new THREE.ConeGeometry(0.12, 0.25, 6),
        new THREE.MeshStandardMaterial({ color: t.enemy ? 0x664444 : 0x446644, roughness: 0.5 })
    );
    cone.position.y = 0.42;
    cone.castShadow = true;
    grp.add(cone);

    // Barrel
    const barrel = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.03, 0.3, 4),
        new THREE.MeshStandardMaterial({ color: 0x555555 })
    );
    barrel.position.y = 0.5;
    barrel.rotation.x = -Math.PI / 6;
    barrel.position.z = -0.1;
    grp.add(barrel);

    hexGroup.add(grp);
    if (t.enemy) turretMeshes.push({ group: grp, pos, isEnemy: true });
});

/* ================================================================
   GROUND EXPLOSIONS (on explosion hexes)
   ================================================================ */
const explosionGroups = [];
explosionHexes.forEach(h => {
    const pos = hexToWorld(h.q, h.r);

    // Emissive glow disc
    const glowGeo = new THREE.CircleGeometry(0.7, 16);
    const glowMat = new THREE.MeshBasicMaterial({
        color: 0xff6600,
        transparent: true,
        opacity: 0.6,
        side: THREE.DoubleSide
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.rotation.x = -Math.PI / 2;
    glow.position.set(pos.x, 0.12, pos.z);
    scene.add(glow);

    // Particle burst — small spheres scattered upward
    const particles = [];
    for (let i = 0; i < 12; i++) {
        const size = 0.03 + Math.random() * 0.05;
        const pMat = new THREE.MeshBasicMaterial({
            color: Math.random() > 0.5 ? 0xff8800 : 0xffcc00,
            transparent: true,
            opacity: 0.8
        });
        const p = new THREE.Mesh(new THREE.SphereGeometry(size, 4, 4), pMat);
        const angle = Math.random() * Math.PI * 2;
        const r = Math.random() * 0.6;
        p.position.set(
            pos.x + Math.cos(angle) * r,
            0.15 + Math.random() * 0.8,
            pos.z + Math.sin(angle) * r
        );
        p.userData = {
            baseY: p.position.y,
            angle,
            radius: r,
            speed: 0.5 + Math.random() * 1.5,
            phase: Math.random() * Math.PI * 2
        };
        scene.add(p);
        particles.push(p);
    }
    explosionGroups.push({ glow, glowMat, particles, pos });
});

/* ================================================================
   JET BUILDER — blocky low-poly style
   ================================================================ */
function buildJet(teamColor, engineColor) {
    const group = new THREE.Group();
    const bodyMat = new THREE.MeshStandardMaterial({ color: teamColor, roughness: 0.4, metalness: 0.5 });

    // Fuselage
    const fuselage = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 1.2), bodyMat);
    fuselage.castShadow = true;
    group.add(fuselage);

    // Delta wings (swept back)
    const wingGeo = new THREE.BoxGeometry(1.0, 0.02, 0.5);
    const wings = new THREE.Mesh(wingGeo, bodyMat);
    wings.position.z = 0.1;
    wings.castShadow = true;
    group.add(wings);

    // Tail fin (vertical)
    const tailFin = new THREE.Mesh(
        new THREE.BoxGeometry(0.02, 0.2, 0.3),
        bodyMat
    );
    tailFin.position.set(0, 0.1, 0.5);
    tailFin.castShadow = true;
    group.add(tailFin);

    // Cockpit
    const cockpitMat = new THREE.MeshStandardMaterial({ color: 0x112233, roughness: 0.2, metalness: 0.8 });
    const cockpit = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.06, 0.15), cockpitMat);
    cockpit.position.set(0, 0.08, -0.35);
    group.add(cockpit);

    // Engine glow
    const engineMat = new THREE.MeshBasicMaterial({ color: engineColor, transparent: true, opacity: 0.9 });
    const engine = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), engineMat);
    engine.position.set(0, 0, 0.6);
    group.add(engine);

    group.scale.setScalar(1);
    return group;
}

/* ================================================================
   CONTRAIL BUILDER
   ================================================================ */
function createContrail(color, maxPoints) {
    const positions = new Float32Array(maxPoints * 3);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setDrawRange(0, 0);

    const mat = new THREE.LineBasicMaterial({
        color,
        transparent: true,
        opacity: 0.5,
        linewidth: 1
    });
    const line = new THREE.Line(geo, mat);
    line.frustumCulled = false;

    const points = [];
    return { line, points, maxPoints, geo };
}

function updateContrail(trail, newPos) {
    trail.points.push(newPos.clone());
    if (trail.points.length > trail.maxPoints) trail.points.shift();

    const posArr = trail.geo.attributes.position.array;
    for (let i = 0; i < trail.points.length; i++) {
        posArr[i * 3] = trail.points[i].x;
        posArr[i * 3 + 1] = trail.points[i].y;
        posArr[i * 3 + 2] = trail.points[i].z;
    }
    trail.geo.attributes.position.needsUpdate = true;
    trail.geo.setDrawRange(0, trail.points.length);
}

/* ================================================================
   PLAYER SQUADRON — 3 jets in triangle formation
   ================================================================ */
const playerJets = [];
const playerTrails = [];

// Flight path: sweeping curve across the map
const playerPath = new THREE.CatmullRomCurve3([
    new THREE.Vector3(-12, 5, -8),
    new THREE.Vector3(-6, 4.5, -4),
    new THREE.Vector3(0, 4, 0),
    new THREE.Vector3(6, 4.5, 5),
    new THREE.Vector3(10, 5, 8),
    new THREE.Vector3(8, 5.5, 12),
    new THREE.Vector3(2, 6, 10),
    new THREE.Vector3(-5, 5.5, 6),
    new THREE.Vector3(-10, 5, 0),
    new THREE.Vector3(-12, 5, -8),
], true);

const formationOffsets = [
    new THREE.Vector3(0, 0, 0),       // Lead
    new THREE.Vector3(-1.2, -0.2, 1), // Left wing
    new THREE.Vector3(1.2, -0.2, 1),  // Right wing
];

for (let i = 0; i < 3; i++) {
    const jet = buildJet(0x88aacc, 0x00ccff);
    scene.add(jet);
    playerJets.push(jet);

    const trail = createContrail(0xaaddff, 40);

}

/* ================================================================
   ENEMY SQUADRON — 2 jets on intercept course
   ================================================================ */
const enemyJets = [];
const enemyTrails = [];

const enemyPath = new THREE.CatmullRomCurve3([
    new THREE.Vector3(12, 5, -6),
    new THREE.Vector3(6, 5, -2),
    new THREE.Vector3(2, 5, 3),
    new THREE.Vector3(-2, 5, 7),
    new THREE.Vector3(-6, 5, 10),
    new THREE.Vector3(-10, 5, 6),
    new THREE.Vector3(-8, 5, 0),
    new THREE.Vector3(-2, 5, -6),
    new THREE.Vector3(6, 5, -10),
    new THREE.Vector3(12, 5, -6),
], true);

for (let i = 0; i < 2; i++) {
    const jet = buildJet(0xcc4444, 0xff4400);
    scene.add(jet);
    enemyJets.push(jet);

/* ================================================================
   DOGFIGHT — 1 player + 1 enemy circling each other at y=6
   ================================================================ */
const dogfightCenter = new THREE.Vector3(-3, 6, -3);
const dogfightRadius = 3;

const dogfightPlayerJet = buildJet(0x88aacc, 0x00ccff);
scene.add(dogfightPlayerJet);
const dogfightPlayerTrail = createContrail(0xaaddff, 50);

const dogfightEnemyJet = buildJet(0xcc4444, 0xff4400);

/* ================================================================
   TRACERS — reusable pool for various tracer lines
   ================================================================ */
const tracers = [];
const tracerGeo = new THREE.BoxGeometry(0.02, 0.02, 0.3);

function spawnTracer(from, to, color, speed, life) {
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1.0 });
    const mesh = new THREE.Mesh(tracerGeo, mat);
    mesh.position.copy(from);
    const dir = to.clone().sub(from).normalize();
    mesh.lookAt(to);
    scene.add(mesh);
    tracers.push({ mesh, mat, dir, speed, life, maxLife: life, from: from.clone(), to: to.clone() });
}

function updateTracers(dt) {
    for (let i = tracers.length - 1; i >= 0; i--) {
        const t = tracers[i];
        t.life -= dt;
        t.mesh.position.addScaledVector(t.dir, t.speed * dt);
        t.mat.opacity = Math.max(0, t.life / t.maxLife);
        if (t.life <= 0) {
            scene.remove(t.mesh);
            t.mat.dispose();
            tracers.splice(i, 1);
        }
    }
}

/* ================================================================
   MISSILES (2) — small elongated boxes with exhaust
   ================================================================ */
// Player missile curving toward enemy
const playerMissilePath = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0, 4.5, 1),
    new THREE.Vector3(3, 5, 0),
    new THREE.Vector3(5, 5, -1),
    new THREE.Vector3(7, 5, -3),
], false);

// Enemy missile that missed (arcing away)
const enemyMissilePath = new THREE.CatmullRomCurve3([
    new THREE.Vector3(8, 5, -4),
    new THREE.Vector3(5, 5.5, -2),
    new THREE.Vector3(3, 6.5, 0),
    new THREE.Vector3(2, 8, 3),
], false);

function buildMissile(color) {
    const g = new THREE.Group();
    const body = new THREE.Mesh(
        new THREE.BoxGeometry(0.05, 0.05, 0.4),
        new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.7 })
    );
    g.add(body);
    // Exhaust glow
    const exhaust = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 4, 4),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 })
    );
    exhaust.position.z = 0.22;
    g.add(exhaust);
    return g;
}

const playerMissile = buildMissile(0xff8800);
scene.add(playerMissile);
const playerMissileTrail = createContrail(0xff8800, 30);
scene.add(playerMissileTrail.line);

const enemyMissile = buildMissile(0xff4400);
scene.add(enemyMissile);
const enemyMissileTrail = createContrail(0xff4400, 30);
scene.add(enemyMissileTrail.line);

// Smoke trail particles for missiles
const missileSmoke = [];
function spawnSmoke(pos) {
    const mat = new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.4 });
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.04, 4, 4), mat);
    mesh.position.copy(pos);
    scene.add(mesh);
    missileSmoke.push({ mesh, mat, life: 2.0 });
}

function updateSmoke(dt) {
    for (let i = missileSmoke.length - 1; i >= 0; i--) {
        const s = missileSmoke[i];
        s.life -= dt;
        s.mesh.position.y += dt * 0.1;
        s.mesh.scale.addScalar(dt * 0.3);
        s.mat.opacity = Math.max(0, s.life / 2.0) * 0.4;
        if (s.life <= 0) {
            scene.remove(s.mesh);
            s.mat.dispose();
            missileSmoke.splice(i, 1);
        }
    }
}

/* ================================================================
   BOMBING RUN JET — low pass at y=2 over enemy hexes
   ================================================================ */
const bombRunPath = new THREE.CatmullRomCurve3([
    new THREE.Vector3(-6, 2.2, 4),
    new THREE.Vector3(-2, 2.0, 2),
    new THREE.Vector3(2, 2.0, 0),
    new THREE.Vector3(6, 2.0, -1),

], false);

const bombRunTrail = createContrail(0xaaddff, 40);

// Bombs — small dark spheres falling
const bombs = [];
function spawnBomb(pos) {
    const mat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), mat);
    mesh.position.copy(pos);

}

// Impact explosions on ground
const groundImpacts = [];
function spawnImpact(pos) {
    const ring = new THREE.Mesh(
        new THREE.RingGeometry(0.05, 0.1, 16),
        new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 1.0, side: THREE.DoubleSide })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(pos.x, 0.12, pos.z);
    scene.add(ring);

    // Particle burst
    const parts = [];
    for (let i = 0; i < 8; i++) {
        const p = new THREE.Mesh(
            new THREE.SphereGeometry(0.03, 4, 4),
            new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 1.0 })
        );
        const a = Math.random() * Math.PI * 2;
        p.position.set(pos.x, 0.2, pos.z);
        p.userData.vel = new THREE.Vector3(Math.cos(a) * 2, 3 + Math.random() * 2, Math.sin(a) * 2);
        scene.add(p);
        parts.push(p);
    }
    groundImpacts.push({ ring, parts, life: 1.5 });
}

function updateBombs(dt) {
    for (let i = bombs.length - 1; i >= 0; i--) {
        const b = bombs[i];
        b.vy -= 9.8 * dt;
        b.mesh.position.y += b.vy * dt;
        b.life -= dt;
        if (b.mesh.position.y <= 0.1 || b.life <= 0) {
            spawnImpact(b.mesh.position);
            scene.remove(b.mesh);
            b.mat.dispose();
            bombs.splice(i, 1);
        }
    }
}

function updateImpacts(dt) {
    for (let i = groundImpacts.length - 1; i >= 0; i--) {
        const imp = groundImpacts[i];
        imp.life -= dt;
        const scale = 1 + (1.5 - imp.life) * 4;
        imp.ring.scale.setScalar(scale);
        imp.ring.material.opacity = Math.max(0, imp.life / 1.5);

        imp.parts.forEach(p => {
            p.position.add(p.userData.vel.clone().multiplyScalar(dt));
            p.userData.vel.y -= 9.8 * dt;
            p.material.opacity = Math.max(0, imp.life / 1.5);
        });

        if (imp.life <= 0) {
            scene.remove(imp.ring);
            imp.ring.material.dispose();
            imp.parts.forEach(p => {
                scene.remove(p);
                p.material.dispose();
            });
            groundImpacts.splice(i, 1);
        }
    }
}

/* ================================================================
   ANTI-AIR TRACER STREAMS from enemy turrets
   ================================================================ */
const aaTracers = [];

function spawnAATracer(origin) {
    const spread = 0.3;
    const target = new THREE.Vector3(
        origin.x + (Math.random() - 0.5) * spread * 20,
        8 + Math.random() * 4,
        origin.z + (Math.random() - 0.5) * spread * 20
    );
    const dir = target.clone().sub(origin).normalize();
    // Small bright dot
    const mat = new THREE.MeshBasicMaterial({
        color: Math.random() > 0.3 ? 0xffcc44 : 0xff6644,
        transparent: true,
        opacity: 1.0
    });
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.025, 4, 4), mat);
    mesh.position.copy(origin);
    mesh.position.y = 0.6;
    scene.add(mesh);
    aaTracers.push({ mesh, mat, dir, speed: 12 + Math.random() * 5, life: 1.5 });
}

function updateAATracers(dt) {
    for (let i = aaTracers.length - 1; i >= 0; i--) {
        const t = aaTracers[i];
        t.life -= dt;
        t.mesh.position.addScaledVector(t.dir, t.speed * dt);
        // Spread slightly as they rise
        t.dir.x += (Math.random() - 0.5) * 0.02;
        t.dir.z += (Math.random() - 0.5) * 0.02;
        t.mat.opacity = Math.max(0, t.life / 1.5);
        if (t.life <= 0) {
            scene.remove(t.mesh);
            t.mat.dispose();
            aaTracers.splice(i, 1);
        }
    }
}

/* ================================================================
   CLOUDS — semi-transparent planes at y=10-12
   ================================================================ */
const clouds = [];
const cloudGeo = new THREE.PlaneGeometry(8, 5);

for (let i = 0; i < 4; i++) {
    const mat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.12 + Math.random() * 0.08,
        side: THREE.DoubleSide,
        depthWrite: false
    });
    const cloud = new THREE.Mesh(cloudGeo, mat);
    cloud.rotation.x = -Math.PI / 2;
    cloud.position.set(
        (Math.random() - 0.5) * 20,
        10 + Math.random() * 2,
        (Math.random() - 0.5) * 20
    );
    cloud.scale.set(1 + Math.random(), 1, 0.6 + Math.random() * 0.4);
    scene.add(cloud);
    clouds.push({ mesh: cloud, speed: 0.15 + Math.random() * 0.1, dir: Math.random() * Math.PI * 2 });
}

// Cloud shadows on ground — dark semi-transparent patches
const cloudShadows = [];
clouds.forEach((c, i) => {
    const shadowMat = new THREE.MeshBasicMaterial({
        color: 0x000000,
        transparent: true,
        opacity: 0.08,
        side: THREE.DoubleSide,
        depthWrite: false
    });
    const shadow = new THREE.Mesh(new THREE.PlaneGeometry(7, 4), shadowMat);
    shadow.rotation.x = -Math.PI / 2;
    shadow.position.set(c.mesh.position.x, 0.11, c.mesh.position.z);
    shadow.scale.copy(c.mesh.scale);
    scene.add(shadow);
    cloudShadows.push({ mesh: shadow, cloudIndex: i });
});

/* ================================================================
   ENGINE EXHAUST PARTICLES for player jets
   ================================================================ */
const exhaustParticles = [];

function spawnExhaust(pos, color) {
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.6 });
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.02, 3, 3), mat);
    mesh.position.copy(pos);
    scene.add(mesh);
    exhaustParticles.push({ mesh, mat, life: 0.6 });
}

function updateExhaust(dt) {
    for (let i = exhaustParticles.length - 1; i >= 0; i--) {
        const p = exhaustParticles[i];
        p.life -= dt;
        p.mesh.scale.addScalar(dt * 2);
        p.mat.opacity = Math.max(0, p.life / 0.6) * 0.6;
        if (p.life <= 0) {
            scene.remove(p.mesh);
            p.mat.dispose();
            exhaustParticles.splice(i, 1);
        }
    }
}

/* ================================================================
   ANIMATION LOOP
   ================================================================ */
let prevTime = performance.now();
let frameCount = 0;
let fpsTime = 0;
const statsEl = document.getElementById('stats');
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const dt = Math.min((now - prevTime) / 1000, 0.05);
    prevTime = now;
    const t = clock.getElapsedTime();

    // FPS counter
    frameCount++;
    fpsTime += dt;
    if (fpsTime >= 0.5) {
        statsEl.textContent = Math.round(frameCount / fpsTime) + ' FPS';
        frameCount = 0;
        fpsTime = 0;
    }

    // Camera orbit
    updateCamera(t);

    // ── Player squadron movement ──
    for (let i = 0; i < 3; i++) {
        const baseT = ((t * 0.06) + i * 0.01) % 1;
        const pos = playerPath.getPointAt(baseT);
        const nextPos = playerPath.getPointAt((baseT + 0.005) % 1);
        const offset = formationOffsets[i];

        // Apply formation offset relative to flight direction
        const dir = nextPos.clone().sub(pos).normalize();
        const right = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();
        const up = new THREE.Vector3(0, 1, 0);

        const finalPos = pos.clone()
            .add(right.multiplyScalar(offset.x))
            .add(up.clone().multiplyScalar(offset.y))
            .add(dir.clone().multiplyScalar(offset.z));

        playerJets[i].position.copy(finalPos);
        playerJets[i].lookAt(nextPos.clone().add(right.clone().multiplyScalar(offset.x)));

        // Bank into turns
        const nextDir = playerPath.getPointAt((baseT + 0.01) % 1).sub(nextPos).normalize();
        const bankAngle = dir.clone().cross(nextDir).y * 8;
        playerJets[i].rotation.z = -bankAngle;

        updateContrail(playerTrails[i], finalPos);

        // Engine exhaust
        if (Math.random() < 0.3) {
            const exhaustPos = finalPos.clone().add(dir.clone().multiplyScalar(0.6));
            spawnExhaust(exhaustPos, 0x00ccff);
        }
    }

    // Lead jet air-to-ground strafing tracers
    if (Math.sin(t * 3) > 0.7) {
        const leadPos = playerJets[0].position.clone();
        const groundTarget = new THREE.Vector3(leadPos.x + (Math.random()-0.5)*2, 0.1, leadPos.z + (Math.random()-0.5)*2);
        spawnTracer(leadPos, groundTarget, 0x00ff44, 20, 0.4);
    }

    // ── Enemy squadron movement ──
    for (let i = 0; i < 2; i++) {
        const baseT = ((t * 0.055) + i * 0.05) % 1;
        const pos = enemyPath.getPointAt(baseT);
        const nextPos = enemyPath.getPointAt((baseT + 0.005) % 1);

        enemyJets[i].position.copy(pos);
        enemyJets[i].lookAt(nextPos);

        // Second enemy banking hard
        if (i === 1) {
            enemyJets[i].rotation.z = Math.sin(t * 2) * 0.6;
        }

        updateContrail(enemyTrails[i], pos);

        if (Math.random() < 0.2) {
            spawnExhaust(pos.clone().add(new THREE.Vector3(0, 0, 0.3)), 0xff4400);
        }
    }

    // ── Dogfight circle ──
    const dfPlayerAngle = t * 1.2;
    const dfEnemyAngle = t * 1.2 + Math.PI * 0.8; // slightly offset, not exactly opposite
    const dfPlayerPos = new THREE.Vector3(
        dogfightCenter.x + Math.cos(dfPlayerAngle) * dogfightRadius,
        dogfightCenter.y + Math.sin(t * 0.5) * 0.3,
        dogfightCenter.z + Math.sin(dfPlayerAngle) * dogfightRadius
    );
    const dfEnemyPos = new THREE.Vector3(
        dogfightCenter.x + Math.cos(dfEnemyAngle) * (dogfightRadius * 0.9),
        dogfightCenter.y + Math.sin(t * 0.7) * 0.4 + 0.2,
        dogfightCenter.z + Math.sin(dfEnemyAngle) * (dogfightRadius * 0.9)
    );

    dogfightPlayerJet.position.copy(dfPlayerPos);
    const dfPlayerNext = new THREE.Vector3(
        dogfightCenter.x + Math.cos(dfPlayerAngle + 0.1) * dogfightRadius,
        dogfightCenter.y,
        dogfightCenter.z + Math.sin(dfPlayerAngle + 0.1) * dogfightRadius
    );
    dogfightPlayerJet.lookAt(dfPlayerNext);
    dogfightPlayerJet.rotation.z = -0.4;

    dogfightEnemyJet.position.copy(dfEnemyPos);
    const dfEnemyNext = new THREE.Vector3(
        dogfightCenter.x + Math.cos(dfEnemyAngle + 0.1) * (dogfightRadius * 0.9),
        dogfightCenter.y,
        dogfightCenter.z + Math.sin(dfEnemyAngle + 0.1) * (dogfightRadius * 0.9)
    );
    dogfightEnemyJet.lookAt(dfEnemyNext);
    dogfightEnemyJet.rotation.z = 0.5;

    updateContrail(dogfightPlayerTrail, dfPlayerPos);
    updateContrail(dogfightEnemyTrail, dfEnemyPos);

    // Dogfight tracers — rapid fire between jets
    if (Math.random() < 0.15) {
        const miss = new THREE.Vector3((Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8);
        spawnTracer(dfPlayerPos, dfEnemyPos.clone().add(miss), 0x00ff44, 25, 0.3);
    }
    if (Math.random() < 0.12) {
        const miss = new THREE.Vector3((Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8);
        spawnTracer(dfEnemyPos, dfPlayerPos.clone().add(miss), 0xff3333, 25, 0.3);
    }

    // ── Missiles ──
    const missileT1 = ((t * 0.08) % 1);
    const mPos1 = playerMissilePath.getPointAt(Math.min(missileT1, 0.99));
    const mNext1 = playerMissilePath.getPointAt(Math.min(missileT1 + 0.02, 0.99));
    playerMissile.position.copy(mPos1);
    playerMissile.lookAt(mNext1);
    updateContrail(playerMissileTrail, mPos1);
    if (Math.random() < 0.3) spawnSmoke(mPos1);

    const missileT2 = ((t * 0.07) % 1);
    const mPos2 = enemyMissilePath.getPointAt(Math.min(missileT2, 0.99));
    const mNext2 = enemyMissilePath.getPointAt(Math.min(missileT2 + 0.02, 0.99));
    enemyMissile.position.copy(mPos2);
    enemyMissile.lookAt(mNext2);
    updateContrail(enemyMissileTrail, mPos2);
    if (Math.random() < 0.25) spawnSmoke(mPos2);

    // ── Bombing run ──
    const bombT = ((t * 0.04) % 1);
    const bPos = bombRunPath.getPointAt(Math.min(bombT, 0.99));
    const bNext = bombRunPath.getPointAt(Math.min(bombT + 0.005, 0.99));
    bombRunJet.position.copy(bPos);
    bombRunJet.lookAt(bNext);
    updateContrail(bombRunTrail, bPos);

    // Drop bombs periodically
    if (Math.sin(t * 2.5) > 0.95 && bombs.length < 6) {
        spawnBomb(bPos.clone());
    }

    // ── Anti-air tracers from enemy turrets ──
    turretMeshes.forEach(turret => {
        if (Math.random() < 0.08) {
            spawnAATracer(turret.pos);
        }
    });

    // ── Ground explosion pulsing ──
    explosionGroups.forEach(eg => {
        const pulse = 0.4 + Math.sin(t * 4 + eg.pos.x) * 0.3;
        eg.glowMat.opacity = pulse;
        eg.glow.scale.setScalar(0.8 + Math.sin(t * 3 + eg.pos.z) * 0.2);

        eg.particles.forEach(p => {
            const ud = p.userData;
            p.position.y = ud.baseY + Math.sin(t * ud.speed + ud.phase) * 0.3;
            p.material.opacity = 0.4 + Math.sin(t * ud.speed * 2 + ud.phase) * 0.3;
        });
    });

    // ── Clouds drift ──
    clouds.forEach((c, idx) => {
        c.mesh.position.x += Math.cos(c.dir) * c.speed * dt;
        c.mesh.position.z += Math.sin(c.dir) * c.speed * dt;
        // Wrap around
        if (c.mesh.position.x > 20) c.mesh.position.x = -20;
        if (c.mesh.position.x < -20) c.mesh.position.x = 20;
        if (c.mesh.position.z > 20) c.mesh.position.z = -20;
        if (c.mesh.position.z < -20) c.mesh.position.z = 20;

        // Update shadow
        const cs = cloudShadows[idx];
        cs.mesh.position.x = c.mesh.position.x;
        cs.mesh.position.z = c.mesh.position.z;
    });

    // ── Update all particle systems ──
    updateTracers(dt);
    updateAATracers(dt);
    updateExhaust(dt);
    updateBombs(dt);
    updateImpacts(dt);
    updateSmoke(dt);

    renderer.render(scene, camera);
}

/* ================================================================
   RESIZE
   ================================================================ */
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();

</script>
</body>
</html>
