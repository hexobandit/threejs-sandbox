<body>
<div id="ui">

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ====================================================================
   RENDERER
   ==================================================================== */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000005);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

/* ====================================================================
   SCENE
   ==================================================================== */
const scene = new THREE.Scene();
// No fog — space-like void

/* ====================================================================
   ORTHOGRAPHIC CAMERA (isometric 45 deg)
   ==================================================================== */
const frustum = 38;
let aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.OrthographicCamera(
    frustum * aspect / -2, frustum * aspect / 2,
    frustum / 2, frustum / -2, 0.1, 400
);
camera.position.set(30, 35, 30);
camera.lookAt(0, 0, 0);

/* ====================================================================
   CONTROLS
   ==================================================================== */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.08;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minZoom = 0.3;
controls.maxZoom = 3;
controls.addEventListener('start', () => { controls.autoRotate = false; });

/* ====================================================================
   LIGHTING (minimal — most things are emissive/wireframe)
   ==================================================================== */
scene.add(new THREE.AmbientLight(0x111122, 0.3));
const dirLight = new THREE.DirectionalLight(0x445566, 0.3);
dirLight.position.set(15, 40, 20);
scene.add(dirLight);

/* ====================================================================
   HEX MATH (flat-top, axial coordinates)
   ==================================================================== */
const HEX_SIZE = 1.0;
const HEX_GAP  = 0.08;
const S = HEX_SIZE + HEX_GAP;

function hexToWorld(q, r) {
    const x = S * 1.5 * q;
    const z = S * Math.sqrt(3) * (r + q / 2);
    return { x, z };
}

function hexDist(q1, r1, q2, r2) {
    const dq = q1 - q2, dr = r1 - r2;
    return Math.max(Math.abs(dq), Math.abs(dr), Math.abs(dq + dr));
}

const GRID_R = 10;

/* ====================================================================
   TERRITORY CLASSIFICATION
   ==================================================================== */
const ZONE_PLAYER  = 0;
const ZONE_ENEMY   = 1;
const ZONE_NEUTRAL = 2;

// Player base area (bottom-right), enemy base area (top-left)
const playerBase = { q: 4, r: 4 };
const enemyBase  = { q: -4, r: -4 };
const breachHex  = { q: -2, r: -1 };

function getZone(q, r) {
    const dp = hexDist(q, r, playerBase.q, playerBase.r);
    const de = hexDist(q, r, enemyBase.q, enemyBase.r);
    if (dp <= 4) return ZONE_PLAYER;
    if (de <= 4) return ZONE_ENEMY;
    return ZONE_NEUTRAL;
}

/* ====================================================================
   SHARED GEOMETRIES
   ==================================================================== */
const hexGeo = new THREE.CylinderGeometry(HEX_SIZE, HEX_SIZE, 0.08, 6);
const hexEdgeGeo = new THREE.EdgesGeometry(hexGeo);

/* ====================================================================
   BUILD HEX GRID
   ==================================================================== */
const hexGroup = new THREE.Group();
scene.add(hexGroup);

const tiles = [];
const corruptionTiles = []; // tiles near breach point for corruption effect

for (let q = -GRID_R; q <= GRID_R; q++) {
    for (let r = Math.max(-GRID_R, -q - GRID_R); r <= Math.min(GRID_R, -q + GRID_R); r++) {
        const zone = getZone(q, r);
        const { x, z } = hexToWorld(q, r);
        const distToBreach = hexDist(q, r, breachHex.q, breachHex.r);

        // Nearly transparent hex fill
        let fillColor, fillOpacity;
        if (zone === ZONE_PLAYER) {
            fillColor = 0x00ffff;
            fillOpacity = 0.05;
        } else if (zone === ZONE_ENEMY) {
            fillColor = 0xff00ff;
            fillOpacity = 0.05;
        } else {
            fillColor = 0xffffff;
            fillOpacity = 0.02;
        }

        const fillMat = new THREE.MeshBasicMaterial({
            color: fillColor, transparent: true, opacity: fillOpacity,
            side: THREE.DoubleSide, depthWrite: false
        });
        const fillMesh = new THREE.Mesh(hexGeo, fillMat);
        fillMesh.position.set(x, 0.04, z);
        fillMesh.rotation.y = Math.PI / 6;
        hexGroup.add(fillMesh);

        // Bright neon edge lines — the main visual
        let edgeColor, edgeOpacity;
        if (zone === ZONE_PLAYER) {
            edgeColor = 0x00ffff;
            edgeOpacity = 0.7;
        } else if (zone === ZONE_ENEMY) {
            edgeColor = 0xff00ff;
            edgeOpacity = 0.7;
        } else {
            edgeColor = 0xffffff;
            edgeOpacity = 0.15;
        }

        const edgeMat = new THREE.LineBasicMaterial({
            color: edgeColor, transparent: true, opacity: edgeOpacity
        });
        const edgeMesh = new THREE.LineSegments(hexEdgeGeo, edgeMat);
        edgeMesh.position.set(x, 0.04, z);
        edgeMesh.rotation.y = Math.PI / 6;
        hexGroup.add(edgeMesh);

        const tile = { fillMesh, edgeMesh, edgeMat, q, r, zone, worldX: x, worldZ: z };
        tiles.push(tile);

        // Track tiles near breach for corruption effect
        if (distToBreach <= 4 && distToBreach > 0 && zone !== ZONE_ENEMY) {
            corruptionTiles.push({ ...tile, distToBreach, corruptionProgress: 0 });
        }
    }
}

/* ====================================================================
   GROUND GRID (subtle)
   ==================================================================== */
const gridHelper = new THREE.GridHelper(60, 120, 0x111133, 0x080818);
gridHelper.position.y = -0.01;
gridHelper.material.transparent = true;
gridHelper.material.opacity = 0.3;
scene.add(gridHelper);

/* ====================================================================
   DATA STREAMS — vertical particle beams rising from hexes
   ==================================================================== */
const dataStreamHexes = [
    { q: 3, r: 3, color: 0x00ffff },
    { q: 5, r: 2, color: 0x00ffff },
    { q: 1, r: 5, color: 0x00ffff },
    { q: -3, r: -3, color: 0xff00ff },
    { q: -5, r: -2, color: 0xff00ff },
    { q: -2, r: -5, color: 0xff00ff },
];

const dataStreams = [];

dataStreamHexes.forEach(dsh => {
    const { x, z } = hexToWorld(dsh.q, dsh.r);
    const count = 80;
    const positions = new Float32Array(count * 3);
    const alphas = new Float32Array(count);

    for (let i = 0; i < count; i++) {
        positions[i * 3]     = x + (Math.random() - 0.5) * 0.4;
        positions[i * 3 + 1] = Math.random() * 8;
        positions[i * 3 + 2] = z + (Math.random() - 0.5) * 0.4;
        alphas[i] = Math.random();
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

    const mat = new THREE.PointsMaterial({
        color: dsh.color, size: 0.08, transparent: true, opacity: 0.8,
        blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: false
    });

    const points = new THREE.Points(geo, mat);
    scene.add(points);
    dataStreams.push({ points, positions, baseX: x, baseZ: z, count });
});

/* ====================================================================
   PLAYER UNITS — CYAN TEAM
   ==================================================================== */

// --- Data Nodes (3 icosahedron wireframes) ---
const dataNodes = [];
const dataNodePositions = [
    { q: 3, r: 5 },
    { q: 6, r: 1 },
    { q: 2, r: 6 },
];

dataNodePositions.forEach(pos => {
    const { x, z } = hexToWorld(pos.q, pos.r);
    const icoGeo = new THREE.IcosahedronGeometry(0.5, 0);
    const wireGeo = new THREE.EdgesGeometry(icoGeo);
    const wireMat = new THREE.LineBasicMaterial({
        color: 0x00ffff, transparent: true, opacity: 0.9
    });
    const wire = new THREE.LineSegments(wireGeo, wireMat);
    wire.position.set(x, 1.2, z);
    scene.add(wire);

    // Inner glow sphere
    const glowMat = new THREE.MeshBasicMaterial({
        color: 0x00ffff, transparent: true, opacity: 0.15,
        blending: THREE.AdditiveBlending
    });
    const glowMesh = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8), glowMat);
    glowMesh.position.set(x, 1.2, z);
    scene.add(glowMesh);

    dataNodes.push({ wire, glow: glowMesh, baseY: 1.2 });
});

// --- Attack Drones (6 octahedron wireframes swarming) ---
const drones = [];
const droneTarget = hexToWorld(0, 0); // swarming near center

for (let i = 0; i < 6; i++) {
    const octoGeo = new THREE.OctahedronGeometry(0.25, 0);
    const wireGeo = new THREE.EdgesGeometry(octoGeo);
    const wireMat = new THREE.LineBasicMaterial({
        color: 0x00ffff, transparent: true, opacity: 0.8
    });
    const wire = new THREE.LineSegments(wireGeo, wireMat);
    wire.position.set(droneTarget.x, 1.5, droneTarget.z);
    scene.add(wire);

    drones.push({
        wire,
        angle: (i / 6) * Math.PI * 2,
        radius: 1.5 + Math.random() * 1.0,
        speed: 0.8 + Math.random() * 0.6,
        yOffset: 0.8 + Math.random() * 1.5,
        bobSpeed: 1.5 + Math.random(),
        targetX: droneTarget.x,
        targetZ: droneTarget.z
    });
}

// --- Firewall (hexagonal ring, pulsing) ---
const firewallPos = hexToWorld(playerBase.q, playerBase.r);
const firewallRingGeo = new THREE.RingGeometry(2.5, 3.0, 6, 1);
const firewallMat = new THREE.MeshBasicMaterial({
    color: 0x00ffff, transparent: true, opacity: 0.3, side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending, depthWrite: false
});
const firewall = new THREE.Mesh(firewallRingGeo, firewallMat);
firewall.rotation.x = -Math.PI / 2;
firewall.rotation.z = Math.PI / 6;
firewall.position.set(firewallPos.x, 0.15, firewallPos.z);
scene.add(firewall);

// Firewall edge ring
const firewallEdgeGeo = new THREE.EdgesGeometry(new THREE.RingGeometry(2.5, 3.0, 6, 1));
const firewallEdgeMat = new THREE.LineBasicMaterial({
    color: 0x00ffff, transparent: true, opacity: 0.8
});
const firewallEdge = new THREE.LineSegments(firewallEdgeGeo, firewallEdgeMat);
firewallEdge.rotation.x = -Math.PI / 2;
firewallEdge.rotation.z = Math.PI / 6;
firewallEdge.position.set(firewallPos.x, 0.15, firewallPos.z);
scene.add(firewallEdge);

/* ====================================================================
   ENEMY UNITS — MAGENTA TEAM
   ==================================================================== */

// --- Virus Nodes (2 dodecahedron wireframes) ---
const virusNodes = [];
const virusPositions = [
    { q: -5, r: -3 },
    { q: -3, r: -6 },
];

virusPositions.forEach(pos => {
    const { x, z } = hexToWorld(pos.q, pos.r);
    const dodGeo = new THREE.DodecahedronGeometry(0.55, 0);
    const wireGeo = new THREE.EdgesGeometry(dodGeo);
    const wireMat = new THREE.LineBasicMaterial({
        color: 0xff00ff, transparent: true, opacity: 0.9
    });
    const wire = new THREE.LineSegments(wireGeo, wireMat);
    wire.position.set(x, 1.3, z);
    scene.add(wire);

    const glowMat = new THREE.MeshBasicMaterial({
        color: 0xff00ff, transparent: true, opacity: 0.15,
        blending: THREE.AdditiveBlending
    });
    const glowMesh = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), glowMat);
    glowMesh.position.set(x, 1.3, z);
    scene.add(glowMesh);

    virusNodes.push({ wire, glow: glowMesh, baseY: 1.3 });
});

// --- Malware Bots (8 tetrahedron wireframes advancing in formation) ---
const malwareBots = [];
const formationCenter = hexToWorld(-1, -2);

for (let i = 0; i < 8; i++) {
    const tetGeo = new THREE.TetrahedronGeometry(0.18, 0);
    const wireGeo = new THREE.EdgesGeometry(tetGeo);
    const wireMat = new THREE.LineBasicMaterial({
        color: 0xff00ff, transparent: true, opacity: 0.8
    });
    const wire = new THREE.LineSegments(wireGeo, wireMat);

    // Formation: 2 rows of 4
    const row = Math.floor(i / 4);
    const col = i % 4;
    const fx = formationCenter.x + (col - 1.5) * 0.6;
    const fz = formationCenter.z + row * 0.8;

    wire.position.set(fx, 0.5, fz);
    scene.add(wire);

    malwareBots.push({
        wire, baseX: fx, baseZ: fz, baseY: 0.5,
        phase: Math.random() * Math.PI * 2
    });
}

// --- Breach Point (flickering hex) ---
const breachPos = hexToWorld(breachHex.q, breachHex.r);
const breachEdgeMat = new THREE.LineBasicMaterial({
    color: 0xff00ff, transparent: true, opacity: 1.0
});
const breachEdge = new THREE.LineSegments(hexEdgeGeo.clone(), breachEdgeMat);
breachEdge.position.set(breachPos.x, 0.06, breachPos.z);
breachEdge.rotation.y = Math.PI / 6;
breachEdge.scale.set(1.05, 1.3, 1.05);
scene.add(breachEdge);

// Additional cracked lines for breach
const crackLines = [];
for (let i = 0; i < 4; i++) {
    const pts = [];
    const angle = (i / 4) * Math.PI * 2 + Math.random() * 0.5;
    pts.push(new THREE.Vector3(0, 0, 0));
    pts.push(new THREE.Vector3(
        Math.cos(angle) * (0.5 + Math.random() * 0.5),
        Math.random() * 0.3,
        Math.sin(angle) * (0.5 + Math.random() * 0.5)
    ));
    const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
    const lineMat = new THREE.LineBasicMaterial({
        color: 0xff00ff, transparent: true, opacity: 0.9
    });
    const line = new THREE.Line(lineGeo, lineMat);
    line.position.set(breachPos.x, 0.1, breachPos.z);
    scene.add(line);
    crackLines.push(line);
}

/* ====================================================================
   COMBAT EFFECTS
   ==================================================================== */

// --- Laser Grid (white lines between engaged units) ---
const laserLines = [];
const laserPairs = [
    // drones attack area -> enemy virus node
    { from: { x: droneTarget.x, y: 1.5, z: droneTarget.z }, to: { x: hexToWorld(-2, -1).x, y: 1.3, z: hexToWorld(-2, -1).z } },
    { from: { x: hexToWorld(3, 5).x, y: 1.2, z: hexToWorld(3, 5).z }, to: { x: hexToWorld(-1, -2).x, y: 0.5, z: hexToWorld(-1, -2).z } },
    { from: { x: hexToWorld(6, 1).x, y: 1.2, z: hexToWorld(6, 1).z }, to: { x: hexToWorld(-3, -3).x, y: 1.3, z: hexToWorld(-3, -3).z } },
];

laserPairs.forEach(pair => {
    const pts = [
        new THREE.Vector3(pair.from.x, pair.from.y, pair.from.z),
        new THREE.Vector3(pair.to.x, pair.to.y, pair.to.z)
    ];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({
        color: 0xffffff, transparent: true, opacity: 0.6,
        blending: THREE.AdditiveBlending
    });
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    laserLines.push({ line, mat });
});

// --- EMP Pulse (expanding cyan ring) ---
const empPos = hexToWorld(1, 2);
const empRingGeo = new THREE.RingGeometry(0.1, 0.3, 32, 1);
const empMat = new THREE.MeshBasicMaterial({
    color: 0x00ffff, transparent: true, opacity: 0.8, side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending, depthWrite: false
});
const empRing = new THREE.Mesh(empRingGeo, empMat);
empRing.rotation.x = -Math.PI / 2;
empRing.position.set(empPos.x, 0.2, empPos.z);
scene.add(empRing);

let empScale = 1.0;
const EMP_MAX_SCALE = 12.0;
const EMP_SPEED = 3.0;

// --- Particle Explosions (white sparks at impact points) ---
const explosions = [];
const impactPoints = [
    hexToWorld(0, -1),
    hexToWorld(1, -2),
    hexToWorld(-1, 0),
];

impactPoints.forEach(pos => {
    const count = 40;
    const positions = new Float32Array(count * 3);
    const velocities = [];

    for (let i = 0; i < count; i++) {
        positions[i * 3]     = pos.x;
        positions[i * 3 + 1] = 0.5;
        positions[i * 3 + 2] = pos.z;
        velocities.push({
            x: (Math.random() - 0.5) * 3,
            y: Math.random() * 4 + 1,
            z: (Math.random() - 0.5) * 3
        });
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
        color: 0xffffff, size: 0.1, transparent: true, opacity: 0.9,
        blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: false
    });
    const points = new THREE.Points(geo, mat);
    scene.add(points);
    explosions.push({
        points, positions, velocities, count,
        baseX: pos.x, baseZ: pos.z, timer: Math.random() * 2
    });
});

/* ====================================================================
   ENVIRONMENT
   ==================================================================== */

// --- Digital Rain (matrix-style green particles falling) ---
const rainCount = 300;
const rainPositions = new Float32Array(rainCount * 3);
const rainSpeeds = new Float32Array(rainCount);

for (let i = 0; i < rainCount; i++) {
    rainPositions[i * 3]     = (Math.random() - 0.5) * 50;
    rainPositions[i * 3 + 1] = Math.random() * 25;
    rainPositions[i * 3 + 2] = (Math.random() - 0.5) * 50;
    rainSpeeds[i] = 2 + Math.random() * 4;
}

const rainGeo = new THREE.BufferGeometry();
rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
const rainMat = new THREE.PointsMaterial({
    color: 0x22ff44, size: 0.06, transparent: true, opacity: 0.35,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: false
});
const rain = new THREE.Points(rainGeo, rainMat);
scene.add(rain);

// --- Holographic Globe (wireframe sphere) ---
const globeGeo = new THREE.SphereGeometry(1.5, 16, 12);
const globeWireGeo = new THREE.EdgesGeometry(globeGeo);
const globeWireMat = new THREE.LineBasicMaterial({
    color: 0x00ffff, transparent: true, opacity: 0.3
});
const globe = new THREE.LineSegments(globeWireGeo, globeWireMat);
const globeWorldPos = hexToWorld(7, -5);
globe.position.set(globeWorldPos.x, 4, globeWorldPos.z);
scene.add(globe);

// Globe equator ring
const globeRingGeo = new THREE.RingGeometry(1.6, 1.65, 32, 1);
const globeRingMat = new THREE.MeshBasicMaterial({
    color: 0x00ffff, transparent: true, opacity: 0.2, side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending, depthWrite: false
});
const globeRing = new THREE.Mesh(globeRingGeo, globeRingMat);
globeRing.position.copy(globe.position);
scene.add(globeRing);

// --- Scan Line ---
const scanLineGeo = new THREE.PlaneGeometry(60, 0.05);
const scanLineMat = new THREE.MeshBasicMaterial({
    color: 0x00ffff, transparent: true, opacity: 0.15, side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending, depthWrite: false
});
const scanLine = new THREE.Mesh(scanLineGeo, scanLineMat);
scanLine.rotation.x = -Math.PI / 2;
scanLine.position.y = 0.12;
scene.add(scanLine);

// Scan line glow plane (wider, dimmer)
const scanGlowGeo = new THREE.PlaneGeometry(60, 0.8);
const scanGlowMat = new THREE.MeshBasicMaterial({
    color: 0x00ffff, transparent: true, opacity: 0.04, side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending, depthWrite: false
});
const scanGlow = new THREE.Mesh(scanGlowGeo, scanGlowMat);
scanGlow.rotation.x = -Math.PI / 2;
scanGlow.position.y = 0.11;
scene.add(scanGlow);

/* ====================================================================
   CENTRAL OBJECTIVE — Large rotating wireframe dodecahedron
   ==================================================================== */
const objGeo = new THREE.DodecahedronGeometry(1.2, 0);
const objWireGeo = new THREE.EdgesGeometry(objGeo);
const objWireMat = new THREE.LineBasicMaterial({
    color: 0xffddaa, transparent: true, opacity: 0.9
});
const objective = new THREE.LineSegments(objWireGeo, objWireMat);
objective.position.set(0, 2.0, 0);
scene.add(objective);

// Inner glow
const objGlowMat = new THREE.MeshBasicMaterial({
    color: 0xffcc66, transparent: true, opacity: 0.12,
    blending: THREE.AdditiveBlending
});
const objGlow = new THREE.Mesh(new THREE.DodecahedronGeometry(1.0, 0), objGlowMat);
objGlow.position.set(0, 2.0, 0);
scene.add(objGlow);

// Outer wireframe shell (larger, dimmer)
const objOuterGeo = new THREE.DodecahedronGeometry(1.6, 0);
const objOuterWireGeo = new THREE.EdgesGeometry(objOuterGeo);
const objOuterWireMat = new THREE.LineBasicMaterial({
    color: 0xffcc66, transparent: true, opacity: 0.25
});
const objOuter = new THREE.LineSegments(objOuterWireGeo, objOuterWireMat);
objOuter.position.set(0, 2.0, 0);
scene.add(objOuter);

// Ground glow ring around objective
const objRingGeo = new THREE.RingGeometry(1.8, 2.2, 32, 1);
const objRingMat = new THREE.MeshBasicMaterial({
    color: 0xffcc44, transparent: true, opacity: 0.2, side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending, depthWrite: false
});
const objRing = new THREE.Mesh(objRingGeo, objRingMat);
objRing.rotation.x = -Math.PI / 2;
objRing.position.set(0, 0.08, 0);
scene.add(objRing);

// Second ring (pulsing)
const objRing2Geo = new THREE.RingGeometry(2.4, 2.5, 32, 1);
const objRing2Mat = new THREE.MeshBasicMaterial({
    color: 0xffcc44, transparent: true, opacity: 0.1, side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending, depthWrite: false
});
const objRing2 = new THREE.Mesh(objRing2Geo, objRing2Mat);
objRing2.rotation.x = -Math.PI / 2;
objRing2.position.set(0, 0.07, 0);
scene.add(objRing2);

/* ====================================================================
   GEOMETRIC HUD INDICATORS (floating above battlefield)
   ==================================================================== */

// Floating diamond indicators at key positions
const hudIndicators = [];
function createHUDIndicator(worldX, worldZ, height, color) {
    const diaGeo = new THREE.OctahedronGeometry(0.15, 0);
    const diaWireGeo = new THREE.EdgesGeometry(diaGeo);
    const diaMat = new THREE.LineBasicMaterial({
        color, transparent: true, opacity: 0.6
    });
    const dia = new THREE.LineSegments(diaWireGeo, diaMat);
    dia.position.set(worldX, height, worldZ);
    scene.add(dia);

    // Vertical line from hex to indicator
    const linePts = [
        new THREE.Vector3(worldX, 0.1, worldZ),
        new THREE.Vector3(worldX, height - 0.2, worldZ)
    ];
    const lineGeo = new THREE.BufferGeometry().setFromPoints(linePts);
    const lineMat = new THREE.LineBasicMaterial({
        color, transparent: true, opacity: 0.2
    });
    const line = new THREE.Line(lineGeo, lineMat);
    scene.add(line);

    hudIndicators.push({ dia, line, baseY: height });
}

createHUDIndicator(hexToWorld(playerBase.q, playerBase.r).x, hexToWorld(playerBase.q, playerBase.r).z, 5.0, 0x00ffff);
createHUDIndicator(hexToWorld(enemyBase.q, enemyBase.r).x, hexToWorld(enemyBase.q, enemyBase.r).z, 5.0, 0xff00ff);
createHUDIndicator(0, 0, 5.5, 0xffcc44);
createHUDIndicator(breachPos.x, breachPos.z, 4.0, 0xff4444);

/* ====================================================================
   ADDITIONAL GLOW EFFECTS — connection lines from teams to objective
   ==================================================================== */

// Cyan convergence lines
const cyanConvergePoints = [
    hexToWorld(3, 5), hexToWorld(6, 1), hexToWorld(2, 6)
];
const convergeLines = [];

cyanConvergePoints.forEach(p => {
    const pts = [

    ];

    const mat = new THREE.LineBasicMaterial({

    });

});

// Magenta convergence lines
const magentaConvergePoints = [

];

magentaConvergePoints.forEach(p => {
    const pts = [
        new THREE.Vector3(p.x, 0.5, p.z),

    ];

    });

/* ====================================================================
   FPS COUNTER
   ==================================================================== */
const statsEl = document.getElementById('stats');
let frameCount = 0, lastFPSTime = performance.now();

/* ====================================================================
   RESIZE
   ==================================================================== */
window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    aspect = w / h;
    camera.left   = frustum * aspect / -2;
    camera.right  = frustum * aspect / 2;
    camera.top    = frustum / 2;
    camera.bottom = frustum / -2;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

/* ====================================================================
   ANIMATION LOOP
   ==================================================================== */
const clock = new THREE.Clock();
let prevTime = 0;

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    prevTime += dt;
    const t = prevTime;

    controls.update();

    // --- Data Streams: particles drift upward ---
    dataStreams.forEach(ds => {
        const pos = ds.positions;
        for (let i = 0; i < ds.count; i++) {
            pos[i * 3 + 1] += dt * (1.5 + Math.sin(t + i) * 0.5);
            // Slight horizontal drift
            pos[i * 3]     += Math.sin(t * 2 + i * 0.3) * dt * 0.05;
            pos[i * 3 + 2] += Math.cos(t * 2 + i * 0.3) * dt * 0.05;

            if (pos[i * 3 + 1] > 8) {
                pos[i * 3]     = ds.baseX + (Math.random() - 0.5) * 0.4;
                pos[i * 3 + 1] = 0;
                pos[i * 3 + 2] = ds.baseZ + (Math.random() - 0.5) * 0.4;
            }
        }
        ds.points.geometry.attributes.position.needsUpdate = true;
    });

    // --- Data Nodes: slowly rotating ---
    dataNodes.forEach((dn, i) => {
        dn.wire.rotation.x = t * 0.3 + i;
        dn.wire.rotation.y = t * 0.5 + i * 2;
        dn.wire.position.y = dn.baseY + Math.sin(t * 0.8 + i) * 0.15;
        dn.glow.position.y = dn.wire.position.y;
        dn.glow.material.opacity = 0.1 + Math.sin(t * 1.5 + i) * 0.05;
    });

    // --- Attack Drones: organic swarm movement ---
    drones.forEach((d, i) => {
        d.angle += dt * d.speed;
        const wobble = Math.sin(t * 1.3 + i * 1.7) * 0.3;
        const r = d.radius + wobble;
        d.wire.position.x = d.targetX + Math.cos(d.angle) * r;
        d.wire.position.z = d.targetZ + Math.sin(d.angle) * r;
        d.wire.position.y = d.yOffset + Math.sin(t * d.bobSpeed + i) * 0.3;
        d.wire.rotation.x = t * 2 + i;
        d.wire.rotation.y = t * 3 + i;
    });

    // --- Firewall: pulsing ---
    const fwPulse = 0.2 + Math.sin(t * 2) * 0.15;
    firewallMat.opacity = fwPulse;
    firewallEdgeMat.opacity = 0.5 + Math.sin(t * 2) * 0.3;
    const fwScale = 1.0 + Math.sin(t * 1.5) * 0.05;
    firewall.scale.set(fwScale, fwScale, 1);
    firewallEdge.scale.set(fwScale, fwScale, 1);

    // --- Virus Nodes: pulsing + rotating ---
    virusNodes.forEach((vn, i) => {
        vn.wire.rotation.x = t * 0.4 + i * 3;
        vn.wire.rotation.y = t * 0.6 + i;
        const pulse = 1.0 + Math.sin(t * 2 + i) * 0.15;
        vn.wire.scale.set(pulse, pulse, pulse);
        vn.glow.scale.set(pulse, pulse, pulse);
        vn.wire.position.y = vn.baseY + Math.sin(t * 0.7 + i * 2) * 0.1;
        vn.glow.position.y = vn.wire.position.y;
        vn.glow.material.opacity = 0.1 + Math.sin(t * 2 + i) * 0.08;
    });

    // --- Malware Bots: advancing in formation with jitter ---
    malwareBots.forEach((mb, i) => {
        mb.wire.rotation.x = t * 3 + mb.phase;
        mb.wire.rotation.y = t * 2 + mb.phase;
        // Slowly advance toward center
        const advanceT = (Math.sin(t * 0.2) * 0.5 + 0.5);
        mb.wire.position.x = mb.baseX + Math.sin(t * 1.5 + mb.phase) * 0.08 + advanceT * 0.3;
        mb.wire.position.z = mb.baseZ + Math.cos(t * 1.5 + mb.phase) * 0.08 + advanceT * 0.3;
        mb.wire.position.y = mb.baseY + Math.sin(t * 2 + mb.phase) * 0.1;
    });

    // --- Breach Point: flickering ---
    const breachFlicker = Math.random() > 0.3 ? 1 : 0;
    breachEdgeMat.opacity = breachFlicker * (0.6 + Math.random() * 0.4);
    breachEdgeMat.color.setHex(Math.random() > 0.7 ? 0xffffff : 0xff00ff);
    crackLines.forEach(cl => {
        cl.material.opacity = Math.random() * 0.8 + 0.2;
        cl.material.color.setHex(Math.random() > 0.5 ? 0xff00ff : 0xffffff);
    });

    // --- Laser Grid: flickering ---
    laserLines.forEach((ll, i) => {
        const flicker = Math.sin(t * 15 + i * 3) > -0.3 ? 1 : 0;
        ll.mat.opacity = flicker * (0.3 + Math.random() * 0.5);
    });

    // --- EMP Pulse: expanding ring ---
    empScale += dt * EMP_SPEED;
    if (empScale > EMP_MAX_SCALE) empScale = 1.0;
    empRing.scale.set(empScale, empScale, 1);
    empMat.opacity = Math.max(0, 0.8 * (1 - empScale / EMP_MAX_SCALE));

    // --- Corruption Spread: slow edge color shift ---
    corruptionTiles.forEach(ct => {
        const cycleT = (Math.sin(t * 0.3 - ct.distToBreach * 0.5) * 0.5 + 0.5);
        const lerpAmount = cycleT * Math.max(0, 1 - ct.distToBreach * 0.2);

        const baseColor = new THREE.Color(0xffffff);
        const targetColor = new THREE.Color(0xff00ff);
        const mixed = baseColor.lerp(targetColor, lerpAmount);
        ct.edgeMat.color.copy(mixed);
        ct.edgeMat.opacity = 0.15 + lerpAmount * 0.4;
    });

    // --- Particle Explosions: burst + reset ---
    explosions.forEach(exp => {
        exp.timer += dt;
        const cycleDuration = 2.5;
        const phase = exp.timer % cycleDuration;
        const pos = exp.positions;

        if (phase < dt * 2) {
            // Reset explosion
            for (let i = 0; i < exp.count; i++) {
                pos[i * 3]     = exp.baseX;
                pos[i * 3 + 1] = 0.5;
                pos[i * 3 + 2] = exp.baseZ;
                exp.velocities[i].x = (Math.random() - 0.5) * 3;
                exp.velocities[i].y = Math.random() * 4 + 1;
                exp.velocities[i].z = (Math.random() - 0.5) * 3;
            }
        }

        for (let i = 0; i < exp.count; i++) {
            pos[i * 3]     += exp.velocities[i].x * dt;
            pos[i * 3 + 1] += exp.velocities[i].y * dt;
            pos[i * 3 + 2] += exp.velocities[i].z * dt;
            exp.velocities[i].y -= dt * 3; // gravity
        }

        exp.points.material.opacity = Math.max(0, 1 - phase / cycleDuration);
        exp.points.geometry.attributes.position.needsUpdate = true;
    });

    // --- Digital Rain ---
    const rPos = rainGeo.attributes.position.array;
    for (let i = 0; i < rainCount; i++) {
        rPos[i * 3 + 1] -= dt * rainSpeeds[i];
        if (rPos[i * 3 + 1] < -1) {
            rPos[i * 3 + 1] = 25;
            rPos[i * 3]     = (Math.random() - 0.5) * 50;
            rPos[i * 3 + 2] = (Math.random() - 0.5) * 50;
        }
    }
    rainGeo.attributes.position.needsUpdate = true;

    // --- Holographic Globe: rotating ---
    globe.rotation.y = t * 0.3;
    globe.rotation.x = Math.sin(t * 0.15) * 0.2;
    globeRing.rotation.x = -Math.PI / 2 + Math.sin(t * 0.2) * 0.1;
    globeRing.rotation.z = t * 0.1;

    // --- Scan Line: sweeping ---
    const scanZ = (Math.sin(t * 0.4) * 0.5 + 0.5) * 40 - 20;
    scanLine.position.z = scanZ;
    scanGlow.position.z = scanZ;

    // --- Central Objective: rotating + pulsing ---
    objective.rotation.y = t * 0.5;
    objective.rotation.x = t * 0.3;
    objOuter.rotation.y = -t * 0.3;
    objOuter.rotation.x = -t * 0.2;
    objGlow.rotation.y = t * 0.4;

    const objPulse = 0.8 + Math.sin(t * 1.5) * 0.2;
    objWireMat.opacity = objPulse;
    objRingMat.opacity = 0.15 + Math.sin(t * 1.5) * 0.1;
    objRing2Mat.opacity = 0.05 + Math.sin(t * 1.5 + 1) * 0.05;
    const ring2Scale = 1 + Math.sin(t * 1.0) * 0.1;
    objRing2.scale.set(ring2Scale, ring2Scale, 1);

    // --- HUD Indicators: bobbing + rotating ---
    hudIndicators.forEach((hi, i) => {
        hi.dia.rotation.y = t * 1.5 + i;
        hi.dia.rotation.x = t * 0.8 + i * 2;
        hi.dia.position.y = hi.baseY + Math.sin(t * 0.6 + i) * 0.15;
    });

    // --- Convergence Lines: subtle pulse ---
    convergeLines.forEach((cl, i) => {
        cl.mat.opacity = 0.04 + Math.sin(t * 0.8 + i * 1.5) * 0.04;
    });

    // --- FPS ---
    frameCount++;
    const now = performance.now();
    if (now - lastFPSTime >= 500) {
        const fps = Math.round(frameCount / ((now - lastFPSTime) / 1000));
        statsEl.textContent = fps + ' FPS';
        frameCount = 0;
        lastFPSTime = now;
    }

    renderer.render(scene, camera);
}

animate();
</script>
