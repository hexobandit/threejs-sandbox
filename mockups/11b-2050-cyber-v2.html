<body>
<div id="ui">
    <h1>11b / 2050 CYBER v2</h1>
    <p>Aerial dominance &middot; Multi-altitude combat &middot; Carrier ops &middot; Orbital strikes</p>
    <div id="stats">-- FPS</div>
</div>

    CYBERFRONT v2 // CARRIER DEPLOYED // DRONE SWARM ENGAGED // ORBITAL STRIKE INBOUND // ALTITUDE LAYERS: 3<span class="cursor"></span>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ====================================================================
   RENDERER
   ==================================================================== */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000005);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

/* ====================================================================
   SCENE
   ==================================================================== */
const scene = new THREE.Scene();

/* ====================================================================
   ORTHOGRAPHIC CAMERA (isometric)
   ==================================================================== */
const frustum = 42;
let aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.OrthographicCamera(
    frustum * aspect / -2, frustum * aspect / 2,
    frustum / 2, frustum / -2, 0.1, 400
);
camera.position.set(30, 40, 30);
camera.lookAt(0, 0, 0);

/* ====================================================================
   CONTROLS
   ==================================================================== */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.06;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minZoom = 0.3;
controls.maxZoom = 3;
controls.addEventListener('start', () => { controls.autoRotate = false; });

/* ====================================================================
   LIGHTING
   ==================================================================== */
scene.add(new THREE.AmbientLight(0x111122, 0.2));

/* ====================================================================
   HEX MATH (flat-top, axial coordinates)
   ==================================================================== */
const HEX_SIZE = 1.0;
const HEX_GAP  = 0.08;
const S = HEX_SIZE + HEX_GAP;

function hexToWorld(q, r) {
    const x = S * 1.5 * q;
    const z = S * Math.sqrt(3) * (r + q / 2);
    return { x, z };
}

function hexDist(q1, r1, q2, r2) {
    const dq = q1 - q2, dr = r1 - r2;
    return Math.max(Math.abs(dq), Math.abs(dr), Math.abs(dq + dr));
}

const GRID_R = 9;
const ZONE_PLAYER  = 0;
const ZONE_ENEMY   = 1;
const ZONE_NEUTRAL = 2;

const playerBase = { q: 4, r: 4 };
const enemyBase  = { q: -4, r: -4 };

function getZone(q, r) {
    const dp = hexDist(q, r, playerBase.q, playerBase.r);
    const de = hexDist(q, r, enemyBase.q, enemyBase.r);
    if (dp <= 4) return ZONE_PLAYER;
    if (de <= 4) return ZONE_ENEMY;
    return ZONE_NEUTRAL;
}

/* ====================================================================
   HEX GRID (dim ground reference)
   ==================================================================== */
const hexGeo = new THREE.CylinderGeometry(HEX_SIZE, HEX_SIZE, 0.04, 6);
const hexEdgeGeo = new THREE.EdgesGeometry(hexGeo);
const hexGroup = new THREE.Group();
scene.add(hexGroup);

const tiles = [];
for (let q = -GRID_R; q <= GRID_R; q++) {
    for (let r = Math.max(-GRID_R, -q - GRID_R); r <= Math.min(GRID_R, -q + GRID_R); r++) {
        const zone = getZone(q, r);
        const { x, z } = hexToWorld(q, r);

        let fillColor, fillOpacity;
        if (zone === ZONE_PLAYER)      { fillColor = 0x00ffff; fillOpacity = 0.02; }
        else if (zone === ZONE_ENEMY)  { fillColor = 0xff00ff; fillOpacity = 0.02; }
        else                           { fillColor = 0xffffff; fillOpacity = 0.01; }

        const fillMat = new THREE.MeshBasicMaterial({
            color: fillColor, transparent: true, opacity: fillOpacity,
            side: THREE.DoubleSide, depthWrite: false
        });
        const fillMesh = new THREE.Mesh(hexGeo, fillMat);
        fillMesh.position.set(x, 0.02, z);
        fillMesh.rotation.y = Math.PI / 6;
        hexGroup.add(fillMesh);

        let edgeColor, edgeOpacity;
        if (zone === ZONE_PLAYER)      { edgeColor = 0x00ffff; edgeOpacity = 0.1; }
        else if (zone === ZONE_ENEMY)  { edgeColor = 0xff00ff; edgeOpacity = 0.1; }
        else                           { edgeColor = 0xffffff; edgeOpacity = 0.05; }

        const edgeMat = new THREE.LineBasicMaterial({
            color: edgeColor, transparent: true, opacity: edgeOpacity
        });
        const edgeMesh = new THREE.LineSegments(hexEdgeGeo, edgeMat);
        edgeMesh.position.set(x, 0.02, z);
        edgeMesh.rotation.y = Math.PI / 6;
        hexGroup.add(edgeMesh);

        tiles.push({ fillMesh, edgeMesh, edgeMat, q, r, zone, worldX: x, worldZ: z });
    }
}

/* ====================================================================
   GROUND GRID PULSE
   ==================================================================== */
let gridPulseTime = 0;

/* ====================================================================
   UTILITY
   ==================================================================== */
function createWireframeMesh(geo, color, opacity) {
    const edges = new THREE.EdgesGeometry(geo);
    const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
    return new THREE.LineSegments(edges, mat);
}

function createGlowMesh(geo, color, opacity) {
    const mat = new THREE.MeshBasicMaterial({
        color, transparent: true, opacity,
        side: THREE.DoubleSide, depthWrite: false,
        blending: THREE.AdditiveBlending
    });
    return new THREE.Mesh(geo, mat);
}

/* ====================================================================
   LAYER 1: LOW ALTITUDE (y=2-4) — DRONES
   ==================================================================== */
const droneGeo = new THREE.OctahedronGeometry(0.2, 0);
const droneEdgeGeo = new THREE.EdgesGeometry(droneGeo);

// --- Drone class ---
class Drone {
    constructor(color, startPos, trailColor) {
        this.color = color;
        this.mesh = new THREE.LineSegments(
            droneEdgeGeo,
            new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.9 })
        );
        this.mesh.position.copy(startPos);
        scene.add(this.mesh);

        // Glow core
        const glowMat = new THREE.MeshBasicMaterial({
            color, transparent: true, opacity: 0.15,
            blending: THREE.AdditiveBlending, depthWrite: false
        });
        this.glow = new THREE.Mesh(droneGeo, glowMat);
        this.mesh.add(this.glow);

        // Contrail
        this.trailMax = 20;
        this.trailPositions = [];
        for (let i = 0; i < this.trailMax; i++) {
            this.trailPositions.push(startPos.clone());
        }
        const trailGeoB = new THREE.BufferGeometry();
        const positions = new Float32Array(this.trailMax * 3);
        const colors = new Float32Array(this.trailMax * 3);
        const tc = new THREE.Color(trailColor || color);
        for (let i = 0; i < this.trailMax; i++) {
            positions[i * 3] = startPos.x;
            positions[i * 3 + 1] = startPos.y;
            positions[i * 3 + 2] = startPos.z;
            const fade = 1.0 - i / this.trailMax;
            colors[i * 3] = tc.r * fade;
            colors[i * 3 + 1] = tc.g * fade;
            colors[i * 3 + 2] = tc.b * fade;
        }
        trailGeoB.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        trailGeoB.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        this.trail = new THREE.Line(
            trailGeoB,
            new THREE.LineBasicMaterial({
                vertexColors: true, transparent: true, opacity: 0.6,
                blending: THREE.AdditiveBlending, depthWrite: false
            })
        );
        scene.add(this.trail);
        this.trailColor = tc;
    }

    updateTrail() {
        this.trailPositions.unshift(this.mesh.position.clone());
        if (this.trailPositions.length > this.trailMax) this.trailPositions.pop();

        const posArr = this.trail.geometry.attributes.position.array;
        const colArr = this.trail.geometry.attributes.color.array;
        for (let i = 0; i < this.trailMax; i++) {
            const p = this.trailPositions[Math.min(i, this.trailPositions.length - 1)];
            posArr[i * 3] = p.x;
            posArr[i * 3 + 1] = p.y;
            posArr[i * 3 + 2] = p.z;
            const fade = 1.0 - i / this.trailMax;
            colArr[i * 3] = this.trailColor.r * fade;
            colArr[i * 3 + 1] = this.trailColor.g * fade;
            colArr[i * 3 + 2] = this.trailColor.b * fade;
        }
        this.trail.geometry.attributes.position.needsUpdate = true;
        this.trail.geometry.attributes.color.needsUpdate = true;
    }
}

// Player drone swarm — V-formation sweeping across map
const playerDrones = [];
const playerFormationCenter = new THREE.Vector3(4, 3, 4);
for (let i = 0; i < 12; i++) {
    const row = Math.floor(i / 2);
    const side = (i % 2 === 0) ? -1 : 1;
    const offsetX = side * (row + 1) * 0.8;
    const offsetZ = -row * 1.0;
    const altVar = 2 + Math.random() * 2;
    const pos = new THREE.Vector3(
        playerFormationCenter.x + offsetX,
        altVar,
        playerFormationCenter.z + offsetZ
    );
    const d = new Drone(0x00ffff, pos, 0x00ffff);
    d.formationOffset = new THREE.Vector3(offsetX, altVar - 3, offsetZ);
    d.noisePhase = Math.random() * Math.PI * 2;
    d.noiseSpeed = 0.5 + Math.random() * 0.5;
    d.noiseAmp = 0.15 + Math.random() * 0.1;
    playerDrones.push(d);
}

// Enemy drone swarm — circular orbit
const enemyDrones = [];
for (let i = 0; i < 10; i++) {
    const angle = (i / 10) * Math.PI * 2;
    const radius = 3 + Math.random() * 1;
    const altVar = 2 + Math.random() * 2;
    const pos = new THREE.Vector3(
        -4 + Math.cos(angle) * radius,
        altVar,
        -4 + Math.sin(angle) * radius
    );
    const d = new Drone(0xff00ff, pos, 0xff00ff);
    d.orbitAngle = angle;
    d.orbitRadius = radius;
    d.orbitSpeed = 0.3 + Math.random() * 0.2;
    d.altBase = altVar;
    d.noisePhase = Math.random() * Math.PI * 2;
    enemyDrones.push(d);
}

// Dogfight zone — center
const dogfightCyan = [];
const dogfightMagenta = [];
for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2;
    const pos = new THREE.Vector3(Math.cos(angle) * 1.5, 3, Math.sin(angle) * 1.5);
    const d = new Drone(0x00ffff, pos, 0x00ffff);
    d.orbitAngle = angle;
    d.orbitSpeed = 1.5 + Math.random() * 0.5;
    dogfightCyan.push(d);
}
for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2 + Math.PI / 4;
    const pos = new THREE.Vector3(Math.cos(angle) * 1.8, 3, Math.sin(angle) * 1.8);
    const d = new Drone(0xff00ff, pos, 0xff00ff);
    d.orbitAngle = angle;
    d.orbitSpeed = -1.3 - Math.random() * 0.5;
    dogfightMagenta.push(d);
}

/* ====================================================================
   ATTACK TRACERS
   ==================================================================== */
const tracers = [];
for (let i = 0; i < 10; i++) {
    const isPlayer = i < 5;
    const color = isPlayer ? 0xaaffff : 0xffaaff;
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(6);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.LineBasicMaterial({
        color, transparent: true, opacity: 1.0,
        blending: THREE.AdditiveBlending, depthWrite: false
    });
    const line = new THREE.Line(geo, mat);
    line.visible = false;
    scene.add(line);
    tracers.push({
        line, mat, geo, isPlayer,
        onTimer: Math.random() * 0.3,
        phase: Math.random() < 0.5 ? 'on' : 'off',
        srcIndex: Math.floor(Math.random() * 4),
        tgtIndex: Math.floor(Math.random() * 4)
    });
}

/* ====================================================================
   DESTROYED DRONE DEBRIS
   ==================================================================== */
const debrisGroup = new THREE.Group();
scene.add(debrisGroup);
const debrisCubeGeo = new THREE.BoxGeometry(0.08, 0.08, 0.08);
const debrisCubeEdge = new THREE.EdgesGeometry(debrisCubeGeo);
const debrisPieces = [];

const debrisLocations = [
    new THREE.Vector3(1, 2.5, 0.5),
    new THREE.Vector3(-0.5, 2, -0.8),
    new THREE.Vector3(0.3, 1.8, -0.3)
];
for (const loc of debrisLocations) {
    for (let i = 0; i < 6; i++) {
        const mat = new THREE.LineBasicMaterial({
            color: Math.random() > 0.5 ? 0x00ffff : 0xff00ff,
            transparent: true, opacity: 0.4 + Math.random() * 0.3
        });
        const mesh = new THREE.LineSegments(debrisCubeEdge, mat);
        mesh.position.set(
            loc.x + (Math.random() - 0.5) * 0.8,
            loc.y + (Math.random() - 0.5) * 0.5,
            loc.z + (Math.random() - 0.5) * 0.8
        );
        mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        debrisGroup.add(mesh);
        debrisPieces.push({
            mesh, mat,
            fallSpeed: 0.005 + Math.random() * 0.01,
            spinX: (Math.random() - 0.5) * 0.02,
            spinY: (Math.random() - 0.5) * 0.02,
            spinZ: (Math.random() - 0.5) * 0.02,
            baseY: loc.y,
            fadeSpeed: 0.001 + Math.random() * 0.002
        });
    }
}

/* ====================================================================
   LAYER 2: MID ALTITUDE (y=6-8) — CARRIERS
   ==================================================================== */
function buildCarrier(color, pos, scaleX, scaleZ) {
    const group = new THREE.Group();
    group.position.copy(pos);

    // Main hull
    const hullGeo = new THREE.BoxGeometry(3 * (scaleX || 1), 0.5, 1.5 * (scaleZ || 1));
    const hull = createWireframeMesh(hullGeo, color, 0.7);
    group.add(hull);

    // Hull glow
    const hullGlow = createGlowMesh(hullGeo, color, 0.04);
    group.add(hullGlow);

    // Bridge
    const bridgeGeo = new THREE.BoxGeometry(0.8, 0.4, 0.6);
    const bridge = createWireframeMesh(bridgeGeo, color, 0.6);
    bridge.position.set(0.3, 0.45, 0);
    group.add(bridge);

    // Engine pods
    const podGeo = new THREE.BoxGeometry(0.3, 0.3, 1);
    const podL = createWireframeMesh(podGeo, color, 0.5);
    podL.position.set(-0.8, -0.1, 0.9 * (scaleZ || 1));
    group.add(podL);

    const podR = createWireframeMesh(podGeo, color, 0.5);
    podR.position.set(-0.8, -0.1, -0.9 * (scaleZ || 1));
    group.add(podR);

    scene.add(group);

    return {
        group,
        podLPos: podL.position,
        podRPos: podR.position,
        exhaustParticles: [],
        color: new THREE.Color(color)
    };
}

const playerCarrier = buildCarrier(0x00ffff, new THREE.Vector3(5, 7, 5), 1, 1);
const enemyCarrier = buildCarrier(0xff00ff, new THREE.Vector3(-5, 7, -5), 1.1, 0.9);

// Engine exhaust particles
function createExhaustSystem(carrier) {
    const particles = [];
    const pGeo = new THREE.BufferGeometry();
    const count = 30;
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    pGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const pMat = new THREE.PointsMaterial({
        size: 0.08, vertexColors: true, transparent: true, opacity: 0.6,
        blending: THREE.AdditiveBlending, depthWrite: false
    });
    const points = new THREE.Points(pGeo, pMat);
    scene.add(points);

    for (let i = 0; i < count; i++) {
        const isPodL = i < count / 2;
        const podPos = isPodL ? carrier.podLPos : carrier.podRPos;
        const carrierPos = carrier.group.position;
        particles.push({
            x: carrierPos.x + podPos.x + (Math.random() - 0.5) * 0.1,
            y: carrierPos.y + podPos.y + (Math.random() - 0.5) * 0.1,
            z: carrierPos.z + podPos.z + (Math.random() - 0.5) * 0.1,
            vx: -0.02 - Math.random() * 0.02,
            life: Math.random(),
            isPodL
        });
    }

    return { points, pGeo, particles, carrier };
}

const playerExhaust = createExhaustSystem(playerCarrier);
const enemyExhaust = createExhaustSystem(enemyCarrier);

// Deployment lines (carrier to formation)
function createDeployLine(carrier, targetY, color) {
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(6);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.LineBasicMaterial({
        color, transparent: true, opacity: 0.2,
        blending: THREE.AdditiveBlending, depthWrite: false
    });
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    return { line, geo, mat, carrier, targetY };
}

const playerDeployLine = createDeployLine(playerCarrier, 3, 0x00ffff);
const enemyDeployLine = createDeployLine(enemyCarrier, 3, 0xff00ff);

/* ====================================================================
   LAYER 3: HIGH ALTITUDE (y=12-15) — ORBITAL
   ==================================================================== */

// Orbital ring
const orbitalRingGeo = new THREE.TorusGeometry(15, 0.05, 8, 64);
const orbitalRing = createWireframeMesh(orbitalRingGeo, 0x4444ff, 0.15);
orbitalRing.position.y = 14;
orbitalRing.rotation.x = Math.PI / 2;
scene.add(orbitalRing);

// Surveillance satellites
const satGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
const satEdgeGeo = new THREE.EdgesGeometry(satGeo);
const satellites = [];
for (let i = 0; i < 3; i++) {
    const angle = (i / 3) * Math.PI * 2;
    const radius = 8 + i * 3;
    const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
    const sat = new THREE.LineSegments(satEdgeGeo, mat);
    sat.position.set(Math.cos(angle) * radius, 13, Math.sin(angle) * radius);
    scene.add(sat);

    // Blinking light
    const lightGeo = new THREE.SphereGeometry(0.04, 4, 4);
    const lightMat = new THREE.MeshBasicMaterial({
        color: 0xffffff, transparent: true, opacity: 1.0,
        blending: THREE.AdditiveBlending
    });
    const light = new THREE.Mesh(lightGeo, lightMat);
    light.position.y = 0.12;
    sat.add(light);

    satellites.push({
        mesh: sat, angle, radius,
        orbitSpeed: 0.05 + i * 0.02,
        lightMat, blinkPhase: Math.random() * Math.PI * 2
    });
}

// Orbital strike beams
function createOrbitalBeam(color, targetHex, fromY) {
    const { x, z } = hexToWorld(targetHex.q, targetHex.r);

    // Beam line
    const beamGeo = new THREE.BufferGeometry();
    const positions = new Float32Array([x, fromY, z, x, 0, z]);
    beamGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const beamMat = new THREE.LineBasicMaterial({
        color, transparent: true, opacity: 0.8,
        blending: THREE.AdditiveBlending, depthWrite: false
    });
    const beam = new THREE.Line(beamGeo, beamMat);
    scene.add(beam);

    // Impact ring
    const ringGeo = new THREE.RingGeometry(0.3, 0.5, 16);
    const ringMat = new THREE.MeshBasicMaterial({
        color, transparent: true, opacity: 0.6, side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending, depthWrite: false
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.set(x, 0.1, z);
    ring.rotation.x = -Math.PI / 2;
    scene.add(ring);

    // Impact particles
    const sparkCount = 12;
    const sparkGeo = new THREE.BufferGeometry();
    const sparkPos = new Float32Array(sparkCount * 3);
    const sparkCol = new Float32Array(sparkCount * 3);
    const c = new THREE.Color(color);
    for (let i = 0; i < sparkCount; i++) {
        sparkPos[i * 3] = x;
        sparkPos[i * 3 + 1] = 0.2;
        sparkPos[i * 3 + 2] = z;
        sparkCol[i * 3] = c.r;
        sparkCol[i * 3 + 1] = c.g;
        sparkCol[i * 3 + 2] = c.b;
    }
    sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));
    sparkGeo.setAttribute('color', new THREE.BufferAttribute(sparkCol, 3));
    const sparkMat = new THREE.PointsMaterial({
        size: 0.1, vertexColors: true, transparent: true, opacity: 0.8,
        blending: THREE.AdditiveBlending, depthWrite: false
    });
    const sparks = new THREE.Points(sparkGeo, sparkMat);
    scene.add(sparks);

    return {
        beam, beamMat, ring, ringMat,
        sparks, sparkGeo,
        x, z,
        sparkVelocities: Array.from({ length: sparkCount }, () => ({
            vx: (Math.random() - 0.5) * 0.06,
            vy: Math.random() * 0.04 + 0.02,
            vz: (Math.random() - 0.5) * 0.06,
            life: Math.random()
        }))
    };
}

const cyanBeam = createOrbitalBeam(0x00ffff, { q: -2, r: -3 }, 15);
const magentaBeam = createOrbitalBeam(0xff00ff, { q: 2, r: 2 }, 15);

/* ====================================================================
   SHIELD BUBBLES
   ==================================================================== */
function createShield(color, pos, radius) {
    const geo = new THREE.SphereGeometry(radius, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
    const wireframe = createWireframeMesh(geo, color, 0.05);
    wireframe.position.copy(pos);
    wireframe.position.y -= 0.5;
    scene.add(wireframe);

    const glowMesh = createGlowMesh(geo, color, 0.02);
    glowMesh.position.copy(pos);
    glowMesh.position.y -= 0.5;
    scene.add(glowMesh);

    return { wireframe, glowMesh, baseMat: wireframe.material, glowMat: glowMesh.material, flickerTimer: 0 };
}

const playerShield = createShield(0x00ffff, playerCarrier.group.position.clone(), 2);
const enemyShield = createShield(0xff00ff, enemyCarrier.group.position.clone(), 2);

/* ====================================================================
   ANTI-AIR BEAMS FROM GROUND
   ==================================================================== */
const aaBeams = [];
const aaHexes = [
    { q: 3, r: 2, targetDroneSet: 'dogfightMagenta', idx: 0, color: 0x00ff88 },
    { q: 2, r: 3, targetDroneSet: 'dogfightMagenta', idx: 1, color: 0x00ffaa },
    { q: -3, r: -2, targetDroneSet: 'dogfightCyan', idx: 0, color: 0xff4488 }
];
for (const aa of aaHexes) {
    const { x, z } = hexToWorld(aa.q, aa.r);
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(6);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.LineBasicMaterial({
        color: aa.color, transparent: true, opacity: 0.3,
        blending: THREE.AdditiveBlending, depthWrite: false
    });
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    aaBeams.push({ line, geo, mat, groundX: x, groundZ: z, ...aa, pulsePhase: Math.random() * Math.PI * 2 });
}

/* ====================================================================
   DATA LINK LINES (ground -> carrier -> orbital)
   ==================================================================== */
const dataLinks = [];
function createDataLink(groundHex, carrierPos, orbitalY, color) {
    const { x, z } = hexToWorld(groundHex.q, groundHex.r);
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(9); // 3 points
    positions[0] = x; positions[1] = 0.1; positions[2] = z;
    positions[3] = carrierPos.x; positions[4] = carrierPos.y; positions[5] = carrierPos.z;
    positions[6] = carrierPos.x * 0.5; positions[7] = orbitalY; positions[8] = carrierPos.z * 0.5;
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.LineBasicMaterial({
        color, transparent: true, opacity: 0.06,
        blending: THREE.AdditiveBlending, depthWrite: false
    });
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    dataLinks.push({ line, mat });
}

createDataLink({ q: 4, r: 4 }, playerCarrier.group.position, 14, 0x00ffff);
createDataLink({ q: 3, r: 5 }, playerCarrier.group.position, 14, 0x00ffff);
createDataLink({ q: -4, r: -4 }, enemyCarrier.group.position, 14, 0xff00ff);
createDataLink({ q: -3, r: -5 }, enemyCarrier.group.position, 14, 0xff00ff);

/* ====================================================================
   ALTITUDE GUIDE RINGS
   ==================================================================== */
const altitudes = [4, 8, 12];
for (const alt of altitudes) {
    const geo = new THREE.RingGeometry(11.5, 12, 48);
    const mat = new THREE.MeshBasicMaterial({
        color: 0x222244, transparent: true, opacity: 0.06,
        side: THREE.DoubleSide, depthWrite: false
    });
    const ring = new THREE.Mesh(geo, mat);
    ring.position.y = alt;
    ring.rotation.x = -Math.PI / 2;
    scene.add(ring);
}

/* ====================================================================
   SCAN LINE
   ==================================================================== */
const scanGeo = new THREE.PlaneGeometry(30, 0.08);
const scanMat = new THREE.MeshBasicMaterial({
    color: 0x00ffff, transparent: true, opacity: 0.15,
    side: THREE.DoubleSide, depthWrite: false,
    blending: THREE.AdditiveBlending
});
const scanLine = new THREE.Mesh(scanGeo, scanMat);
scanLine.rotation.x = -Math.PI / 2;
scanLine.position.y = 0.15;
scene.add(scanLine);

/* ====================================================================
   AMBIENT DATA PARTICLES (sparse, floating upward)
   ==================================================================== */
const ambientCount = 40;
const ambientGeo = new THREE.BufferGeometry();
const ambientPos = new Float32Array(ambientCount * 3);
const ambientCol = new Float32Array(ambientCount * 3);
const ambientVel = [];
for (let i = 0; i < ambientCount; i++) {
    ambientPos[i * 3] = (Math.random() - 0.5) * 20;
    ambientPos[i * 3 + 1] = Math.random() * 14;
    ambientPos[i * 3 + 2] = (Math.random() - 0.5) * 20;
    const c = Math.random() > 0.5 ? new THREE.Color(0x00ffff) : new THREE.Color(0xff00ff);
    ambientCol[i * 3] = c.r * 0.4;
    ambientCol[i * 3 + 1] = c.g * 0.4;
    ambientCol[i * 3 + 2] = c.b * 0.4;
    ambientVel.push({ vy: 0.005 + Math.random() * 0.01 });
}
ambientGeo.setAttribute('position', new THREE.BufferAttribute(ambientPos, 3));
ambientGeo.setAttribute('color', new THREE.BufferAttribute(ambientCol, 3));
const ambientMat = new THREE.PointsMaterial({
    size: 0.06, vertexColors: true, transparent: true, opacity: 0.5,
    blending: THREE.AdditiveBlending, depthWrite: false
});
const ambientParticles = new THREE.Points(ambientGeo, ambientMat);
scene.add(ambientParticles);

/* ====================================================================
   FPS COUNTER
   ==================================================================== */
const statsEl = document.getElementById('stats');
let frameCount = 0, lastFpsTime = performance.now();

/* ====================================================================
   ANIMATION LOOP
   ==================================================================== */
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    const dt = clock.getDelta();

    // FPS
    frameCount++;
    const now = performance.now();
    if (now - lastFpsTime >= 500) {
        const fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
        statsEl.textContent = fps + ' FPS';
        frameCount = 0;
        lastFpsTime = now;
    }

    /* --- Ground grid pulse --- */
    gridPulseTime += 0.005;
    const pulseRadius = (gridPulseTime % 1) * 20;
    for (const tile of tiles) {
        const dist = Math.sqrt(tile.worldX * tile.worldX + tile.worldZ * tile.worldZ);
        const diff = Math.abs(dist - pulseRadius);
        if (diff < 1.5) {
            const baseOpacity = tile.zone === ZONE_NEUTRAL ? 0.05 : 0.1;
            const pulse = (1 - diff / 1.5) * 0.12;
            tile.edgeMat.opacity = baseOpacity + pulse;
        } else {
            tile.edgeMat.opacity = tile.zone === ZONE_NEUTRAL ? 0.05 : 0.1;
        }
    }

    /* --- Player drone swarm (V-formation sweep) --- */
    const sweepX = Math.sin(t * 0.15) * 5 + 4;
    const sweepZ = Math.cos(t * 0.1) * 4 + 4;
    for (let i = 0; i < playerDrones.length; i++) {
        const d = playerDrones[i];
        const noiseX = Math.sin(t * d.noiseSpeed + d.noisePhase) * d.noiseAmp;
        const noiseZ = Math.cos(t * d.noiseSpeed * 0.7 + d.noisePhase) * d.noiseAmp;
        const noiseY = Math.sin(t * d.noiseSpeed * 0.5 + d.noisePhase + 1) * 0.1;
        d.mesh.position.set(
            sweepX + d.formationOffset.x + noiseX,
            3 + d.formationOffset.y + noiseY,
            sweepZ + d.formationOffset.z + noiseZ
        );
        d.mesh.rotation.y = t * 0.5;
        d.mesh.rotation.x = Math.sin(t + i) * 0.1;
        d.updateTrail();
    }

    /* --- Enemy drone swarm (circular orbit) --- */
    for (let i = 0; i < enemyDrones.length; i++) {
        const d = enemyDrones[i];
        d.orbitAngle += d.orbitSpeed * 0.01;
        const noiseY = Math.sin(t * 0.5 + d.noisePhase) * 0.3;
        d.mesh.position.set(
            -4 + Math.cos(d.orbitAngle) * d.orbitRadius,
            d.altBase + noiseY,
            -4 + Math.sin(d.orbitAngle) * d.orbitRadius
        );
        d.mesh.rotation.y = -d.orbitAngle;
        d.updateTrail();
    }

    /* --- Dogfight drones --- */
    for (let i = 0; i < dogfightCyan.length; i++) {
        const d = dogfightCyan[i];
        d.orbitAngle += d.orbitSpeed * 0.012;
        const r = 1.5 + Math.sin(t * 2 + i) * 0.4;
        d.mesh.position.set(
            Math.cos(d.orbitAngle) * r,
            3 + Math.sin(t * 3 + i) * 0.3,
            Math.sin(d.orbitAngle) * r
        );
        d.mesh.rotation.y = d.orbitAngle + Math.PI;
        d.updateTrail();
    }
    for (let i = 0; i < dogfightMagenta.length; i++) {
        const d = dogfightMagenta[i];
        d.orbitAngle += d.orbitSpeed * 0.012;
        const r = 1.8 + Math.cos(t * 1.5 + i) * 0.5;
        d.mesh.position.set(
            Math.cos(d.orbitAngle) * r,
            3 + Math.cos(t * 2.5 + i) * 0.3,
            Math.sin(d.orbitAngle) * r
        );
        d.mesh.rotation.y = d.orbitAngle;
        d.updateTrail();
    }

    /* --- Attack tracers --- */
    for (const tr of tracers) {
        tr.onTimer -= 0.016;
        if (tr.onTimer <= 0) {
            if (tr.phase === 'on') {
                tr.phase = 'off';
                tr.onTimer = 0.15 + Math.random() * 0.1;
                tr.line.visible = false;
            } else {
                tr.phase = 'on';
                tr.onTimer = 0.08 + Math.random() * 0.05;
                tr.line.visible = true;
                tr.srcIndex = Math.floor(Math.random() * 4);
                tr.tgtIndex = Math.floor(Math.random() * 4);
            }
        }
        if (tr.line.visible) {
            const src = tr.isPlayer ? dogfightCyan[tr.srcIndex] : dogfightMagenta[tr.srcIndex];
            const tgt = tr.isPlayer ? dogfightMagenta[tr.tgtIndex] : dogfightCyan[tr.tgtIndex];
            const posArr = tr.geo.attributes.position.array;
            posArr[0] = src.mesh.position.x;
            posArr[1] = src.mesh.position.y;
            posArr[2] = src.mesh.position.z;
            // Tracer is short — extends 0.5 toward target
            const dx = tgt.mesh.position.x - src.mesh.position.x;
            const dy = tgt.mesh.position.y - src.mesh.position.y;
            const dz = tgt.mesh.position.z - src.mesh.position.z;
            const len = Math.sqrt(dx * dx + dy * dy + dz * dz);
            const tracerLen = Math.min(0.5, len);
            posArr[3] = src.mesh.position.x + (dx / len) * tracerLen;
            posArr[4] = src.mesh.position.y + (dy / len) * tracerLen;
            posArr[5] = src.mesh.position.z + (dz / len) * tracerLen;
            tr.geo.attributes.position.needsUpdate = true;
        }
    }

    /* --- Debris --- */
    for (const db of debrisPieces) {
        db.mesh.position.y -= db.fallSpeed;
        db.mesh.rotation.x += db.spinX;
        db.mesh.rotation.y += db.spinY;
        db.mesh.rotation.z += db.spinZ;
        db.mat.opacity -= db.fadeSpeed;
        if (db.mesh.position.y < -0.5 || db.mat.opacity <= 0) {
            db.mesh.position.y = db.baseY + Math.random() * 0.5;
            db.mat.opacity = 0.4 + Math.random() * 0.3;
        }
    }

    /* --- Carrier drift --- */
    playerCarrier.group.position.x = 5 + Math.sin(t * 0.08) * 0.5;
    playerCarrier.group.position.z = 5 + Math.cos(t * 0.06) * 0.3;
    playerCarrier.group.position.y = 7 + Math.sin(t * 0.15) * 0.15;

    enemyCarrier.group.position.x = -5 + Math.sin(t * 0.07 + 2) * 0.5;
    enemyCarrier.group.position.z = -5 + Math.cos(t * 0.05 + 2) * 0.3;
    enemyCarrier.group.position.y = 7 + Math.sin(t * 0.12 + 1) * 0.15;

    /* --- Engine exhaust --- */
    function updateExhaust(exSystem, carrierObj) {
        const posArr = exSystem.pGeo.attributes.position.array;
        const colArr = exSystem.pGeo.attributes.color.array;
        const cp = carrierObj.group.position;
        for (let i = 0; i < exSystem.particles.length; i++) {
            const p = exSystem.particles[i];
            p.x += p.vx;
            p.life -= 0.02;
            if (p.life <= 0) {
                const podPos = p.isPodL ? carrierObj.podLPos : carrierObj.podRPos;
                p.x = cp.x + podPos.x + (Math.random() - 0.5) * 0.1;
                p.y = cp.y + podPos.y + (Math.random() - 0.5) * 0.1;
                p.z = cp.z + podPos.z + (Math.random() - 0.5) * 0.1;
                p.vx = -0.02 - Math.random() * 0.02;
                p.life = 1;
            }
            posArr[i * 3] = p.x;
            posArr[i * 3 + 1] = p.y;
            posArr[i * 3 + 2] = p.z;
            const c = carrierObj.color;
            colArr[i * 3] = c.r * p.life;
            colArr[i * 3 + 1] = c.g * p.life;
            colArr[i * 3 + 2] = c.b * p.life;
        }
        exSystem.pGeo.attributes.position.needsUpdate = true;
        exSystem.pGeo.attributes.color.needsUpdate = true;
    }
    updateExhaust(playerExhaust, playerCarrier);
    updateExhaust(enemyExhaust, enemyCarrier);

    /* --- Deployment lines --- */
    function updateDeployLine(dl) {
        const cp = dl.carrier.group.position;
        const posArr = dl.geo.attributes.position.array;
        posArr[0] = cp.x; posArr[1] = cp.y; posArr[2] = cp.z;
        posArr[3] = cp.x; posArr[4] = dl.targetY; posArr[5] = cp.z;
        dl.geo.attributes.position.needsUpdate = true;
        dl.mat.opacity = 0.1 + Math.sin(t * 2) * 0.05;
    }
    updateDeployLine(playerDeployLine);
    updateDeployLine(enemyDeployLine);

    /* --- Orbital ring rotation --- */
    orbitalRing.rotation.z = t * 0.02;

    /* --- Satellites --- */
    for (const sat of satellites) {
        sat.angle += sat.orbitSpeed * 0.005;
        sat.mesh.position.x = Math.cos(sat.angle) * sat.radius;
        sat.mesh.position.z = Math.sin(sat.angle) * sat.radius;
        sat.mesh.rotation.y = sat.angle;
        // Blink
        sat.lightMat.opacity = Math.sin(t * 4 + sat.blinkPhase) > 0.7 ? 1 : 0.05;
    }

    /* --- Orbital strike beams --- */
    function updateBeam(b) {
        b.beamMat.opacity = 0.3 + Math.sin(t * 3) * 0.25;
        // Impact ring expansion
        const ringScale = 1 + (Math.sin(t * 2) * 0.5 + 0.5) * 1.5;
        b.ring.scale.set(ringScale, ringScale, 1);
        b.ringMat.opacity = 0.4 * (1 - (ringScale - 1) / 1.5);
        // Spark particles
        const posArr = b.sparkGeo.attributes.position.array;
        for (let i = 0; i < b.sparkVelocities.length; i++) {
            const sv = b.sparkVelocities[i];
            sv.life -= 0.015;
            if (sv.life <= 0) {
                posArr[i * 3] = b.x;
                posArr[i * 3 + 1] = 0.2;
                posArr[i * 3 + 2] = b.z;
                sv.vx = (Math.random() - 0.5) * 0.06;
                sv.vy = Math.random() * 0.04 + 0.02;
                sv.vz = (Math.random() - 0.5) * 0.06;
                sv.life = 1;
            }
            posArr[i * 3] += sv.vx;
            posArr[i * 3 + 1] += sv.vy;
            posArr[i * 3 + 2] += sv.vz;
            sv.vy -= 0.001; // gravity
        }
        b.sparkGeo.attributes.position.needsUpdate = true;
    }
    updateBeam(cyanBeam);
    updateBeam(magentaBeam);

    /* --- Shield bubbles --- */
    function updateShield(shield, carrierPos, beamActive) {
        shield.wireframe.position.set(carrierPos.x, carrierPos.y - 0.5, carrierPos.z);
        shield.glowMesh.position.set(carrierPos.x, carrierPos.y - 0.5, carrierPos.z);
        // Flicker effect
        if (beamActive && Math.sin(t * 15) > 0.8) {
            shield.baseMat.opacity = 0.2;
            shield.glowMat.opacity = 0.08;
        } else {
            shield.baseMat.opacity = 0.05;
            shield.glowMat.opacity = 0.02;
        }
    }
    updateShield(playerShield, playerCarrier.group.position, true);
    updateShield(enemyShield, enemyCarrier.group.position, true);

    /* --- Anti-air beams --- */
    for (const aa of aaBeams) {
        const targetSet = aa.targetDroneSet === 'dogfightMagenta' ? dogfightMagenta : dogfightCyan;
        const target = targetSet[aa.idx % targetSet.length];
        const posArr = aa.geo.attributes.position.array;
        posArr[0] = aa.groundX;
        posArr[1] = 0.2;
        posArr[2] = aa.groundZ;
        posArr[3] = target.mesh.position.x;
        posArr[4] = target.mesh.position.y;
        posArr[5] = target.mesh.position.z;
        aa.geo.attributes.position.needsUpdate = true;
        aa.pulsePhase += 0.05;
        aa.mat.opacity = 0.15 + Math.sin(aa.pulsePhase) * 0.12;
    }

    /* --- Scan line --- */
    scanLine.position.z = Math.sin(t * 0.3) * 15;

    /* --- Ambient particles --- */
    const aPos = ambientGeo.attributes.position.array;
    for (let i = 0; i < ambientCount; i++) {
        aPos[i * 3 + 1] += ambientVel[i].vy;
        if (aPos[i * 3 + 1] > 15) {
            aPos[i * 3] = (Math.random() - 0.5) * 20;
            aPos[i * 3 + 1] = 0;
            aPos[i * 3 + 2] = (Math.random() - 0.5) * 20;
        }
    }
    ambientGeo.attributes.position.needsUpdate = true;

    /* --- Data link opacity pulse --- */
    for (const dl of dataLinks) {
        dl.mat.opacity = 0.04 + Math.sin(t * 0.8) * 0.02;
    }

    controls.update();
    renderer.render(scene, camera);
}

animate();

/* ====================================================================
   RESIZE
   ==================================================================== */
window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    aspect = w / h;
    camera.left   = frustum * aspect / -2;
    camera.right  = frustum * aspect /  2;
    camera.top    = frustum / 2;
    camera.bottom = frustum / -2;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

</script>
</body>
</html>
