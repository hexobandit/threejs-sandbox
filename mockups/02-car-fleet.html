<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>02 — Car Fleet</title>
    <style>
        *{margin:0;padding:0}body{overflow:hidden;background:#000;touch-action:none}canvas{display:block}
        #ui{position:fixed;top:0;left:0;padding:12px;font-family:'Courier New',monospace;color:#fff;pointer-events:none;z-index:10}
        #ui h1{font-size:14px;color:#00ff88;margin-bottom:4px}
        #ui p{font-size:11px;color:#888;line-height:1.4;max-width:280px}
        #stats{font-size:11px;color:#ffcc00;margin-top:8px}
        #back{position:fixed;top:12px;right:12px;font-family:'Courier New',monospace;font-size:12px;color:#00ff88;text-decoration:none;z-index:10}
    </style>
</head>
<body>
<div id="ui">
    <h1>02 / Car Fleet</h1>
    <p>30 instanced cars · 2 teams · 3 draw calls total. Drag to orbit.</p>
    <div id="stats">-- FPS · 0 draw calls</div>
</div>
<a id="back" href="../index.html">← back</a>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x87ceeb);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87ceeb, 80, 140);

const frustum = 35;
let aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.OrthographicCamera(
    frustum * aspect / -2, frustum * aspect / 2,
    frustum / 2, frustum / -2, 0.1, 200
);
camera.position.set(25, 25, 25);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minZoom = 0.5;
controls.maxZoom = 3;
controls.addEventListener('start', () => controls.autoRotate = false);

scene.add(new THREE.HemisphereLight(0x87ceeb, 0x4a7c3f, 0.7));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(15, 30, 10);
scene.add(sun);

// --- Ground ---
scene.add((() => {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshLambertMaterial({ color: 0x4a7c3f }));
    m.rotation.x = -Math.PI / 2; return m;
})());

// --- Simple track ring ---
function rrShape(w, h, r) {
    const s = new THREE.Shape(), x = -w/2, y = -h/2;
    s.moveTo(x+r,y); s.lineTo(x+w-r,y); s.quadraticCurveTo(x+w,y,x+w,y+r);
    s.lineTo(x+w,y+h-r); s.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    s.lineTo(x+r,y+h); s.quadraticCurveTo(x,y+h,x,y+h-r);
    s.lineTo(x,y+r); s.quadraticCurveTo(x,y,x+r,y); return s;
}
const ts = rrShape(32, 22, 6);
ts.holes.push(new THREE.Path(rrShape(22, 12, 3).getPoints(40)));
const trackMesh = new THREE.Mesh(new THREE.ShapeGeometry(ts), new THREE.MeshLambertMaterial({ color: 0x444444 }));
trackMesh.rotation.x = -Math.PI / 2;
trackMesh.position.y = 0.02;
scene.add(trackMesh);

// --- Racing paths (two lanes: inner=red team, outer=blue team) ---
function makeEllipsePath(rx, rz, y) {
    const pts = [];
    for (let i = 0; i < 100; i++) {
        const a = (i / 100) * Math.PI * 2;
        pts.push(new THREE.Vector3(Math.cos(a) * rx, y, Math.sin(a) * rz));
    }
    return new THREE.CatmullRomCurve3(pts, true);
}
const innerPath = makeEllipsePath(11.5, 7, 0.25);
const outerPath = makeEllipsePath(14, 9, 0.25);

// --- Instanced cars ---
const NUM = 30;
const HALF = 15;

// Body geometry: long along Z (forward = -Z for lookAt)
const bodyGeo = new THREE.BoxGeometry(0.85, 0.35, 1.6);
const cabinGeo = new THREE.BoxGeometry(0.7, 0.25, 0.7);
cabinGeo.translate(0, 0.3, 0.15);

const bodyMat = new THREE.MeshLambertMaterial();
const cabinMat = new THREE.MeshLambertMaterial({ color: 0x333333 });

const bodies = new THREE.InstancedMesh(bodyGeo, bodyMat, NUM);
const cabins = new THREE.InstancedMesh(cabinGeo, cabinMat, NUM);
bodies.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
cabins.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

// Team colors
const red = new THREE.Color(0xcc4444);
const blue = new THREE.Color(0x4488bb);
for (let i = 0; i < NUM; i++) {
    bodies.setColorAt(i, i < HALF ? red : blue);
}
bodies.instanceColor.needsUpdate = true;

scene.add(bodies);
scene.add(cabins);

// --- Car speed offsets ---
const speeds = [];
for (let i = 0; i < NUM; i++) {
    speeds.push(0.015 + Math.random() * 0.008);
}

const dummy = new THREE.Object3D();

function updateCars(time) {
    for (let i = 0; i < NUM; i++) {
        const path = i < HALF ? innerPath : outerPath;
        const idx = i < HALF ? i : i - HALF;
        const spacing = idx / HALF;
        const t = ((time * speeds[i] + spacing) % 1 + 1) % 1;

        const pos = path.getPointAt(t);
        const tan = path.getTangentAt(t);

        dummy.position.copy(pos);
        dummy.lookAt(pos.x + tan.x, pos.y + tan.y, pos.z + tan.z);
        dummy.updateMatrix();

        bodies.setMatrixAt(i, dummy.matrix);
        cabins.setMatrixAt(i, dummy.matrix);
    }
    bodies.instanceMatrix.needsUpdate = true;
    cabins.instanceMatrix.needsUpdate = true;
}

// --- Resize ---
window.addEventListener('resize', () => {
    aspect = window.innerWidth / window.innerHeight;
    camera.left = frustum * aspect / -2;
    camera.right = frustum * aspect / 2;
    camera.top = frustum / 2;
    camera.bottom = frustum / -2;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- FPS ---
let fc = 0, lt = performance.now();
const statsEl = document.getElementById('stats');

// --- Animate ---
(function animate() {
    requestAnimationFrame(animate);
    const time = performance.now() * 0.001;
    controls.update();
    updateCars(time);

    fc++;
    const now = performance.now();
    if (now - lt >= 1000) {
        statsEl.textContent = fc + ' FPS · ' + renderer.info.render.calls + ' draw calls';
        fc = 0; lt = now;
    }
    renderer.render(scene, camera);
})();
</script>
</body>
</html>
